# Rate limiting zone — applied to /api/v1/ endpoints.
#
# Rate raised from 30r/m burst=10 to 300r/m burst=60 (2026-05-29 incident fix):
# the SPA fires 10-40 parallel requests per navigation; burst=10 saturated
# immediately on page load, returning 503s that browsers reported as CORS
# violations (masking the real cause). 300r/m with burst=60 accommodates normal
# SPA usage (~15-40 req/navigation) while still rate-limiting abuse.
# Per-user-vs-per-IP redesign is a separate ADR (filed after this PR).
# Zone size 10m ~= 160,000 unique IPs tracked.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=300r/m;

# Return 429 (Too Many Requests) for rate-limited requests rather than the
# default 503 (Service Unavailable). 429 is semantically correct and is
# distinguishable from real upstream-down 503s in dashboards and alerts.
limit_req_status 429;

server {
    listen 80 default_server;
    server_name _;

    # ---------------------------------------------------------
    # certbot ACME challenge (must work on port 80 for cert issuance)
    # ---------------------------------------------------------
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ---------------------------------------------------------
    # SSE stream — /api/v1/events (must come before /api/v1/)
    # ---------------------------------------------------------
    location /api/v1/events {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        keep-alive;

        proxy_buffering        off;
        add_header             X-Accel-Buffering no;
        proxy_read_timeout     3600s;
    }

    # ---------------------------------------------------------
    # API reverse proxy — /api/v1/
    # ---------------------------------------------------------
    location /api/v1/ {
        limit_req zone=api_limit burst=60 nodelay;

        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;
    }

    # ---------------------------------------------------------
    # Health check endpoint (no rate limit, no auth)
    # ---------------------------------------------------------
    location /health {
        proxy_pass       http://127.0.0.1:8080/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ---------------------------------------------------------
    # Static frontend assets (React SPA)
    # ---------------------------------------------------------
    root /var/www/mtga-companion;
    index index.html;

    # DR/preview only -- production frontend is served by Vercel. See ADR-007.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
