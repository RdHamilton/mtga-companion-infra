# Rate limiting zone — applied to /api/ endpoints
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

server {
    listen 80 default_server;
    server_name _;

    # ---------------------------------------------------------
    # certbot ACME challenge (must work on port 80 for cert issuance)
    # ---------------------------------------------------------
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ---------------------------------------------------------
    # API reverse proxy — /api/v1/
    # ---------------------------------------------------------
    location /api/v1/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;
    }

    # ---------------------------------------------------------
    # Health check endpoint (no rate limit, no auth)
    # ---------------------------------------------------------
    location /health {
        proxy_pass       http://127.0.0.1:8080/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ---------------------------------------------------------
    # Static frontend assets (React SPA)
    # ---------------------------------------------------------
    root /var/www/mtga-companion;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
