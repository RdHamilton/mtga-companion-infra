limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

server {
    server_name api.vaultmtg.app;

    # ACME challenge for certbot renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # SSE stream (must precede /api/v1/)
    location /api/v1/events {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        keep-alive;

        proxy_buffering    off;
        add_header         X-Accel-Buffering no;
        proxy_read_timeout 3600s;
    }

    # REST API
    location /api/v1/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;
    }

    # Health check
    location /health {
        proxy_pass       http://127.0.0.1:8080/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Extended health check used by deploy post-deploy verification
    location /healthz {
        proxy_pass       http://127.0.0.1:8080/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Root: API host has no UI; redirect to the app
    location = / {
        return 302 https://app.vaultmtg.app/;
    }

    # Anything else under api.vaultmtg.app returns JSON 404
    location / {
        default_type application/json;
        return 404 '{"error":"not_found","message":"This is the VaultMTG API. See https://app.vaultmtg.app/"}';
    }

    location ~ /\. {
        deny all;
    }

    listen 443 ssl; # managed by Certbot
    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.vaultmtg.app/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.vaultmtg.app/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = api.vaultmtg.app) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name api.vaultmtg.app;
    return 404; # managed by Certbot
}
