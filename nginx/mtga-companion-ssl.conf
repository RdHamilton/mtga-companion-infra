# nginx HTTPS configuration — applied after certbot provisions the Let's Encrypt certificate.
# Replace mtga-companion.conf with this file:
#   sudo cp /etc/nginx/conf.d/mtga-companion-ssl.conf /etc/nginx/conf.d/mtga-companion.conf
#   sudo nginx -t && sudo systemctl reload nginx

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

# ---------------------------------------------------------
# HTTP server — redirect all traffic to HTTPS
# ---------------------------------------------------------
server {
    listen 80 default_server;
    server_name mtgacompanion.com www.mtgacompanion.com;

    # certbot ACME challenge (must remain on port 80 for renewals)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------
# HTTPS server
# ---------------------------------------------------------
server {
    listen 443 ssl;
    server_name mtgacompanion.com www.mtgacompanion.com;

    # Let's Encrypt certificate (provisioned by certbot)
    ssl_certificate     /etc/letsencrypt/live/mtgacompanion.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mtgacompanion.com/privkey.pem;

    # TLS hardening — TLS 1.2+ only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS — tell browsers to always use HTTPS (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Additional security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS headers on ALL responses (including nginx-generated error responses).
    # Without `always`, nginx strips these headers from 4xx/5xx responses, causing
    # throttled or down-upstream replies to appear as CORS violations in the browser
    # — masking the real error during incident diagnosis (2026-05-29 post-mortem).
    add_header Access-Control-Allow-Origin "https://app.vaultmtg.app" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
    add_header Access-Control-Allow-Credentials "true" always;

    # ---------------------------------------------------------
    # SSE stream — /api/v1/events (must come before /api/v1/)
    # ---------------------------------------------------------
    location /api/v1/events {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        keep-alive;

        proxy_buffering        off;
        add_header             X-Accel-Buffering no;
        proxy_read_timeout     3600s;
    }

    # ---------------------------------------------------------
    # API reverse proxy — /api/v1/
    # ---------------------------------------------------------
    location /api/v1/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;
    }

    # ---------------------------------------------------------
    # Health check (no rate limit)
    # ---------------------------------------------------------
    location /health {
        proxy_pass       http://127.0.0.1:8080/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ---------------------------------------------------------
    # Static frontend assets (React SPA)
    # ---------------------------------------------------------
    root /var/www/mtga-companion;
    index index.html;

    # DR/preview only -- production frontend is served by Vercel. See ADR-007.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
