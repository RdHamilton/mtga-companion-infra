# nginx HTTPS configuration — applied after certbot provisions the Let's Encrypt certificate.
# Replace mtga-companion.conf with this file:
#   sudo cp /etc/nginx/conf.d/mtga-companion-ssl.conf /etc/nginx/conf.d/mtga-companion.conf
#   sudo nginx -t && sudo systemctl reload nginx

# Rate limiting zone — applied to /api/v1/ endpoints.
#
# Rate raised from 30r/m burst=10 to 300r/m burst=60 (2026-05-29 incident fix):
# the SPA fires 10-40 parallel requests per navigation; burst=10 saturated
# immediately on page load, returning 503s that browsers reported as CORS
# violations (masking the real cause). 300r/m with burst=60 accommodates normal
# SPA usage (~15-40 req/navigation) while still rate-limiting abuse.
# Per-user-vs-per-IP redesign is a separate ADR (filed after this PR).
# Zone size 10m ~= 160,000 unique IPs tracked.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=300r/m;

# Return 429 (Too Many Requests) for rate-limited requests rather than the
# default 503 (Service Unavailable). 429 is semantically correct and is
# distinguishable from real upstream-down 503s in dashboards and alerts.
limit_req_status 429;

# ---------------------------------------------------------
# HTTP server — redirect all traffic to HTTPS
# ---------------------------------------------------------
server {
    listen 80 default_server;
    server_name mtgacompanion.com www.mtgacompanion.com;

    # certbot ACME challenge (must remain on port 80 for renewals)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------
# HTTPS server
# ---------------------------------------------------------
server {
    listen 443 ssl;
    server_name mtgacompanion.com www.mtgacompanion.com;

    # Let's Encrypt certificate (provisioned by certbot)
    ssl_certificate     /etc/letsencrypt/live/mtgacompanion.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mtgacompanion.com/privkey.pem;

    # TLS hardening — TLS 1.2+ only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS headers are NOT set at the server-block level.
    #
    # Rationale (2026-05-29 post-mortem):
    # The BFF's go-chi/cors middleware adds Access-Control-Allow-Origin (and
    # related CORS headers) on every proxied response, including Clerk 401s.
    # Setting CORS headers here at the server block causes them to be inherited
    # by the /api/v1/ location, which produces a DUPLICATE
    # Access-Control-Allow-Origin on every proxied response. Chromium (and all
    # spec-compliant browsers) reject any response with a duplicate ACAO header
    # as a CORS violation and surface status 0 -- breaking the SPA entirely.
    #
    # CORS headers for nginx-generated error responses (502/503/504/429, which
    # bypass the BFF and therefore bypass go-chi/cors) are handled by
    # @upstream_error below.
    error_page 502 503 504 429 @upstream_error;

    # ---------------------------------------------------------
    # SSE stream — /api/v1/events (must come before /api/v1/)
    # ---------------------------------------------------------
    location /api/v1/events {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        keep-alive;

        proxy_buffering        off;
        add_header             X-Accel-Buffering no;
        proxy_read_timeout     3600s;
    }

    # ---------------------------------------------------------
    # API reverse proxy — /api/v1/
    # Rate limit: 300r/m per client IP, burst 60 (raised 2026-05-29 incident fix).
    # No CORS add_header here -- the BFF go-chi/cors middleware handles it.
    # ---------------------------------------------------------
    location /api/v1/ {
        limit_req zone=api_limit burst=60 nodelay;

        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;
    }

    # ---------------------------------------------------------
    # Health check (no rate limit)
    # ---------------------------------------------------------
    location /health {
        proxy_pass       http://127.0.0.1:8080/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ---------------------------------------------------------
    # Static frontend assets (React SPA)
    # ---------------------------------------------------------
    root /var/www/mtga-companion;
    index index.html;

    # DR/preview only -- production frontend is served by Vercel. See ADR-007.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # ---------------------------------------------------------
    # Named location for nginx-generated upstream errors (502/503/504/429).
    # The BFF never processed these requests so go-chi/cors never ran.
    # Without CORS headers here, the browser reports a CORS violation and
    # masks the real error -- the exact trap that cost us during the
    # 2026-05-29 rate-limit incident.
    # internal prevents direct client access (only reachable via error_page).
    # ---------------------------------------------------------
    location @upstream_error {
        internal;
        default_type application/json;
        add_header Access-Control-Allow-Origin "https://app.vaultmtg.app" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;
        return 502 '{"error":"upstream_unavailable"}';
    }
}
