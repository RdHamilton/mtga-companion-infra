# nginx server block for staging-api.vaultmtg.app
# Proxies HTTPS requests to the bff-staging systemd service on 127.0.0.1:8081.
#
# Ray action: After the staging-api.vaultmtg.app A record propagates, run certbot
# to expand the existing certificate to include the staging domain as a SAN:
#
#   sudo certbot --expand -d api.vaultmtg.app -d staging-api.vaultmtg.app --nginx
#
# Then reload nginx:
#   sudo nginx -t && sudo systemctl reload nginx
#
# This file assumes Let's Encrypt certificates are stored under the api.vaultmtg.app
# live directory (shared cert covering both domains after the --expand run).

# ---------------------------------------------------------
# HTTP -> HTTPS redirect for staging-api.vaultmtg.app
# ---------------------------------------------------------
server {
    listen 80;
    server_name staging-api.vaultmtg.app;

    # certbot ACME challenge (required for cert issuance and renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------
# HTTPS server — staging-api.vaultmtg.app -> 127.0.0.1:8081
# ---------------------------------------------------------
server {
    listen 443 ssl;
    server_name staging-api.vaultmtg.app;

    # Let's Encrypt certificate — shared with api.vaultmtg.app via SAN expansion.
    # Run the certbot --expand command above before enabling this block.
    ssl_certificate     /etc/letsencrypt/live/api.vaultmtg.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.vaultmtg.app/privkey.pem;

    # TLS hardening — TLS 1.2+ only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---------------------------------------------------------
    # SSE stream — /api/v1/events (must come before /api/v1/)
    # Buffering disabled; long-lived connection required for SSE.
    # ---------------------------------------------------------
    location /api/v1/events {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        keep-alive;

        proxy_buffering        off;
        add_header             X-Accel-Buffering no;
        proxy_read_timeout     3600s;
    }

    # ---------------------------------------------------------
    # API reverse proxy — /api/v1/
    # ---------------------------------------------------------
    location /api/v1/ {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;
    }

    # ---------------------------------------------------------
    # Health check (no rate limit; used by staging-deploy.yml post-deploy verification)
    # ---------------------------------------------------------
    location /healthz {
        proxy_pass       http://127.0.0.1:8081/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
