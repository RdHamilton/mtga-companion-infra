# nginx server block for staging-api.vaultmtg.app
# Proxies HTTPS requests to the vault-mtg-bff-staging systemd service on 127.0.0.1:8081.
#
# TLS certificate: shared SAN cert at /etc/letsencrypt/live/api.vaultmtg.app/
# covering both api.vaultmtg.app and staging-api.vaultmtg.app.
# Provisioned by:
#   certbot --expand -d api.vaultmtg.app -d staging-api.vaultmtg.app --nginx \
#           --non-interactive --agree-tos --email ray.hamilton@stablekernel.com
# After DNS propagation.  Renewal is handled by the certbot.timer systemd unit
# installed in ec2.yml UserData.

# ---------------------------------------------------------
# HTTP -> HTTPS redirect for staging-api.vaultmtg.app
# ---------------------------------------------------------
server {
    listen 80;
    server_name staging-api.vaultmtg.app;

    # certbot ACME challenge (required for cert issuance and renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------
# HTTPS server — staging-api.vaultmtg.app -> 127.0.0.1:8081
# ---------------------------------------------------------
server {
    listen 443 ssl;
    server_name staging-api.vaultmtg.app;

    # Let's Encrypt certificate — shared SAN cert covering both
    # api.vaultmtg.app and staging-api.vaultmtg.app.
    ssl_certificate     /etc/letsencrypt/live/api.vaultmtg.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.vaultmtg.app/privkey.pem;

    # TLS options managed by certbot (TLS 1.2+, ciphers, DH params).
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---------------------------------------------------------
    # SSE stream — /api/v1/events (must come before /api/v1/)
    # Buffering disabled; long-lived connection required for SSE.
    # ---------------------------------------------------------
    location /api/v1/events {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        keep-alive;

        proxy_buffering        off;
        add_header             X-Accel-Buffering no;
        proxy_read_timeout     3600s;
    }

    # ---------------------------------------------------------
    # API reverse proxy — /api/v1/
    # ---------------------------------------------------------
    location /api/v1/ {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;
    }

    # ---------------------------------------------------------
    # Health check (no rate limit; used by staging-deploy.yml post-deploy verification)
    # ---------------------------------------------------------
    location /healthz {
        proxy_pass       http://127.0.0.1:8081/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
