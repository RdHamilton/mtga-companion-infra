# nginx server block for staging-api.vaultmtg.app
# Proxies HTTPS requests to the vault-mtg-bff-staging systemd service on 127.0.0.1:8081.
#
# TLS certificate: shared SAN cert at /etc/letsencrypt/live/api.vaultmtg.app/
# covering both api.vaultmtg.app and staging-api.vaultmtg.app.
# Provisioned by:
#   certbot --expand -d api.vaultmtg.app -d staging-api.vaultmtg.app --nginx \
#           --non-interactive --agree-tos --email ramone.d.hamilton@gmail.com
# After DNS propagation.  Renewal is handled by the certbot.timer systemd unit
# installed in ec2.yml UserData.

# ---------------------------------------------------------
# Rate limiting zone — applied to /api/v1/ endpoints below.
# Raised from 30r/m burst=10 -> 60r/m burst=50 (2026-05-29 incident fix):
# the SPA fires 10+ parallel requests per page load; burst=10 saturated
# immediately causing 503s. Live patch applied during incident; codified here
# so the next provision does not revert it. /healthz and the SSE stream
# /api/v1/events are exempt.
# Zone name: staging_api_limit (reconciled 2026-05-29; stg_api_limit was drift).
# ---------------------------------------------------------
limit_req_zone $binary_remote_addr zone=staging_api_limit:10m rate=60r/m;

# Return 429 (Too Many Requests) for rate-limited requests rather than the
# default 503 (Service Unavailable). 429 is semantically correct and is
# distinguishable from real upstream-down 503s in dashboards and alerts.
limit_req_status 429;

# ---------------------------------------------------------
# HTTP -> HTTPS redirect for staging-api.vaultmtg.app
# ---------------------------------------------------------
server {
    listen 80;
    server_name staging-api.vaultmtg.app;

    # certbot ACME challenge (required for cert issuance and renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------
# HTTPS server -- staging-api.vaultmtg.app -> 127.0.0.1:8081
# ---------------------------------------------------------
server {
    listen 443 ssl;
    server_name staging-api.vaultmtg.app;

    # Let's Encrypt certificate -- shared SAN cert covering both
    # api.vaultmtg.app and staging-api.vaultmtg.app.
    ssl_certificate     /etc/letsencrypt/live/api.vaultmtg.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.vaultmtg.app/privkey.pem;

    # TLS options managed by certbot (TLS 1.2+, ciphers, DH params).
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS headers are NOT set at the server-block level.
    #
    # Rationale (2026-05-29 post-mortem, tickets#187):
    # The BFF's go-chi/cors middleware adds Access-Control-Allow-Origin (and
    # related CORS headers) on every proxied response, including Clerk 401s.
    # Setting CORS headers here at the server block causes them to be inherited
    # by the /api/v1/ location, which produces a DUPLICATE
    # Access-Control-Allow-Origin on every proxied response.  Chromium (and all
    # spec-compliant browsers) reject any response with a duplicate ACAO header
    # as a CORS violation and surface status 0 -- breaking the SPA entirely.
    #
    # CORS headers for nginx-generated error responses (502/503/504, which bypass
    # the BFF and therefore bypass go-chi/cors) are handled by @upstream_error.
    error_page 502 503 504 429 @upstream_error;

    # ---------------------------------------------------------
    # SSE stream -- /api/v1/events (must come before /api/v1/)
    # Buffering disabled; long-lived connection required for SSE.
    # ---------------------------------------------------------
    location /api/v1/events {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        keep-alive;

        proxy_buffering        off;
        add_header             X-Accel-Buffering no;
        proxy_read_timeout     3600s;
    }

    # ---------------------------------------------------------
    # API reverse proxy -- /api/v1/
    # Rate limit: 60r/m per client IP, burst 50 (raised 2026-05-29 incident fix).
    # No CORS add_header here -- the BFF go-chi/cors middleware handles it.
    # ---------------------------------------------------------
    location /api/v1/ {
        limit_req zone=staging_api_limit burst=50 nodelay;

        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;
    }

    # ---------------------------------------------------------
    # Health check (no rate limit; used by staging-deploy.yml post-deploy verification)
    # ---------------------------------------------------------
    location /healthz {
        proxy_pass       http://127.0.0.1:8081/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Named location for nginx-generated upstream errors (502/503/504).
    # The BFF never processed these requests so go-chi/cors never ran.
    # internal prevents direct client access (only reachable via error_page).
    location @upstream_error {
        internal;
        default_type application/json;
        add_header Access-Control-Allow-Origin "https://stg-app.vaultmtg.app" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;
        return 502 '{"error":"upstream_unavailable"}';
    }
}
