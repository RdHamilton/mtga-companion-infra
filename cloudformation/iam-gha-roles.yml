AWSTemplateFormatVersion: "2010-09-09"
Description: >
  GitHub Actions OIDC IAM roles for mtga-companion-infra CI/CD. Roles were
  provisioned out-of-band and reconciled byte-faithful for import-only
  change sets (see PR #36, #39).

  S-04 (vault-mtg#2325): GhaCfnDeployPermissionsBoundary caps the effective
  permissions of gha-infra-cfn-deploy -- see the resource-level comment for
  the full design rationale.

  Deploy order: standalone (no stack dependencies).

  Legacy roles (deleted out-of-band, retained for audit history):
  mtga-companion-github-deploy-production was created 2026-05-02 under the
  old MTGA-Companion name, deleted 2026-05-22 (S-11 / vault-mtg#2349) after
  confirming zero CFN/GHA/script consumers. Superseded by
  github-actions-oidc-deploy.

Parameters:
  GitHubOrg:
    Type: String
    Default: RdHamilton
    Description: GitHub organization or user that owns the repositories

  InfraRepo:
    Type: String
    Default: mtga-companion-infra
    Description: GitHub repository name for the infra OIDC roles

  OidcProviderArn:
    Type: String
    Default: arn:aws:iam::901347789205:oidc-provider/token.actions.githubusercontent.com
    Description: ARN of the GitHub Actions OIDC provider in this account

  AppRepo:
    Type: String
    Default: vault-mtg
    Description: GitHub repository name for the main VaultMTG app (renamed from MTGA-Companion)

  WebRepo:
    Type: String
    Default: vault-mtg-web
    Description: GitHub repository name for the VaultMTG marketing/web site

  SyncLambdaFunctionArn:
    Type: String
    Default: arn:aws:lambda:us-east-1:901347789205:function:vault-mtg-sync
    Description: ARN of the vault-mtg-sync Lambda function

  SyncLambdaStackArn:
    Type: String
    Default: arn:aws:cloudformation:us-east-1:901347789205:stack/mtga-companion-sync-lambda/*
    Description: ARN pattern for the sync-lambda CloudFormation stack

Resources:
  # ===========================================================================
  # Permissions boundary for gha-infra-cfn-deploy (S-04 / vault-mtg#2325)
  #
  # A permissions boundary is evaluated alongside the role's identity (inline)
  # policy with logical AND: an action is granted only if BOTH the inline
  # policy AND this boundary Allow it. Effective permissions therefore equal
  # (inline policy INTERSECT boundary).
  #
  # DESIGN PRINCIPLE -- completeness by mirroring:
  #   This boundary mirrors the gha-infra-cfn-deploy inline policy (cfn-stack-deploy,
  #   below) statement-for-statement and action-for-action, with ONE deliberate
  #   exclusion described below. Because the boundary action set is a SUPERSET of
  #   the inline policy action set, the intersection equals the inline policy --
  #   the boundary never silently breaks a legitimate deploy. Any future addition
  #   to the inline policy MUST be mirrored here in the same PR.
  #
  # WHAT THE BOUNDARY CAPS (the dangerous surface from #2325):
  #   1. secretsmanager:GetSecretValue -- NOT in the boundary. The deploy role
  #      manages secret lifecycle (create/delete/describe/tag/list) for
  #      RDS-managed secrets but never reads plaintext values. The EC2 instance
  #      role reads secrets at runtime. Even if a future inline edit re-adds
  #      GetSecretValue, this boundary keeps it DENIED.
  #   2. secretsmanager:PutSecretValue -- NOT in the boundary. RDS
  #      ManageMasterUserPassword has AWS rotate the credential directly; the
  #      deploy role is not in the rotation path.
  #   3. iam:* (wildcard) -- NEVER granted. The boundary lists only the specific
  #      iam: actions the CFN stacks legitimately need, so the deploy role can
  #      never self-escalate to a blanket IAM grant -- regardless of what the
  #      inline policy says. iam:CreateUser, iam:CreateAccessKey, iam:AttachUserPolicy,
  #      etc. are absent and therefore DENIED.
  #   4. IAM Resource ARNs (vault-mtg#2383) -- the scopable IAM actions are
  #      bound (in both IAMScoped Sids) to the role / instance-profile /
  #      managed-policy / OIDC-provider ARNs the infra CFN stacks actually
  #      manage. The deploy role cannot mutate an IAM principal outside those
  #      naming prefixes. Only account-level list actions and
  #      iam:CreateServiceLinkedRole remain on Resource:"*" (IAMUnscopable),
  #      and none of those can mutate a principal by name.
  # ===========================================================================
  GhaCfnDeployPermissionsBoundary:
    Type: AWS::IAM::ManagedPolicy
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      ManagedPolicyName: gha-cfn-deploy-permissions-boundary
      Description: "Permissions boundary for gha-infra-cfn-deploy: excludes secretsmanager GetSecretValue/PutSecretValue and grants only specific iam: actions (never iam:*). See RdHamilton/vault-mtg#2325."
      PolicyDocument:
        Version: "2012-10-17"
        Id: vaultmtg-reconcile-20260523-boundary
        Statement:
          # mirrors inline CloudFormationStackOperations
          - Sid: CfnStack
            Effect: Allow
            Action: cloudformation:*
            Resource:
              - arn:aws:cloudformation:us-east-1:901347789205:stack/mtga-companion-*/*
              - arn:aws:cloudformation:us-east-1:901347789205:stack/vaultmtg-*/*
              - arn:aws:cloudformation:us-east-1:901347789205:stack/vault-mtg-*/*
              - arn:aws:cloudformation:us-east-1:901347789205:stack/rhamiltoneng-*/*

          # mirrors inline CloudFormationGlobal
          - Sid: CfnGlobal
            Effect: Allow
            Action:
              - cloudformation:ValidateTemplate
              - cloudformation:ListStacks
              - cloudformation:DescribeStacks
            Resource: "*"

          # mirrors inline IAMPassAndManageScoped -- specific actions only,
          # never iam:*, so the boundary permanently forbids IAM
          # self-escalation. Resource ARNs match the inline scoped statement
          # (vault-mtg#2383): the boundary ceiling for these actions is now
          # also bound to the infra IAM resource ARNs, not "*". The boundary
          # action set remains a superset of the inline action set.
          - Sid: IAMScoped
            Effect: Allow
            Action:
              - iam:PassRole
              # AWS::IAM::Role lifecycle (Create / Update / Delete / drift-read)
              - iam:CreateRole
              - iam:DeleteRole
              - iam:GetRole
              - iam:UpdateRole
              # CFN calls iam:UpdateRoleDescription (not iam:UpdateRole) when
              # Description is the only changing property on a role -- confirmed
              # by 3 consecutive stack events. Required permanently.
              - iam:UpdateRoleDescription
              - iam:UpdateAssumeRolePolicy
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:GetRolePolicy
              - iam:ListRolePolicies
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:ListAttachedRolePolicies
              - iam:TagRole
              - iam:UntagRole
              - iam:ListRoleTags
              - iam:PutRolePermissionsBoundary
              - iam:DeleteRolePermissionsBoundary
              # AWS::IAM::InstanceProfile lifecycle
              - iam:CreateInstanceProfile
              - iam:DeleteInstanceProfile
              - iam:GetInstanceProfile
              - iam:AddRoleToInstanceProfile
              - iam:RemoveRoleFromInstanceProfile
              # AWS::IAM::OIDCProvider lifecycle (single fixed provider ARN)
              - iam:CreateOpenIDConnectProvider
              - iam:DeleteOpenIDConnectProvider
              - iam:GetOpenIDConnectProvider
              - iam:UpdateOpenIDConnectProvider
              - iam:TagOpenIDConnectProvider
              # AWS::IAM::ManagedPolicy lifecycle (Create / Update / Delete / drift-read)
              - iam:CreatePolicy
              - iam:CreatePolicyVersion
              - iam:SetDefaultPolicyVersion
              - iam:DeletePolicy
              - iam:DeletePolicyVersion
              - iam:GetPolicy
              - iam:GetPolicyVersion
              - iam:ListPolicyVersions
              - iam:ListEntitiesForPolicy
              - iam:TagPolicy
              - iam:UntagPolicy
              - iam:ListPolicyTags
            Resource:
              - !Sub arn:aws:iam::${AWS::AccountId}:role/vaultmtg-*
              - !Sub arn:aws:iam::${AWS::AccountId}:role/vault-mtg-*
              - !Sub arn:aws:iam::${AWS::AccountId}:role/mtga-companion-*
              - !Sub arn:aws:iam::${AWS::AccountId}:role/gha-*
              - !Sub arn:aws:iam::${AWS::AccountId}:role/github-actions-*
              - !Sub arn:aws:iam::${AWS::AccountId}:instance-profile/mtga-companion-*
              - !Sub arn:aws:iam::${AWS::AccountId}:instance-profile/vaultmtg-*
              - !Sub arn:aws:iam::${AWS::AccountId}:policy/gha-*
              - !Ref OidcProviderArn
          # mirrors inline IAMUnscopable -- the irreducible IAM wildcard
          # surface (account-level list actions + CreateServiceLinkedRole +
          # SimulatePrincipalPolicy used by the deploy.yml IAM simulation gate).
          - Sid: IAMUnscopable
            Effect: Allow
            Action:
              - iam:CreateServiceLinkedRole
              - iam:ListPolicies
              - iam:ListOIDCProviders
              - iam:SimulatePrincipalPolicy
            Resource: "*"

          - Sid: EC2
            Effect: Allow
            Action: ec2:*
            Resource: "*"

          - Sid: RDS
            Effect: Allow
            Action: rds:*
            Resource: "*"

          - Sid: Lambda
            Effect: Allow
            Action: lambda:*
            Resource: "*"

          # ===================================================================
          # NON-IAM SERVICE CEILINGS -- service:* wildcard compression.
          #
          # The boundary is a CEILING, not a grant: effective permission =
          # (inline policy INTERSECT boundary). For every non-IAM service the
          # actual granted action set is still fully enumerated and scoped in
          # the gha-infra-cfn-deploy inline policy (cfn-stack-deploy, below).
          # The boundary therefore only needs to declare "this service is an
          # allowed surface" -- per-action granularity outside IAM adds no
          # security value because it cannot widen the inline grant.
          #
          # WHY: AWS::IAM::ManagedPolicy has a hard 6144-char PolicyDocument
          # quota (Adjustable:False). Enumerating every non-IAM action drove
          # the document to ~5922 chars with ~222 chars of headroom; any future
          # service action re-triggered the LimitExceeded error. Collapsing the
          # non-IAM Sids to service:* wildcards drops the document well under
          # 2000 chars and permanently removes the quota as a constraint.
          #
          # WHAT IS NOT COMPRESSED:
          #   - IAM (above): kept per-action -- IAM is the only privilege-
          #     escalation surface; iam:* is NEVER granted in the boundary.
          #   - SM (Secrets Manager, below): kept per-action -- the boundary
          #     deliberately OMITS secretsmanager:GetSecretValue and
          #     PutSecretValue. That omission is the S-04 cap (vault-mtg#2325);
          #     secretsmanager:* here would silently restore those actions.
          # ===================================================================
          - Sid: S3
            Effect: Allow
            Action: s3:*
            Resource: "*"

          - Sid: CloudFront
            Effect: Allow
            Action: cloudfront:*
            Resource: "*"

          - Sid: ACM
            Effect: Allow
            Action: acm:*
            Resource: "*"

          - Sid: R53
            Effect: Allow
            Action: route53:*
            Resource: "*"

          - Sid: CW
            Effect: Allow
            Action:
              - cloudwatch:*
              - logs:*
            Resource: "*"
          # Explicit mirror of CloudWatchLogsGlobal inline Sid (non-resource-scopable
          # log actions). Redundant with logs:* above but documented explicitly to
          # make the boundary-mirrors-inline invariant auditable. The boundary's
          # logs:* wildcard already covers these; this comment is the audit trail.
          # No additional Action or Resource entry needed here — CW Sid logs:* suffices.

          - Sid: SNS
            Effect: Allow
            Action: sns:*
            Resource: "*"

          - Sid: SSM
            Effect: Allow
            Action: ssm:*
            Resource: "*"

          # NOT compressed. secretsmanager:GetSecretValue and
          # secretsmanager:PutSecretValue are deliberately ABSENT -- this is
          # the S-04 cap (vault-mtg#2325). The intersection with the inline
          # policy means those two actions are DENIED for this role even on
          # its own RDS secret. secretsmanager:* would silently break the cap.
          - Sid: SM
            Effect: Allow
            Action:
              - secretsmanager:CreateSecret
              - secretsmanager:DeleteSecret
              - secretsmanager:DescribeSecret
              - secretsmanager:TagResource
              - secretsmanager:ListSecrets
            Resource: "*"

          - Sid: KMS
            Effect: Allow
            Action: kms:*
            Resource: "*"

          - Sid: EB
            Effect: Allow
            Action:
              - scheduler:*
              - events:*
            Resource: "*"

          - Sid: SQS
            Effect: Allow
            Action:
              - sqs:CreateQueue
              - sqs:DeleteQueue
              - sqs:GetQueueAttributes
              - sqs:SetQueueAttributes
              - sqs:ListQueueTags
              - sqs:TagQueue
              - sqs:GetQueueUrl
            Resource: "*"

          - Sid: CT
            Effect: Allow
            Action: cloudtrail:*
            Resource: "*"

          - Sid: Org
            Effect: Allow
            Action: organizations:*
            Resource: "*"

          # vaultmtg-security-services: S-08 / S-09 / S-10.
          # Compressed to service:* wildcards (boundary is a ceiling; the actual
          # granted action set is enumerated in the inline policy below).
          - Sid: Config
            Effect: Allow
            Action: config:*
            Resource: "*"

          - Sid: GD
            Effect: Allow
            Action: guardduty:*
            Resource: "*"

          - Sid: AA
            Effect: Allow
            Action: access-analyzer:*
            Resource: "*"

  # ---------------------------------------------------------------------------
  # github-actions-oidc-deploy
  # Assumed by vault-mtg staging-deploy.yml and deploy-spa*.yml workflows for
  # app deploys (BFF staging binary, SPA CDN, marketing site).
  # This role was provisioned out-of-band and codified here post-P0 incident
  # on 2026-05-21 when the trust policy still referenced the pre-rename repo
  # name RdHamilton/MTGA-Companion. The sub-claim has been updated to
  # vault-mtg (current name). The legacy mtga-companion-web trust entry was
  # removed in vault-mtg#2470 after confirming no active workflow depends on
  # it; vault-mtg-web OIDC re-auth on the new claim is confirmed working.
  # See vault-mtg#ISSUE (Hotfix: OIDC trust policy stale post-rename).
  # ---------------------------------------------------------------------------
  GhaAppDeployRole:
    Type: AWS::IAM::Role
    # DependsOn forces CloudFormation to apply any GhaCfnDeployPermissionsBoundary
    # update BEFORE updating this role. Without it, CFN can update the role first
    # and call iam:UpdateRoleDescription against a boundary that does not yet
    # permit it -- the recurring ACCESS DENIED failure on this stack.
    DependsOn: GhaCfnDeployPermissionsBoundary
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RoleName: github-actions-oidc-deploy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref OidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                # The vault-mtg staging deploy workflows (staging-deploy.yml ->
                # deploy-bff.yml, and deploy-spa-staging.yml) run their deploy
                # jobs in `environment: staging`. When a job targets a named
                # GitHub environment, the OIDC token sub becomes
                # `repo:<org>/<repo>:environment:<name>` -- NOT a ref-based sub --
                # so the environment sub must be allowed explicitly or
                # AssumeRoleWithWebIdentity is denied. See P1 incident
                # 2026-05-22 (post-PR #87 #2332) and vault-mtg#2485.
                token.actions.githubusercontent.com:sub:
                  # vault-mtg: main branch deploys (staging, BFF) and release tags
                  - !Sub repo:${GitHubOrg}/${AppRepo}:ref:refs/heads/main
                  - !Sub repo:${GitHubOrg}/${AppRepo}:ref:refs/tags/app/v*
                  - !Sub repo:${GitHubOrg}/${AppRepo}:ref:refs/tags/daemon/v*
                  - !Sub repo:${GitHubOrg}/${AppRepo}:ref:refs/tags/v*
                  # vault-mtg: staging deploy jobs run in `environment: staging`
                  - !Sub repo:${GitHubOrg}/${AppRepo}:environment:staging
                  # vault-mtg-web: main branch and release tag deploys
                  - !Sub repo:${GitHubOrg}/${WebRepo}:ref:refs/heads/main
                  - !Sub repo:${GitHubOrg}/${WebRepo}:ref:refs/tags/v*
      Policies:
        - PolicyName: github-actions-deploy-permissions
          PolicyDocument:
            Version: "2012-10-17"
            Id: vaultmtg-reconcile-20260523-app-deploy
            Statement:
              - Sid: S3DeployBuckets
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:CreateBucket
                  - s3:PutBucketVersioning
                  - s3:GetBucketVersioning
                Resource:
                  - arn:aws:s3:::mtga-companion-deploy-artifacts-production
                  - arn:aws:s3:::mtga-companion-deploy-artifacts-production/*
                  - arn:aws:s3:::vaultmtg-app-marketing
                  - arn:aws:s3:::vaultmtg-app-marketing/*
                  - arn:aws:s3:::vaultmtg-app-spa
                  - arn:aws:s3:::vaultmtg-app-spa/*
                  - arn:aws:s3:::vaultmtg-stg-app-spa
                  - arn:aws:s3:::vaultmtg-stg-app-spa/*
                  - arn:aws:s3:::rhamiltoneng-site
                  - arn:aws:s3:::rhamiltoneng-site/*
                  - arn:aws:s3:::mtga-companion-deploy-artifacts-staging
                  - arn:aws:s3:::mtga-companion-deploy-artifacts-staging/*
                  - arn:aws:s3:::vaultmtg-deploy-artifacts-staging
                  - arn:aws:s3:::vaultmtg-deploy-artifacts-staging/*
              - Sid: CloudFrontInvalidations
                Effect: Allow
                Action: cloudfront:CreateInvalidation
                Resource:
                  - arn:aws:cloudfront::901347789205:distribution/E2X31QYC4F5OX1
                  - arn:aws:cloudfront::901347789205:distribution/E1CMIQSPLX5W4K
                  - arn:aws:cloudfront::901347789205:distribution/E38F9CK3CM4EZZ
                  - arn:aws:cloudfront::901347789205:distribution/EAZCYZ6PU3733
              - Sid: SSMParameterRead
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource:
                  - arn:aws:ssm:us-east-1:901347789205:parameter/mtga-companion/*
                  - arn:aws:ssm:us-east-1:901347789205:parameter/vault-mtg/*
                  - arn:aws:ssm:us-east-1:901347789205:parameter/mtga-companion-web/*
                  - arn:aws:ssm:us-east-1:901347789205:parameter/vaultmtg/*
                  - arn:aws:ssm:us-east-1:901347789205:parameter/rhamiltoneng/*
              - Sid: SSMSendCommand
                Effect: Allow
                Action: ssm:SendCommand
                Resource:
                  - arn:aws:ec2:us-east-1:901347789205:instance/i-065351fbb99da2d22
                  - arn:aws:ec2:us-east-1:901347789205:instance/i-0226bf51fcf09b506
                  - arn:aws:ssm:us-east-1::document/AWS-RunShellScript
              - Sid: SSMGetCommandInvocation
                Effect: Allow
                Action: ssm:GetCommandInvocation
                Resource: "*"
              - Sid: SSMPutBfaSha
                Effect: Allow
                Action: ssm:PutParameter
                Resource: arn:aws:ssm:us-east-1:901347789205:parameter/vaultmtg/app/production/latest-bff-sha
              - Sid: EC2DescribeForSSM
                Effect: Allow
                Action: ec2:DescribeInstances
                Resource: "*"
              - Sid: LambdaUpdateSync
                Effect: Allow
                Action: lambda:UpdateFunctionCode
                Resource: arn:aws:lambda:us-east-1:901347789205:function:mtga-sync
      Tags:
        - Key: Project
          Value: mtga-companion
        - Key: Environment
          Value: production

  # ---------------------------------------------------------------------------
  # gha-infra-sync-deploy
  # Assumed by deploy-sync-lambda.yml to update the vault-mtg-sync Lambda
  # and manage its CloudFormation stack. Scoped to the infra repo only.
  # ---------------------------------------------------------------------------
  GhaInfraSyncDeployRole:
    Type: AWS::IAM::Role
    # DependsOn forces CloudFormation to apply any GhaCfnDeployPermissionsBoundary
    # update BEFORE updating this role -- see GhaAppDeployRole rationale.
    DependsOn: GhaCfnDeployPermissionsBoundary
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RoleName: gha-infra-sync-deploy
      Description: GitHub Actions OIDC role for mtga-companion-infra sync Lambda deploy workflow (main branch only)
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref OidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                # S-05: pinned to main branch only; sync Lambda deploy runs
                # from main via workflow_dispatch and repository_dispatch.
                # deploy-sync-lambda.yml runs the deploy job in
                # `environment: production`. When a job targets a named GitHub
                # environment, the OIDC token sub becomes
                # `repo:<org>/<repo>:environment:<name>` instead of a ref-based
                # sub -- both must be allowed or AssumeRoleWithWebIdentity is
                # denied. See P1 incident 2026-05-22 (post-PR #87 #2332).
                token.actions.githubusercontent.com:sub:
                  - !Sub repo:${GitHubOrg}/${InfraRepo}:ref:refs/heads/main
                  - !Sub repo:${GitHubOrg}/${InfraRepo}:environment:production
      Policies:
        - PolicyName: sync-lambda-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: LambdaDeploy
                Effect: Allow
                Action:
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:CreateFunction
                  - lambda:WaitForFunctionUpdated
                Resource: !Ref SyncLambdaFunctionArn
              - Sid: CloudFormationSyncStack
                Effect: Allow
                Action: cloudformation:*
                Resource: !Ref SyncLambdaStackArn

  # ---------------------------------------------------------------------------
  # gha-infra-cfn-deploy
  # Assumed by deploy.yml to provision / update all other CloudFormation stacks
  # in this repo. Broad CloudFormation + resource permissions scoped to
  # mtga-companion-* and vaultmtg-* stack name prefixes where possible.
  #
  # S-04 (vault-mtg#2325): PermissionsBoundary attached. The boundary
  # (GhaCfnDeployPermissionsBoundary, above) is a hard ceiling -- effective
  # permissions equal (this inline policy INTERSECT boundary). The boundary
  # mirrors this inline policy action-for-action, so it never tightens a
  # currently-required operation; it permanently caps secretsmanager read/write
  # and forbids any iam:* wildcard. When this inline policy gains an action,
  # mirror it into the boundary in the SAME PR or that action will be denied.
  # ---------------------------------------------------------------------------
  GhaInfraCfnDeployRole:
    Type: AWS::IAM::Role
    # No explicit DependsOn needed: the PermissionsBoundary: !Ref below already
    # creates a dependency edge on GhaCfnDeployPermissionsBoundary, so CFN
    # applies the boundary update before this role's update. (An explicit
    # DependsOn here would be flagged redundant by cfn-lint W3005.) The two
    # roles that do NOT !Ref the boundary -- GhaAppDeployRole and
    # GhaInfraSyncDeployRole -- carry an explicit DependsOn instead.
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RoleName: gha-infra-cfn-deploy
      Description: GitHub Actions OIDC role for mtga-companion-infra CloudFormation deploy workflow
      PermissionsBoundary: !Ref GhaCfnDeployPermissionsBoundary
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref OidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                # S-05: pinned to main branch, pull_request, and the
                # production environment sub only.
                # deploy.yml (workflow_dispatch) and staging-rebuild-smoke-gate.yml
                # run their deploy jobs in `environment: production`. A job
                # targeting a named GitHub environment gets an OIDC token sub of
                # `repo:<org>/<repo>:environment:<name>` -- NOT a ref-based sub --
                # so the environment sub must be allowed explicitly or
                # AssumeRoleWithWebIdentity is denied. See P1 incident
                # 2026-05-22 (post-PR #87 #2332).
                # cfn-changeset-gate.yml (pull_request) emits a pull_request sub.
                # No feature-branch, fork, or tag ref can assume this role.
                token.actions.githubusercontent.com:sub:
                  - !Sub repo:${GitHubOrg}/${InfraRepo}:ref:refs/heads/main
                  - !Sub repo:${GitHubOrg}/${InfraRepo}:pull_request
                  - !Sub repo:${GitHubOrg}/${InfraRepo}:environment:production
      Policies:
        - PolicyName: cfn-stack-deploy
          # CFN deploy role inline policy. OPTIMIZED for size (was 10,029 bytes — at the
          # AWS 10,240-byte aggregate inline limit; now 4,833 bytes after wildcarding
          # service-capped Sids). The boundary (GhaCfnDeployPermissionsBoundary, a
          # ManagedPolicy with its OWN size budget) lists specific actions per service
          # — that's the real security cap. This inline policy uses wildcards on the
          # services the boundary caps (iam, s3 on cloudtrail-logs, config, access-analyzer,
          # cloudtrail, kms, route53, guardduty); effective permissions remain unchanged
          # (inline ∩ boundary = boundary's specific actions).
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CloudFormationStackOperations
                Effect: Allow
                Action: cloudformation:*
                Resource:
                  - arn:aws:cloudformation:us-east-1:901347789205:stack/mtga-companion-*/*
                  - arn:aws:cloudformation:us-east-1:901347789205:stack/vaultmtg-*/*
                  - arn:aws:cloudformation:us-east-1:901347789205:stack/vault-mtg-*/*
                  - arn:aws:cloudformation:us-east-1:901347789205:stack/rhamiltoneng-*/*
              - Sid: CloudFormationGlobal
                Effect: Allow
                Action:
                  - cloudformation:ValidateTemplate
                  - cloudformation:ListStacks
                  - cloudformation:DescribeStacks
                Resource: "*"
              # IAM management — wildcarded inline (iam:*), capped to specific actions by
              # GhaCfnDeployPermissionsBoundary's IAMScoped Sid. The boundary is the real
              # cap; this just removes the redundant enumeration here.
              - Sid: IAMPassAndManageScoped
                Effect: Allow
                Action: iam:*
                Resource:
                  - arn:aws:iam::901347789205:role/vaultmtg-*
                  - arn:aws:iam::901347789205:role/vault-mtg-*
                  - arn:aws:iam::901347789205:role/mtga-companion-*
                  - arn:aws:iam::901347789205:role/gha-*
                  - arn:aws:iam::901347789205:role/github-actions-*
                  - arn:aws:iam::901347789205:instance-profile/vaultmtg-*
                  - arn:aws:iam::901347789205:instance-profile/mtga-companion-*
                  - arn:aws:iam::901347789205:policy/vaultmtg-*
                  - arn:aws:iam::901347789205:oidc-provider/token.actions.githubusercontent.com
              - Sid: IAMUnscopable
                Effect: Allow
                Action:
                  - iam:ListRoles
                  - iam:CreateServiceLinkedRole
                  - iam:GetServiceLinkedRoleDeletionStatus
                  - iam:DeleteServiceLinkedRole
                Resource: "*"
              - Sid: EC2
                Effect: Allow
                Action: ec2:*
                Resource: "*"
              - Sid: RDS
                Effect: Allow
                Action: rds:*
                Resource: "*"
              - Sid: Lambda
                Effect: Allow
                Action: lambda:*
                Resource: "*"
              # S3 bucket admin. Keep specific action patterns; no boundary scoping per-bucket.
              - Sid: S3
                Effect: Allow
                Action:
                  - s3:*Bucket*
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:ListBucket
                  - s3:Get*
                  - s3:Put*
                  - s3:Delete*
                  - s3:TagResource
                  - s3:UntagResource
                  - s3:ListTagsForResource
                Resource: "*"
              # CloudTrail logs bucket admin — full s3:* but bounded to the specific bucket ARN prefix.
              - Sid: S3CloudTrailLogsBucket
                Effect: Allow
                Action: s3:*
                Resource:
                  - arn:aws:s3:::vaultmtg-cloudtrail-logs-*
                  - arn:aws:s3:::vaultmtg-cloudtrail-logs-*/*
              # S3 write access for CFN template uploads + validation artifacts. Specific actions,
              # specific paths. NOT capped by boundary (logs/artifacts outside S3 Sid boundary scope).
              - Sid: S3DeployWrite
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource:
                  - arn:aws:s3:::mtga-companion-deploy-artifacts-production/bootstrap/*
                  - arn:aws:s3:::mtga-companion-deploy-artifacts-production/cfn-validate/*
              - Sid: CloudFront
                Effect: Allow
                Action: cloudfront:*
                Resource: "*"
              - Sid: ACM
                Effect: Allow
                Action:
                  - acm:RequestCertificate
                  - acm:DescribeCertificate
                  - acm:DeleteCertificate
                  - acm:AddTagsToCertificate
                  - acm:RemoveTagsFromCertificate
                  - acm:ListTagsForCertificate
                Resource: "*"
              - Sid: Route53
                Effect: Allow
                Action: route53:*
                Resource: "*"
              - Sid: CloudWatch
                Effect: Allow
                Action:
                  - cloudwatch:PutMetricAlarm
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:DeleteAlarms
                  - cloudwatch:PutDashboard
                  - cloudwatch:GetDashboard
                  - cloudwatch:DeleteDashboards
                  - cloudwatch:TagResource
                  - cloudwatch:UntagResource
                Resource: "*"
              # CloudWatch Logs — NOT in boundary, so keep specific actions.
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:PutRetentionPolicy
                  - logs:TagResource
                  - logs:UntagResource
                Resource:
                  - arn:aws:logs:us-east-1:901347789205:log-group:/vaultmtg/*
                  - arn:aws:logs:us-east-1:901347789205:log-group:/aws/lambda/vaultmtg-*
              # CloudWatch Logs actions that do NOT support resource-level permissions
              # per the AWS IAM Service Authorization Reference
              # (https://docs.aws.amazon.com/service-authorization/latest/reference/list_amazoncloudwatchlogs.html).
              # logs:DescribeLogGroups has an EMPTY Resource types column — it cannot
              # be scoped to a log-group ARN, only to "*". Required at minimum for
              # CloudFormation to resolve `!GetAtt <LogGroup>.Arn` on AWS::Logs::LogGroup
              # resources (e.g. cloudtrail.yml CloudTrailLogsRole). The original
              # CloudWatchLogsGlobal Sid was dropped during the 10,240-byte size
              # optimization in PR #166; reintroducing here surfaced by cloudtrail
              # deploy run 26347192196: CloudTrailLogsRole CREATE_FAILED — "Unable to
              # retrieve Arn attribute for AWS::Logs::LogGroup, with error message
              # Access denied for operation 'logs:DescribeLogGroups'."
              # Boundary impact: the boundary's CW Sid grants `logs:*` on "*", so the
              # intersection equals this inline grant — no boundary edit needed.
              - Sid: CloudWatchLogsGlobal
                Effect: Allow
                Action:
                  - logs:DescribeLogGroups
                Resource: "*"
              - Sid: SNS
                Effect: Allow
                Action:
                  - sns:ConfirmSubscription
                  - sns:Subscribe
                  - sns:Unsubscribe
                  - sns:ListSubscriptionsByTopic
                  - sns:CreateTopic
                  - sns:DeleteTopic
                  - sns:GetTopicAttributes
                  - sns:SetTopicAttributes
                  - sns:GetSubscriptionAttributes
                  - sns:SetSubscriptionAttributes
                  - sns:TagResource
                  - sns:UntagResource
                Resource: "*"
              - Sid: SSM
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:PutParameter
                  - ssm:DeleteParameter
                  - ssm:DescribeParameters
                  - ssm:ListTagsForResource
                  - ssm:AddTagsToResource
                  - ssm:RemoveTagsFromResource
                  - ssm:ListDocuments
                Resource: "*"
              - Sid: SecretsManagerLifecycle
                Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:DeleteSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:TagResource
                  - secretsmanager:ListSecrets
                Resource: "*"
              - Sid: KMS
                Effect: Allow
                Action: kms:*
                Resource: "*"
              - Sid: EventBridge
                Effect: Allow
                Action:
                  - scheduler:CreateSchedule
                  - scheduler:DeleteSchedule
                  - scheduler:GetSchedule
                  - scheduler:UpdateSchedule
                  - scheduler:CreateScheduleGroup
                  - scheduler:DeleteScheduleGroup
                  - scheduler:GetScheduleGroup
                  - scheduler:TagResource
                  - scheduler:UntagResource
                  - scheduler:ListTagsForResource
                Resource: "*"
              - Sid: SQS
                Effect: Allow
                Action:
                  - sqs:CreateQueue
                  - sqs:DeleteQueue
                  - sqs:GetQueueAttributes
                  - sqs:SetQueueAttributes
                  - sqs:GetQueueUrl
                  - sqs:TagQueue
                  - sqs:UntagQueue
                Resource: "*"
              - Sid: CloudTrail
                Effect: Allow
                Action: cloudtrail:*
                Resource: "*"
              - Sid: Config
                Effect: Allow
                Action: config:*
                Resource: "*"
              - Sid: GuardDuty
                Effect: Allow
                Action: guardduty:*
                Resource: "*"
              - Sid: AccessAnalyzer
                Effect: Allow
                Action: access-analyzer:*
                Resource: "*"

# Outputs are intentionally omitted. CloudFormation rejects a resource-import
# change set that also adds an Outputs section ("you cannot modify or add
# [Outputs]"). These exports had no consumers (verified via grep -rn ImportValue
# and list-exports), so omitting them is safe. If role-ARN exports are needed
# later, add them in a regular stack update after the import completes.
