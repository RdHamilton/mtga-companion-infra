AWSTemplateFormatVersion: "2010-09-09"
Description: >
  GitHub Actions OIDC IAM roles for mtga-companion-infra CI/CD pipelines.
  Codifies roles that were provisioned out-of-band so they can be imported
  into a CloudFormation stack. These roles already exist in the account --
  this template is reconciled to be byte-faithful to the live roles so a
  resource-import change set is import-only. See PR #36 and PR #39 for
  the original provisioning context.

  S-04 (vault-mtg#2325): GhaCfnDeployPermissionsBoundary caps the effective
  permissions of gha-infra-cfn-deploy -- see the resource-level comment for
  the full design rationale.

  Deploy order: standalone (no stack dependencies).

Parameters:
  GitHubOrg:
    Type: String
    Default: RdHamilton
    Description: GitHub organization or user that owns the repositories

  InfraRepo:
    Type: String
    Default: mtga-companion-infra
    Description: GitHub repository name for the infra OIDC roles

  OidcProviderArn:
    Type: String
    Default: arn:aws:iam::901347789205:oidc-provider/token.actions.githubusercontent.com
    Description: ARN of the GitHub Actions OIDC provider in this account

  AppRepo:
    Type: String
    Default: vault-mtg
    Description: GitHub repository name for the main VaultMTG app (renamed from MTGA-Companion)

  WebRepo:
    Type: String
    Default: vault-mtg-web
    Description: GitHub repository name for the VaultMTG marketing/web site

  SyncLambdaFunctionArn:
    Type: String
    Default: arn:aws:lambda:us-east-1:901347789205:function:vault-mtg-sync
    Description: ARN of the vault-mtg-sync Lambda function

  SyncLambdaStackArn:
    Type: String
    Default: arn:aws:cloudformation:us-east-1:901347789205:stack/mtga-companion-sync-lambda/*
    Description: ARN pattern for the sync-lambda CloudFormation stack

Resources:
  # ===========================================================================
  # Permissions boundary for gha-infra-cfn-deploy (S-04 / vault-mtg#2325)
  #
  # A permissions boundary is evaluated alongside the role's identity (inline)
  # policy with logical AND: an action is granted only if BOTH the inline
  # policy AND this boundary Allow it. Effective permissions therefore equal
  # (inline policy INTERSECT boundary).
  #
  # DESIGN PRINCIPLE -- completeness by mirroring:
  #   This boundary mirrors the gha-infra-cfn-deploy inline policy (cfn-stack-deploy,
  #   below) statement-for-statement and action-for-action, with ONE deliberate
  #   exclusion described below. Because the boundary action set is a SUPERSET of
  #   the inline policy action set, the intersection equals the inline policy --
  #   the boundary never silently breaks a legitimate deploy. Any future addition
  #   to the inline policy MUST be mirrored here in the same PR.
  #
  # WHAT THE BOUNDARY CAPS (the dangerous surface from #2325):
  #   1. secretsmanager:GetSecretValue -- NOT in the boundary. The deploy role
  #      manages secret lifecycle (create/delete/describe/tag/list) for
  #      RDS-managed secrets but never reads plaintext values. The EC2 instance
  #      role reads secrets at runtime. Even if a future inline edit re-adds
  #      GetSecretValue, this boundary keeps it DENIED.
  #   2. secretsmanager:PutSecretValue -- NOT in the boundary. RDS
  #      ManageMasterUserPassword has AWS rotate the credential directly; the
  #      deploy role is not in the rotation path.
  #   3. iam:* (wildcard) -- NEVER granted. The boundary lists only the specific
  #      iam: actions the CFN stacks legitimately need, so the deploy role can
  #      never self-escalate to a blanket IAM grant -- regardless of what the
  #      inline policy says. iam:CreateUser, iam:CreateAccessKey, iam:AttachUserPolicy,
  #      etc. are absent and therefore DENIED.
  # ===========================================================================
  GhaCfnDeployPermissionsBoundary:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: gha-cfn-deploy-permissions-boundary
      Description: "Permissions boundary for gha-infra-cfn-deploy: excludes secretsmanager GetSecretValue/PutSecretValue and grants only specific iam: actions (never iam:*). See RdHamilton/vault-mtg#2325."
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          # mirrors inline CloudFormationStackOperations
          - Sid: CfnStack
            Effect: Allow
            Action: cloudformation:*
            Resource:
              - arn:aws:cloudformation:us-east-1:901347789205:stack/mtga-companion-*/*
              - arn:aws:cloudformation:us-east-1:901347789205:stack/vaultmtg-*/*
              - arn:aws:cloudformation:us-east-1:901347789205:stack/vault-mtg-*/*

          # mirrors inline CloudFormationGlobal
          - Sid: CfnGlobal
            Effect: Allow
            Action:
              - cloudformation:ValidateTemplate
              - cloudformation:ListStacks
              - cloudformation:DescribeStacks
            Resource: "*"

          # mirrors inline IAMPassAndManage — specific actions only, never iam:*,
          # so the boundary permanently forbids IAM self-escalation.
          - Sid: IAM
            Effect: Allow
            Action:
              - iam:PassRole
              # AWS::IAM::Role lifecycle (Create / Update / Delete / drift-read)
              - iam:CreateRole
              - iam:DeleteRole
              - iam:GetRole
              - iam:UpdateRole
              - iam:UpdateAssumeRolePolicy
              - iam:CreateServiceLinkedRole
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:GetRolePolicy
              - iam:ListRolePolicies
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:ListAttachedRolePolicies
              - iam:TagRole
              - iam:UntagRole
              - iam:ListRoleTags
              - iam:PutRolePermissionsBoundary
              - iam:DeleteRolePermissionsBoundary
              - iam:CreateInstanceProfile
              - iam:DeleteInstanceProfile
              - iam:GetInstanceProfile
              - iam:AddRoleToInstanceProfile
              - iam:RemoveRoleFromInstanceProfile
              - iam:CreateOIDCProvider
              - iam:DeleteOIDCProvider
              - iam:GetOIDCProvider
              - iam:UpdateOIDCProvider
              - iam:TagOIDCProvider
              - iam:ListOIDCProviders
              # AWS::IAM::ManagedPolicy lifecycle (Create / Update / Delete / drift-read)
              - iam:CreatePolicy
              - iam:CreatePolicyVersion
              - iam:SetDefaultPolicyVersion
              - iam:DeletePolicy
              - iam:DeletePolicyVersion
              - iam:GetPolicy
              - iam:GetPolicyVersion
              - iam:ListPolicies
              - iam:ListPolicyVersions
              - iam:ListEntitiesForPolicy
              - iam:TagPolicy
              - iam:UntagPolicy
              - iam:ListPolicyTags
            Resource: "*"

          - Sid: EC2
            Effect: Allow
            Action: ec2:*
            Resource: "*"

          - Sid: RDS
            Effect: Allow
            Action: rds:*
            Resource: "*"

          - Sid: Lambda
            Effect: Allow
            Action: lambda:*
            Resource: "*"

          # Merged from inline S3 (Resource:*) + S3CloudTrailLogsBucket (scoped ARNs).
          # The scoped statement's 35 actions are a strict subset of these 38 actions;
          # since Resource:* already covers the scoped ARNs, the scoped statement was
          # redundant in the boundary and is collapsed here. Effective ceiling unchanged.
          - Sid: S3
            Effect: Allow
            Action:
              - s3:CreateBucket
              - s3:DeleteBucket
              - s3:ListBucket
              - s3:GetBucketLocation
              - s3:GetBucketAcl
              - s3:GetBucketPolicy
              - s3:PutBucketPolicy
              - s3:DeleteBucketPolicy
              - s3:GetBucketVersioning
              - s3:PutBucketVersioning
              - s3:PutBucketPublicAccessBlock
              - s3:GetBucketPublicAccessBlock
              - s3:PutEncryptionConfiguration
              - s3:GetEncryptionConfiguration
              - s3:DeleteBucketEncryption
              - s3:PutBucketTagging
              - s3:GetBucketTagging
              - s3:TagResource
              - s3:UntagResource
              - s3:ListTagsForResource
              - s3:PutBucketOwnershipControls
              - s3:GetBucketOwnershipControls
              - s3:PutBucketObjectLockConfiguration
              - s3:GetBucketObjectLockConfiguration
              - s3:PutLifecycleConfiguration
              - s3:GetLifecycleConfiguration
              - s3:PutBucketNotification
              - s3:GetBucketNotification
              - s3:GetBucketCORS
              - s3:PutBucketCORS
              - s3:GetBucketLogging
              - s3:GetBucketWebsite
              - s3:GetAccelerateConfiguration
              - s3:GetReplicationConfiguration
              - s3:GetAnalyticsConfiguration
              - s3:GetInventoryConfiguration
              - s3:GetMetricsConfiguration
              - s3:GetIntelligentTieringConfiguration
            Resource: "*"

          # Mirrors gha-infra-cfn-deploy inline S3BootstrapWrite statement (S-04 rule).
          # Object-level grant scoped to the bootstrap/ prefix of the production
          # artifacts bucket. Added for #2459 (ec2-bootstrap.sh S3 externalization).
          - Sid: S3BootstrapWrite
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
            Resource:
              - arn:aws:s3:::mtga-companion-deploy-artifacts-production/bootstrap/*

          - Sid: CloudFront
            Effect: Allow
            Action: cloudfront:*
            Resource: "*"

          - Sid: ACM
            Effect: Allow
            Action:
              - acm:RequestCertificate
              - acm:DescribeCertificate
              - acm:DeleteCertificate
              - acm:ListCertificates
              - acm:AddTagsToCertificate
              - acm:ListTagsForCertificate
            Resource: "*"

          - Sid: R53
            Effect: Allow
            Action:
              - route53:CreateHostedZone
              - route53:DeleteHostedZone
              - route53:GetHostedZone
              - route53:ListHostedZones
              - route53:ChangeResourceRecordSets
              - route53:GetChange
              - route53:ListResourceRecordSets
              - route53:CreateHealthCheck
              - route53:DeleteHealthCheck
              - route53:GetHealthCheck
            Resource: "*"

          - Sid: CW
            Effect: Allow
            Action:
              - cloudwatch:PutMetricAlarm
              - cloudwatch:DeleteAlarms
              - cloudwatch:DescribeAlarms
              - cloudwatch:ListTagsForResource
              - cloudwatch:TagResource
              - cloudwatch:PutDashboard
              - cloudwatch:DeleteDashboards
              - cloudwatch:GetDashboard
            Resource: "*"

          # Mirrors gha-infra-cfn-deploy inline CloudWatchLogs statement (S-04 rule).
          # Scoped to the /vaultmtg/* log-group namespace (#2471).
          - Sid: CWLogs
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:PutRetentionPolicy
              - logs:DeleteLogGroup
            Resource:
              - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/vaultmtg/*

          - Sid: SNS
            Effect: Allow
            Action:
              - sns:CreateTopic
              - sns:DeleteTopic
              - sns:GetTopicAttributes
              - sns:SetTopicAttributes
              - sns:Subscribe
              - sns:Unsubscribe
              - sns:ListSubscriptionsByTopic
              - sns:TagResource
              - sns:ListTagsForResource
            Resource: "*"

          - Sid: SSM
            Effect: Allow
            Action:
              - ssm:GetParameter
              - ssm:GetParameters
              - ssm:PutParameter
              - ssm:DeleteParameter
              - ssm:DescribeParameters
              - ssm:AddTagsToResource
              - ssm:ListTagsForResource
            Resource: "*"

          # Lifecycle actions ONLY. secretsmanager:GetSecretValue and
          # secretsmanager:PutSecretValue are deliberately ABSENT -- this is
          # the S-04 cap. The intersection with the inline policy means those
          # two actions are DENIED for this role even on its own RDS secret.
          - Sid: SM
            Effect: Allow
            Action:
              - secretsmanager:CreateSecret
              - secretsmanager:DeleteSecret
              - secretsmanager:DescribeSecret
              - secretsmanager:TagResource
              - secretsmanager:ListSecrets
            Resource: "*"

          - Sid: KMS
            Effect: Allow
            Action:
              - kms:CreateKey
              - kms:DisableKey
              - kms:EnableKeyRotation
              - kms:PutKeyPolicy
              - kms:TagResource
              - kms:DescribeKey
              - kms:GetKeyPolicy
              - kms:GetKeyRotationStatus
              - kms:ListResourceTags
              - kms:DisableKeyRotation
              - kms:EnableKey
              - kms:UntagResource
              - kms:UpdateKeyDescription
              - kms:ScheduleKeyDeletion
              - kms:ListKeys
              - kms:CreateAlias
              - kms:UpdateAlias
              - kms:DeleteAlias
              - kms:ListAliases
              - kms:CreateGrant
            Resource: "*"

          - Sid: EB
            Effect: Allow
            Action:
              - scheduler:CreateSchedule
              - scheduler:UpdateSchedule
              - scheduler:DeleteSchedule
              - scheduler:GetSchedule
              - scheduler:ListSchedules
              - events:PutRule
              - events:DeleteRule
              - events:DescribeRule
              - events:PutTargets
              - events:RemoveTargets
            Resource: "*"

          - Sid: SQS
            Effect: Allow
            Action:
              - sqs:CreateQueue
              - sqs:DeleteQueue
              - sqs:GetQueueAttributes
              - sqs:SetQueueAttributes
              - sqs:ListQueueTags
              - sqs:TagQueue
            Resource: "*"

          - Sid: CT
            Effect: Allow
            Action:
              - cloudtrail:CreateTrail
              - cloudtrail:AddTags
              - cloudtrail:PutEventSelectors
              - cloudtrail:PutInsightSelectors
              - cloudtrail:PutEventConfiguration
              - cloudtrail:StartLogging
              - cloudtrail:DescribeTrails
              - cloudtrail:GetTrail
              - cloudtrail:GetTrailStatus
              - cloudtrail:GetEventSelectors
              - cloudtrail:GetInsightSelectors
              - cloudtrail:GetEventConfiguration
              - cloudtrail:ListTags
              - cloudtrail:ListTrails
              - cloudtrail:UpdateTrail
              - cloudtrail:RemoveTags
              - cloudtrail:StopLogging
              - cloudtrail:DeleteTrail
            Resource: "*"

          - Sid: Org
            Effect: Allow
            Action:
              - organizations:DescribeOrganization
              - organizations:ListAWSServiceAccessForOrganization
            Resource: "*"

  # ---------------------------------------------------------------------------
  # github-actions-oidc-deploy
  # Assumed by vault-mtg staging-deploy.yml and deploy-spa*.yml workflows for
  # app deploys (BFF staging binary, SPA CDN, marketing site).
  # This role was provisioned out-of-band and codified here post-P0 incident
  # on 2026-05-21 when the trust policy still referenced the pre-rename repo
  # name RdHamilton/MTGA-Companion. The sub-claim has been updated to
  # vault-mtg (current name). The legacy mtga-companion-web trust entry was
  # removed in vault-mtg#2470 after confirming no active workflow depends on
  # it; vault-mtg-web OIDC re-auth on the new claim is confirmed working.
  # See vault-mtg#ISSUE (Hotfix: OIDC trust policy stale post-rename).
  # ---------------------------------------------------------------------------
  GhaAppDeployRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    Properties:
      RoleName: github-actions-oidc-deploy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref OidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                # The vault-mtg staging deploy workflows (staging-deploy.yml ->
                # deploy-bff.yml, and deploy-spa-staging.yml) run their deploy
                # jobs in `environment: staging`. When a job targets a named
                # GitHub environment, the OIDC token sub becomes
                # `repo:<org>/<repo>:environment:<name>` -- NOT a ref-based sub --
                # so the environment sub must be allowed explicitly or
                # AssumeRoleWithWebIdentity is denied. See P1 incident
                # 2026-05-22 (post-PR #87 #2332) and vault-mtg#2485.
                token.actions.githubusercontent.com:sub:
                  # vault-mtg: main branch deploys (staging, BFF) and release tags
                  - !Sub repo:${GitHubOrg}/${AppRepo}:ref:refs/heads/main
                  - !Sub repo:${GitHubOrg}/${AppRepo}:ref:refs/tags/app/v*
                  - !Sub repo:${GitHubOrg}/${AppRepo}:ref:refs/tags/daemon/v*
                  - !Sub repo:${GitHubOrg}/${AppRepo}:ref:refs/tags/v*
                  # vault-mtg: staging deploy jobs run in `environment: staging`
                  - !Sub repo:${GitHubOrg}/${AppRepo}:environment:staging
                  # vault-mtg-web: main branch and release tag deploys
                  - !Sub repo:${GitHubOrg}/${WebRepo}:ref:refs/heads/main
                  - !Sub repo:${GitHubOrg}/${WebRepo}:ref:refs/tags/v*
      Policies:
        - PolicyName: github-actions-deploy-permissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: S3DeployBuckets
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:CreateBucket
                  - s3:PutBucketVersioning
                  - s3:GetBucketVersioning
                Resource:
                  - arn:aws:s3:::mtga-companion-deploy-artifacts-production
                  - arn:aws:s3:::mtga-companion-deploy-artifacts-production/*
                  - arn:aws:s3:::vaultmtg-app-marketing
                  - arn:aws:s3:::vaultmtg-app-marketing/*
                  - arn:aws:s3:::vaultmtg-app-spa
                  - arn:aws:s3:::vaultmtg-app-spa/*
                  - arn:aws:s3:::vaultmtg-stg-app-spa
                  - arn:aws:s3:::vaultmtg-stg-app-spa/*
                  - arn:aws:s3:::rhamiltoneng-site
                  - arn:aws:s3:::rhamiltoneng-site/*
                  - arn:aws:s3:::mtga-companion-deploy-artifacts-staging
                  - arn:aws:s3:::mtga-companion-deploy-artifacts-staging/*
                  - arn:aws:s3:::vaultmtg-deploy-artifacts-staging
                  - arn:aws:s3:::vaultmtg-deploy-artifacts-staging/*
              - Sid: CloudFrontInvalidations
                Effect: Allow
                Action: cloudfront:CreateInvalidation
                Resource:
                  - arn:aws:cloudfront::901347789205:distribution/E2X31QYC4F5OX1
                  - arn:aws:cloudfront::901347789205:distribution/E1CMIQSPLX5W4K
                  - arn:aws:cloudfront::901347789205:distribution/E38F9CK3CM4EZZ
                  - arn:aws:cloudfront::901347789205:distribution/EAZCYZ6PU3733
              - Sid: SSMParameterRead
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource:
                  - arn:aws:ssm:us-east-1:901347789205:parameter/mtga-companion/*
                  - arn:aws:ssm:us-east-1:901347789205:parameter/vault-mtg/*
                  - arn:aws:ssm:us-east-1:901347789205:parameter/mtga-companion-web/*
                  - arn:aws:ssm:us-east-1:901347789205:parameter/vaultmtg/*
                  - arn:aws:ssm:us-east-1:901347789205:parameter/rhamiltoneng/*
              - Sid: SSMSendCommand
                Effect: Allow
                Action: ssm:SendCommand
                Resource:
                  - arn:aws:ec2:us-east-1:901347789205:instance/i-065351fbb99da2d22
                  - arn:aws:ec2:us-east-1:901347789205:instance/i-0226bf51fcf09b506
                  - arn:aws:ssm:us-east-1::document/AWS-RunShellScript
              - Sid: SSMGetCommandInvocation
                Effect: Allow
                Action: ssm:GetCommandInvocation
                Resource: "*"
              - Sid: EC2DescribeForSSM
                Effect: Allow
                Action: ec2:DescribeInstances
                Resource: "*"
              - Sid: LambdaUpdateSync
                Effect: Allow
                Action: lambda:UpdateFunctionCode
                Resource: arn:aws:lambda:us-east-1:901347789205:function:mtga-sync
      Tags:
        - Key: Project
          Value: mtga-companion
        - Key: Environment
          Value: production

  # ---------------------------------------------------------------------------
  # gha-infra-sync-deploy
  # Assumed by deploy-sync-lambda.yml to update the vault-mtg-sync Lambda
  # and manage its CloudFormation stack. Scoped to the infra repo only.
  # ---------------------------------------------------------------------------
  GhaInfraSyncDeployRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    Properties:
      RoleName: gha-infra-sync-deploy
      Description: GitHub Actions OIDC role for mtga-companion-infra sync Lambda deploy workflow (main branch only)
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref OidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                # S-05: pinned to main branch only; sync Lambda deploy runs
                # from main via workflow_dispatch and repository_dispatch.
                # deploy-sync-lambda.yml runs the deploy job in
                # `environment: production`. When a job targets a named GitHub
                # environment, the OIDC token sub becomes
                # `repo:<org>/<repo>:environment:<name>` instead of a ref-based
                # sub -- both must be allowed or AssumeRoleWithWebIdentity is
                # denied. See P1 incident 2026-05-22 (post-PR #87 #2332).
                token.actions.githubusercontent.com:sub:
                  - !Sub repo:${GitHubOrg}/${InfraRepo}:ref:refs/heads/main
                  - !Sub repo:${GitHubOrg}/${InfraRepo}:environment:production
      Policies:
        - PolicyName: sync-lambda-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: LambdaDeploy
                Effect: Allow
                Action:
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:CreateFunction
                  - lambda:WaitForFunctionUpdated
                Resource: !Ref SyncLambdaFunctionArn
              - Sid: CloudFormationSyncStack
                Effect: Allow
                Action: cloudformation:*
                Resource: !Ref SyncLambdaStackArn

  # ---------------------------------------------------------------------------
  # gha-infra-cfn-deploy
  # Assumed by deploy.yml to provision / update all other CloudFormation stacks
  # in this repo. Broad CloudFormation + resource permissions scoped to
  # mtga-companion-* and vaultmtg-* stack name prefixes where possible.
  #
  # S-04 (vault-mtg#2325): PermissionsBoundary attached. The boundary
  # (GhaCfnDeployPermissionsBoundary, above) is a hard ceiling -- effective
  # permissions equal (this inline policy INTERSECT boundary). The boundary
  # mirrors this inline policy action-for-action, so it never tightens a
  # currently-required operation; it permanently caps secretsmanager read/write
  # and forbids any iam:* wildcard. When this inline policy gains an action,
  # mirror it into the boundary in the SAME PR or that action will be denied.
  # ---------------------------------------------------------------------------
  GhaInfraCfnDeployRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    Properties:
      RoleName: gha-infra-cfn-deploy
      Description: GitHub Actions OIDC role for mtga-companion-infra CloudFormation deploy workflow
      PermissionsBoundary: !Ref GhaCfnDeployPermissionsBoundary
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref OidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                # S-05: pinned to main branch, pull_request, and the
                # production environment sub only.
                # deploy.yml (workflow_dispatch) and staging-rebuild-smoke-gate.yml
                # run their deploy jobs in `environment: production`. A job
                # targeting a named GitHub environment gets an OIDC token sub of
                # `repo:<org>/<repo>:environment:<name>` -- NOT a ref-based sub --
                # so the environment sub must be allowed explicitly or
                # AssumeRoleWithWebIdentity is denied. See P1 incident
                # 2026-05-22 (post-PR #87 #2332).
                # cfn-changeset-gate.yml (pull_request) emits a pull_request sub.
                # No feature-branch, fork, or tag ref can assume this role.
                token.actions.githubusercontent.com:sub:
                  - !Sub repo:${GitHubOrg}/${InfraRepo}:ref:refs/heads/main
                  - !Sub repo:${GitHubOrg}/${InfraRepo}:pull_request
                  - !Sub repo:${GitHubOrg}/${InfraRepo}:environment:production
      Policies:
        - PolicyName: cfn-stack-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CloudFormationStackOperations
                Effect: Allow
                Action: cloudformation:*
                Resource:
                  - arn:aws:cloudformation:us-east-1:901347789205:stack/mtga-companion-*/*
                  - arn:aws:cloudformation:us-east-1:901347789205:stack/vaultmtg-*/*
                  - arn:aws:cloudformation:us-east-1:901347789205:stack/vault-mtg-*/*
              - Sid: CloudFormationGlobal
                Effect: Allow
                Action:
                  - cloudformation:ValidateTemplate
                  - cloudformation:ListStacks
                  - cloudformation:DescribeStacks
                Resource: "*"
              # Complete CloudFormation-lifecycle IAM permission set for the
              # AWS::IAM::Role and AWS::IAM::ManagedPolicy resource handlers,
              # enumerated from the CFN resource-provider schemas rather than
              # discovered one deploy failure at a time (see PR audit notes).
              # Grouped by resource type. Any addition here MUST be mirrored
              # into the GhaCfnDeployPermissionsBoundary IAM Sid in the SAME PR.
              - Sid: IAMPassAndManage
                Effect: Allow
                Action:
                  - iam:PassRole
                  # AWS::IAM::Role lifecycle (Create / Update / Delete / drift-read)
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:UpdateRole
                  - iam:UpdateAssumeRolePolicy
                  - iam:CreateServiceLinkedRole
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:ListRolePolicies
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:ListAttachedRolePolicies
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:ListRoleTags
                  - iam:PutRolePermissionsBoundary
                  - iam:DeleteRolePermissionsBoundary
                  - iam:CreateInstanceProfile
                  - iam:DeleteInstanceProfile
                  - iam:GetInstanceProfile
                  - iam:AddRoleToInstanceProfile
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:CreateOIDCProvider
                  - iam:DeleteOIDCProvider
                  - iam:GetOIDCProvider
                  - iam:UpdateOIDCProvider
                  - iam:TagOIDCProvider
                  - iam:ListOIDCProviders
                  # AWS::IAM::ManagedPolicy lifecycle (Create / Update / Delete / drift-read)
                  - iam:CreatePolicy
                  - iam:CreatePolicyVersion
                  - iam:SetDefaultPolicyVersion
                  - iam:DeletePolicy
                  - iam:DeletePolicyVersion
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:ListPolicies
                  - iam:ListPolicyVersions
                  - iam:ListEntitiesForPolicy
                  - iam:TagPolicy
                  - iam:UntagPolicy
                  - iam:ListPolicyTags
                Resource: "*"
              - Sid: EC2
                Effect: Allow
                Action: ec2:*
                Resource: "*"
              - Sid: RDS
                Effect: Allow
                Action: rds:*
                Resource: "*"
              - Sid: Lambda
                Effect: Allow
                Action: lambda:*
                Resource: "*"
              # General S3 bucket lifecycle for non-CloudTrail infra stacks
              # (dns, ec2, sync-lambda buckets, etc.). Resource "*" is retained
              # because this role manages buckets across multiple stacks whose
              # names are not all known here. Bucket-scoped grants for the
              # dedicated CloudTrail logs bucket are in S3CloudTrailLogsBucket.
              #
              # NOTE: s3:PutEncryptionConfiguration / s3:GetEncryptionConfiguration
              # are the real IAM action names. The strings s3:PutBucketEncryption
              # and s3:GetBucketEncryption are NOT valid IAM actions -- the
              # CloudFormation AWS::S3::Bucket handler calls the SDK PutBucketEncryption
              # API which is gated by the s3:PutEncryptionConfiguration permission.
              - Sid: S3
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:ListBucket
                  - s3:GetBucketLocation
                  - s3:GetBucketAcl
                  - s3:GetBucketPolicy
                  - s3:PutBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:GetBucketVersioning
                  - s3:PutBucketVersioning
                  - s3:PutBucketPublicAccessBlock
                  - s3:GetBucketPublicAccessBlock
                  - s3:PutEncryptionConfiguration
                  - s3:GetEncryptionConfiguration
                  - s3:DeleteBucketEncryption
                  - s3:PutBucketTagging
                  - s3:GetBucketTagging
                  - s3:TagResource
                  - s3:UntagResource
                  - s3:ListTagsForResource
                  - s3:PutBucketOwnershipControls
                  - s3:GetBucketOwnershipControls
                  - s3:PutBucketObjectLockConfiguration
                  - s3:GetBucketObjectLockConfiguration
                  - s3:PutLifecycleConfiguration
                  - s3:GetLifecycleConfiguration
                  - s3:PutBucketNotification
                  - s3:GetBucketNotification
                  - s3:GetBucketCORS
                  - s3:PutBucketCORS
                  - s3:GetBucketLogging
                  - s3:GetBucketWebsite
                  - s3:GetAccelerateConfiguration
                  - s3:GetReplicationConfiguration
                  - s3:GetAnalyticsConfiguration
                  - s3:GetInventoryConfiguration
                  - s3:GetMetricsConfiguration
                  - s3:GetIntelligentTieringConfiguration
                Resource: "*"
              # Tightly-scoped grant for the dedicated CloudTrail logs bucket.
              # cloudtrail.yml creates vaultmtg-cloudtrail-logs-${Environment}-${AccountId};
              # the prefix wildcard covers both production and staging environments.
              # This statement is the complete CRUD+rollback permission set the
              # CloudFormation AWS::S3::Bucket and AWS::S3::BucketPolicy resource
              # handlers require for that bucket.
              - Sid: S3CloudTrailLogsBucket
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:ListBucket
                  - s3:GetBucketAcl
                  - s3:GetBucketLocation
                  - s3:GetBucketPolicy
                  - s3:PutBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:GetBucketVersioning
                  - s3:PutBucketVersioning
                  - s3:GetBucketPublicAccessBlock
                  - s3:PutBucketPublicAccessBlock
                  - s3:GetEncryptionConfiguration
                  - s3:PutEncryptionConfiguration
                  - s3:DeleteBucketEncryption
                  - s3:GetBucketTagging
                  - s3:PutBucketTagging
                  - s3:TagResource
                  - s3:UntagResource
                  - s3:ListTagsForResource
                  - s3:GetBucketOwnershipControls
                  - s3:PutBucketOwnershipControls
                  - s3:GetBucketObjectLockConfiguration
                  - s3:PutBucketObjectLockConfiguration
                  - s3:GetLifecycleConfiguration
                  - s3:GetBucketNotification
                  - s3:GetBucketCORS
                  - s3:GetBucketLogging
                  - s3:GetBucketWebsite
                  - s3:GetAccelerateConfiguration
                  - s3:GetReplicationConfiguration
                  - s3:GetAnalyticsConfiguration
                  - s3:GetInventoryConfiguration
                  - s3:GetMetricsConfiguration
                  - s3:GetIntelligentTieringConfiguration
                Resource:
                  - arn:aws:s3:::vaultmtg-cloudtrail-logs-*
                  - arn:aws:s3:::vaultmtg-cloudtrail-logs-*/*
              # Object-level grant for the bootstrap script upload step in deploy.yml.
              # gha-infra-cfn-deploy uploads scripts/deploy/ec2-bootstrap.sh to the
              # production artifacts bucket before deploying the ec2 stack (#2459).
              # Scoped to bootstrap/* to follow least-privilege; the infra role must
              # not have broad write access to the release artifact path.
              # Mirrored in GhaCfnDeployPermissionsBoundary per S-04 (#2325) design rule.
              - Sid: S3BootstrapWrite
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource:
                  - arn:aws:s3:::mtga-companion-deploy-artifacts-production/bootstrap/*
              - Sid: CloudFront
                Effect: Allow
                Action: cloudfront:*
                Resource: "*"
              - Sid: ACM
                Effect: Allow
                Action:
                  - acm:RequestCertificate
                  - acm:DescribeCertificate
                  - acm:DeleteCertificate
                  - acm:ListCertificates
                  - acm:AddTagsToCertificate
                  - acm:ListTagsForCertificate
                Resource: "*"
              - Sid: Route53
                Effect: Allow
                Action:
                  - route53:CreateHostedZone
                  - route53:DeleteHostedZone
                  - route53:GetHostedZone
                  - route53:ListHostedZones
                  - route53:ChangeResourceRecordSets
                  - route53:GetChange
                  - route53:ListResourceRecordSets
                  - route53:CreateHealthCheck
                  - route53:DeleteHealthCheck
                  - route53:GetHealthCheck
                Resource: "*"
              - Sid: CloudWatch
                Effect: Allow
                Action:
                  - cloudwatch:PutMetricAlarm
                  - cloudwatch:DeleteAlarms
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:ListTagsForResource
                  - cloudwatch:TagResource
                  - cloudwatch:PutDashboard
                  - cloudwatch:DeleteDashboards
                  - cloudwatch:GetDashboard
                Resource: "*"
              # CloudWatch Logs: log-group lifecycle for the AWS::Logs::LogGroup
              # resource handler. Scoped to the /vaultmtg/* log-group namespace
              # to follow least-privilege (#2471).
              # Mirrored in GhaCfnDeployPermissionsBoundary per S-04 (#2325) design rule.
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:PutRetentionPolicy
                  - logs:DeleteLogGroup
                Resource:
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/vaultmtg/*
              - Sid: SNS
                Effect: Allow
                Action:
                  - sns:CreateTopic
                  - sns:DeleteTopic
                  - sns:GetTopicAttributes
                  - sns:SetTopicAttributes
                  - sns:Subscribe
                  - sns:Unsubscribe
                  - sns:ListSubscriptionsByTopic
                  - sns:TagResource
                  - sns:ListTagsForResource
                Resource: "*"
              - Sid: SSM
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:PutParameter
                  - ssm:DeleteParameter
                  - ssm:DescribeParameters
                  - ssm:AddTagsToResource
                  - ssm:ListTagsForResource
                Resource: "*"
              # Secrets Manager: lifecycle management only.
              # secretsmanager:GetSecretValue removed -- the deploy role does
              # not read secret values. The EC2 instance role reads secrets at
              # runtime. secretsmanager:PutSecretValue removed -- RDS
              # ManageMasterUserPassword has AWS rotate the credential directly.
              - Sid: SecretsManagerLifecycle
                Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:DeleteSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:TagResource
                  - secretsmanager:ListSecrets
                Resource: "*"
              # KMS: complete CRUD+rollback permission set for the
              # AWS::KMS::Key and AWS::KMS::Alias resource handlers.
              # Resource "*" is required: kms:CreateKey and kms:ListKeys are
              # not resource-scopable, and the CloudFormation handler acts on
              # the key during creation before its ARN/ID exists. This role
              # also manages KMS keys across multiple infra stacks.
              - Sid: KMS
                Effect: Allow
                Action:
                  # AWS::KMS::Key -- create
                  - kms:CreateKey
                  - kms:DisableKey
                  - kms:EnableKeyRotation
                  - kms:PutKeyPolicy
                  - kms:TagResource
                  # AWS::KMS::Key -- read
                  - kms:DescribeKey
                  - kms:GetKeyPolicy
                  - kms:GetKeyRotationStatus
                  - kms:ListResourceTags
                  # AWS::KMS::Key -- update
                  - kms:DisableKeyRotation
                  - kms:EnableKey
                  - kms:UntagResource
                  - kms:UpdateKeyDescription
                  # AWS::KMS::Key -- delete / list
                  - kms:ScheduleKeyDeletion
                  - kms:ListKeys
                  # AWS::KMS::Alias -- create / read / update / delete / list
                  - kms:CreateAlias
                  - kms:UpdateAlias
                  - kms:DeleteAlias
                  - kms:ListAliases
                  # Retained: grant management used by other infra stacks
                  - kms:CreateGrant
                Resource: "*"
              - Sid: EventBridge
                Effect: Allow
                Action:
                  - scheduler:CreateSchedule
                  - scheduler:UpdateSchedule
                  - scheduler:DeleteSchedule
                  - scheduler:GetSchedule
                  - scheduler:ListSchedules
                  - events:PutRule
                  - events:DeleteRule
                  - events:DescribeRule
                  - events:PutTargets
                  - events:RemoveTargets
                Resource: "*"
              - Sid: SQS
                Effect: Allow
                Action:
                  - sqs:CreateQueue
                  - sqs:DeleteQueue
                  - sqs:GetQueueAttributes
                  - sqs:SetQueueAttributes
                  - sqs:ListQueueTags
                  - sqs:TagQueue
                Resource: "*"
              # CloudTrail: complete CRUD+rollback permission set for the
              # AWS::CloudTrail::Trail resource handler. cloudtrail: actions are
              # not resource-scopable for the create handler (the trail ARN does
              # not exist yet), so Resource "*" is required.
              - Sid: CloudTrail
                Effect: Allow
                Action:
                  # create
                  - cloudtrail:CreateTrail
                  - cloudtrail:AddTags
                  - cloudtrail:PutEventSelectors
                  - cloudtrail:PutInsightSelectors
                  - cloudtrail:PutEventConfiguration
                  - cloudtrail:StartLogging
                  # read / list
                  - cloudtrail:DescribeTrails
                  - cloudtrail:GetTrail
                  - cloudtrail:GetTrailStatus
                  - cloudtrail:GetEventSelectors
                  - cloudtrail:GetInsightSelectors
                  - cloudtrail:GetEventConfiguration
                  - cloudtrail:ListTags
                  - cloudtrail:ListTrails
                  # update
                  - cloudtrail:UpdateTrail
                  - cloudtrail:RemoveTags
                  - cloudtrail:StopLogging
                  # delete
                  - cloudtrail:DeleteTrail
                Resource: "*"
              # The AWS::CloudTrail::Trail create/update handler additionally
              # requires organizations:DescribeOrganization and
              # organizations:ListAWSServiceAccessForOrganization -- CloudTrail
              # probes organization membership even for a single-account,
              # non-organization trail. Read-only Organizations actions.
              - Sid: CloudTrailOrganizationsProbe
                Effect: Allow
                Action:
                  - organizations:DescribeOrganization
                  - organizations:ListAWSServiceAccessForOrganization
                Resource: "*"

# Outputs are intentionally omitted. CloudFormation rejects a resource-import
# change set that also adds an Outputs section ("you cannot modify or add
# [Outputs]"). These exports had no consumers (verified via grep -rn ImportValue
# and list-exports), so omitting them is safe. If role-ARN exports are needed
# later, add them in a regular stack update after the import completes.
