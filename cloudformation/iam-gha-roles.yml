AWSTemplateFormatVersion: "2010-09-09"
Description: >
  GitHub Actions OIDC IAM roles for mtga-companion-infra CI/CD pipelines.
  Codifies roles that were provisioned out-of-band and imports them into IaC.
  These roles already exist in the account -- running this template performs
  an in-place update, not a net-new creation. See PR #36 and PR #39 for
  the original provisioning context.

  S-04: GhaCfnDeployPermissionsBoundary added (2026-05-19). Attached to
  gha-infra-cfn-deploy to cap its effective permissions. The boundary removes
  secretsmanager:GetSecretValue and secretsmanager:PutSecretValue (EC2 role
  reads secrets at runtime; CFN only manages secret lifecycle). All other
  permissions match the inline policy one-for-one so the boundary never
  tightens currently-required operations. See RdHamilton/vault-mtg#2325.

  Deploy order: standalone (no stack dependencies).

Parameters:
  GitHubOrg:
    Type: String
    Default: RdHamilton
    Description: GitHub organization or user that owns the repositories

  InfraRepo:
    Type: String
    Default: mtga-companion-infra
    Description: GitHub repository name for the infra OIDC roles

  OidcProviderArn:
    Type: String
    Default: arn:aws:iam::901347789205:oidc-provider/token.actions.githubusercontent.com
    Description: ARN of the GitHub Actions OIDC provider in this account

  AppRepo:
    Type: String
    Default: vault-mtg
    Description: GitHub repository name for the main VaultMTG app (renamed from MTGA-Companion)

  WebRepo:
    Type: String
    Default: vault-mtg-web
    Description: GitHub repository name for the VaultMTG marketing/web site

  SyncLambdaFunctionArn:
    Type: String
    Default: arn:aws:lambda:us-east-1:901347789205:function:vault-mtg-sync
    Description: ARN of the vault-mtg-sync Lambda function

  SyncLambdaStackArn:
    Type: String
    Default: arn:aws:cloudformation:us-east-1:901347789205:stack/mtga-companion-sync-lambda/*
    Description: ARN pattern for the sync-lambda CloudFormation stack

Resources:
  # ---------------------------------------------------------------------------
  # Permissions boundary for gha-infra-cfn-deploy (S-04)
  #
  # This managed policy acts as a ceiling on the effective permissions of the
  # gha-infra-cfn-deploy role. A permissions boundary is evaluated alongside
  # the identity policy (logical AND): both must Allow an action for it to be
  # granted. The boundary closes two over-grant categories from Sarah's S-07
  # review:
  #
  #   1. secretsmanager:GetSecretValue -- removed. The deploy role manages
  #      secret lifecycle (create/delete/describe/tag) for RDS-managed secrets
  #      but never needs to read plaintext values. The EC2 instance role
  #      (mtga-companion-ec2-role-*) reads secrets at runtime.
  #
  #   2. secretsmanager:PutSecretValue -- removed. RDS ManageMasterUserPassword
  #      has AWS rotate the secret value directly; the deploy role is not in
  #      the rotation path.
  #
  # All other actions in the inline policy are mirrored here so the boundary
  # does not silently block legitimate operations. When the inline policy is
  # narrowed in a future PR (e.g., IAM actions scoped to project-prefix ARNs),
  # this boundary can be tightened in the same PR.
  #
  # Boundary does NOT allow:
  #   - secretsmanager:GetSecretValue
  #   - secretsmanager:PutSecretValue
  #   - iam:* (wildcard) -- never granted; specific actions only
  #   - Any action not explicitly listed
  # ---------------------------------------------------------------------------
  GhaCfnDeployPermissionsBoundary:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: gha-cfn-deploy-permissions-boundary
      Description: >
        Permissions boundary for gha-infra-cfn-deploy. Caps effective permissions
        to exclude secretsmanager:GetSecretValue and secretsmanager:PutSecretValue
        which are not required by the CFN deploy workflow. See vault-mtg#2325.
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          # CloudFormation stack operations (scoped to project prefixes)
          - Sid: CloudFormationStackOperations
            Effect: Allow
            Action: cloudformation:*
            Resource:
              - arn:aws:cloudformation:us-east-1:901347789205:stack/mtga-companion-*/*
              - arn:aws:cloudformation:us-east-1:901347789205:stack/vaultmtg-*/*

          # CloudFormation global read-only (validate, list, describe)
          - Sid: CloudFormationGlobal
            Effect: Allow
            Action:
              - cloudformation:ValidateTemplate
              - cloudformation:ListStacks
              - cloudformation:DescribeStacks
            Resource: "*"

          # IAM: specific actions needed to manage roles created by the CFN
          # stacks (EC2 instance role, Lambda execution role, scheduler role,
          # OIDC provider, instance profiles). Wildcard resource is retained
          # here to match the current inline policy; ARN scoping to
          # project-prefix role names is tracked as a follow-on hardening item.
          # iam:* (wildcard action) is intentionally excluded.
          - Sid: IAMManage
            Effect: Allow
            Action:
              - iam:PassRole
              - iam:CreateRole
              - iam:DeleteRole
              - iam:GetRole
              - iam:UpdateRole
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:GetRolePolicy
              - iam:ListRolePolicies
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:ListAttachedRolePolicies
              - iam:TagRole
              - iam:UntagRole
              - iam:CreateInstanceProfile
              - iam:DeleteInstanceProfile
              - iam:GetInstanceProfile
              - iam:AddRoleToInstanceProfile
              - iam:RemoveRoleFromInstanceProfile
              - iam:CreateOIDCProvider
              - iam:DeleteOIDCProvider
              - iam:GetOIDCProvider
              - iam:UpdateOIDCProvider
              - iam:TagOIDCProvider
              - iam:ListOIDCProviders
              # Required for CFN to attach this boundary to roles it creates
              - iam:PutRolePermissionsBoundary
              # Required to manage the boundary policy itself
              - iam:CreatePolicy
              - iam:CreatePolicyVersion
              - iam:DeletePolicy
              - iam:DeletePolicyVersion
              - iam:GetPolicy
              - iam:GetPolicyVersion
              - iam:ListPolicies
              - iam:ListPolicyVersions
            Resource: "*"

          # EC2: full set needed to manage instances, security groups, EIPs,
          # subnets, VPC resources created by the ec2 and ec2-sg stacks.
          - Sid: EC2
            Effect: Allow
            Action:
              - ec2:*
            Resource: "*"

          # RDS: full set needed to manage the PostgreSQL instance, subnet
          # groups, parameter groups, and security group ingress rules.
          - Sid: RDS
            Effect: Allow
            Action:
              - rds:*
            Resource: "*"

          # Lambda: full set needed to create/update the sync Lambda function,
          # VPC config custom resource Lambda, and Lambda permissions.
          - Sid: Lambda
            Effect: Allow
            Action:
              - lambda:*
            Resource: "*"

          # S3: bucket lifecycle management for deploy-artifacts, CDN, and
          # CloudTrail log buckets. Object-level actions are intentionally
          # excluded (the deploy role does not read/write bucket objects).
          - Sid: S3
            Effect: Allow
            Action:
              - s3:CreateBucket
              - s3:DeleteBucket
              - s3:GetBucketLocation
              - s3:GetBucketPolicy
              - s3:PutBucketPolicy
              - s3:DeleteBucketPolicy
              - s3:GetBucketVersioning
              - s3:PutBucketVersioning
              - s3:PutBucketPublicAccessBlock
              - s3:GetBucketPublicAccessBlock
              - s3:PutBucketEncryption
              - s3:GetBucketEncryption
              - s3:PutBucketTagging
              - s3:GetBucketTagging
              - s3:PutLifecycleConfiguration
              - s3:GetLifecycleConfiguration
              - s3:PutBucketNotification
              - s3:GetBucketNotification
              - s3:GetBucketCORS
              - s3:PutBucketCORS
              - s3:GetBucketObjectLockConfiguration
              - s3:PutBucketObjectLockConfiguration
              - s3:PutBucketAcl
              - s3:GetBucketAcl
            Resource: "*"

          # CloudFront: distributions and OAC for CDN stack.
          - Sid: CloudFront
            Effect: Allow
            Action:
              - cloudfront:*
            Resource: "*"

          # ACM: certificate management for CDN/HTTPS stacks.
          - Sid: ACM
            Effect: Allow
            Action:
              - acm:RequestCertificate
              - acm:DescribeCertificate
              - acm:DeleteCertificate
              - acm:ListCertificates
              - acm:AddTagsToCertificate
              - acm:ListTagsForCertificate
            Resource: "*"

          # Route 53: DNS records and health checks.
          - Sid: Route53
            Effect: Allow
            Action:
              - route53:CreateHostedZone
              - route53:DeleteHostedZone
              - route53:GetHostedZone
              - route53:ListHostedZones
              - route53:ChangeResourceRecordSets
              - route53:GetChange
              - route53:ListResourceRecordSets
              - route53:CreateHealthCheck
              - route53:DeleteHealthCheck
              - route53:GetHealthCheck
              - route53:UpdateHealthCheck
              - route53:ListHealthChecks
            Resource: "*"

          # CloudWatch: alarms for production/staging monitoring stacks.
          - Sid: CloudWatch
            Effect: Allow
            Action:
              - cloudwatch:PutMetricAlarm
              - cloudwatch:DeleteAlarms
              - cloudwatch:DescribeAlarms
              - cloudwatch:ListTagsForResource
              - cloudwatch:TagResource
            Resource: "*"

          # SNS: alarm notification topics.
          - Sid: SNS
            Effect: Allow
            Action:
              - sns:CreateTopic
              - sns:DeleteTopic
              - sns:GetTopicAttributes
              - sns:SetTopicAttributes
              - sns:Subscribe
              - sns:Unsubscribe
              - sns:ListSubscriptionsByTopic
              - sns:TagResource
              - sns:ListTagsForResource
            Resource: "*"

          # SSM: parameter management for deploy pipeline config.
          - Sid: SSM
            Effect: Allow
            Action:
              - ssm:GetParameter
              - ssm:GetParameters
              - ssm:PutParameter
              - ssm:DeleteParameter
              - ssm:DescribeParameters
              - ssm:AddTagsToResource
              - ssm:ListTagsForResource
            Resource: "*"

          # Secrets Manager: lifecycle management only. GetSecretValue and
          # PutSecretValue are explicitly excluded -- the deploy role manages
          # secret metadata but never reads or writes plaintext secret values.
          # RDS ManageMasterUserPassword has AWS rotate values directly.
          # The EC2 instance role reads secrets at runtime.
          - Sid: SecretsManagerLifecycle
            Effect: Allow
            Action:
              - secretsmanager:CreateSecret
              - secretsmanager:DeleteSecret
              - secretsmanager:DescribeSecret
              - secretsmanager:TagResource
              - secretsmanager:ListSecrets
            Resource: "*"

          # KMS: key describe/list for CloudTrail encryption; CreateGrant
          # is required when CFN creates the CloudTrail KMS key policy.
          - Sid: KMS
            Effect: Allow
            Action:
              - kms:DescribeKey
              - kms:ListKeys
              - kms:CreateGrant
              - kms:CreateKey
              - kms:EnableKeyRotation
              - kms:GetKeyPolicy
              - kms:PutKeyPolicy
              - kms:TagResource
              - kms:CreateAlias
              - kms:DeleteAlias
              - kms:ListAliases
              - kms:ScheduleKeyDeletion
            Resource: "*"

          # EventBridge Scheduler and Events: daily sync schedule.
          - Sid: EventBridge
            Effect: Allow
            Action:
              - scheduler:CreateSchedule
              - scheduler:UpdateSchedule
              - scheduler:DeleteSchedule
              - scheduler:GetSchedule
              - scheduler:ListSchedules
              - events:PutRule
              - events:DeleteRule
              - events:DescribeRule
              - events:PutTargets
              - events:RemoveTargets
            Resource: "*"

          # SQS: dead-letter queue for sync Lambda.
          - Sid: SQS
            Effect: Allow
            Action:
              - sqs:CreateQueue
              - sqs:DeleteQueue
              - sqs:GetQueueAttributes
              - sqs:SetQueueAttributes
              - sqs:ListQueueTags
              - sqs:TagQueue
              - sqs:SetQueueAttributes
              - sqs:GetQueueUrl
            Resource: "*"

          # CloudTrail: trail management for the cloudtrail stack.
          - Sid: CloudTrail
            Effect: Allow
            Action:
              - cloudtrail:CreateTrail
              - cloudtrail:DeleteTrail
              - cloudtrail:DescribeTrails
              - cloudtrail:GetTrail
              - cloudtrail:GetTrailStatus
              - cloudtrail:UpdateTrail
              - cloudtrail:StartLogging
              - cloudtrail:StopLogging
              - cloudtrail:PutEventSelectors
              - cloudtrail:GetEventSelectors
              - cloudtrail:AddTags
              - cloudtrail:ListTags
            Resource: "*"

  # ---------------------------------------------------------------------------
  # github-actions-oidc-deploy
  # Assumed by vault-mtg staging-deploy.yml and deploy-spa*.yml workflows for
  # app deploys (BFF staging binary, SPA CDN, marketing site).
  # This role was provisioned out-of-band and codified here post-P0 incident
  # on 2026-05-21 when the trust policy still referenced the pre-rename repo
  # name RdHamilton/MTGA-Companion. The sub-claim has been updated to
  # vault-mtg (current name). vault-mtg-web and mtga-companion-web retained
  # for rollback safety; mtga-companion-web can be pruned after the next
  # vault-mtg-web OIDC re-auth confirms the new claim works.
  # See vault-mtg#ISSUE (Hotfix: OIDC trust policy stale post-rename).
  # ---------------------------------------------------------------------------
  GhaAppDeployRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    Properties:
      RoleName: github-actions-oidc-deploy
      Description: >
        GitHub Actions OIDC role for staging-deploy.yml and deploy-spa*.yml
        in vault-mtg and vault-mtg-web. Grants BFF staging S3 upload,
        SPA/marketing CDN invalidation, SSM send-command for EC2 deploys,
        and SSM parameter reads for deploy config.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref OidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub:
                  - !Sub repo:${GitHubOrg}/${AppRepo}:*
                  - !Sub repo:${GitHubOrg}/${WebRepo}:*
                  - !Sub repo:${GitHubOrg}/mtga-companion-web:*
      Policies:
        - PolicyName: github-actions-deploy-permissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: S3DeployBuckets
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:CreateBucket
                  - s3:PutBucketVersioning
                  - s3:GetBucketVersioning
                Resource:
                  - arn:aws:s3:::mtga-companion-deploy-artifacts-production
                  - arn:aws:s3:::mtga-companion-deploy-artifacts-production/*
                  - arn:aws:s3:::vaultmtg-app-marketing
                  - arn:aws:s3:::vaultmtg-app-marketing/*
                  - arn:aws:s3:::vaultmtg-app-spa
                  - arn:aws:s3:::vaultmtg-app-spa/*
                  - arn:aws:s3:::vaultmtg-stg-app-spa
                  - arn:aws:s3:::vaultmtg-stg-app-spa/*
                  - arn:aws:s3:::rhamiltoneng-site
                  - arn:aws:s3:::rhamiltoneng-site/*
                  - arn:aws:s3:::mtga-companion-deploy-artifacts-staging
                  - arn:aws:s3:::mtga-companion-deploy-artifacts-staging/*
                  - arn:aws:s3:::vaultmtg-deploy-artifacts-staging
                  - arn:aws:s3:::vaultmtg-deploy-artifacts-staging/*
              - Sid: CloudFrontInvalidations
                Effect: Allow
                Action: cloudfront:CreateInvalidation
                Resource:
                  - arn:aws:cloudfront::901347789205:distribution/E2X31QYC4F5OX1
                  - arn:aws:cloudfront::901347789205:distribution/E1CMIQSPLX5W4K
                  - arn:aws:cloudfront::901347789205:distribution/E38F9CK3CM4EZZ
                  - arn:aws:cloudfront::901347789205:distribution/EAZCYZ6PU3733
              - Sid: SSMParameterRead
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource:
                  - arn:aws:ssm:us-east-1:901347789205:parameter/mtga-companion/*
                  - arn:aws:ssm:us-east-1:901347789205:parameter/vault-mtg/*
                  - arn:aws:ssm:us-east-1:901347789205:parameter/mtga-companion-web/*
                  - arn:aws:ssm:us-east-1:901347789205:parameter/vaultmtg/*
                  - arn:aws:ssm:us-east-1:901347789205:parameter/rhamiltoneng/*
              - Sid: SSMSendCommand
                Effect: Allow
                Action: ssm:SendCommand
                Resource:
                  - arn:aws:ec2:us-east-1:901347789205:instance/i-065351fbb99da2d22
                  - arn:aws:ec2:us-east-1:901347789205:instance/i-0226bf51fcf09b506
                  - arn:aws:ssm:us-east-1::document/AWS-RunShellScript
              - Sid: SSMGetCommandInvocation
                Effect: Allow
                Action: ssm:GetCommandInvocation
                Resource: "*"
              - Sid: EC2DescribeForSSM
                Effect: Allow
                Action: ec2:DescribeInstances
                Resource: "*"
              - Sid: LambdaUpdateSync
                Effect: Allow
                Action: lambda:UpdateFunctionCode
                Resource: arn:aws:lambda:us-east-1:901347789205:function:mtga-sync
      Tags:
        - Key: ManagedBy
          Value: cloudformation
        - Key: Stack
          Value: !Sub mtga-companion-iam-gha-roles
        - Key: Purpose
          Value: github-actions-oidc

  # ---------------------------------------------------------------------------
  # gha-infra-sync-deploy
  # Assumed by deploy-sync-lambda.yml to update the vault-mtg-sync Lambda
  # and manage its CloudFormation stack. Scoped to the infra repo only.
  # ---------------------------------------------------------------------------
  GhaInfraSyncDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: gha-infra-sync-deploy
      Description: >
        GitHub Actions OIDC role for deploy-sync-lambda.yml.
        Permits Lambda code/config updates and CloudFormation operations
        on the mtga-companion-sync-lambda stack.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref OidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${InfraRepo}:*
      Policies:
        - PolicyName: sync-lambda-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: LambdaDeploy
                Effect: Allow
                Action:
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:CreateFunction
                  - lambda:WaitForFunctionUpdated
                Resource: !Ref SyncLambdaFunctionArn
              - Sid: CloudFormationSyncStack
                Effect: Allow
                Action: cloudformation:*
                Resource: !Ref SyncLambdaStackArn
      Tags:
        - Key: ManagedBy
          Value: cloudformation
        - Key: Stack
          Value: !Sub mtga-companion-iam-gha-roles
        - Key: Purpose
          Value: github-actions-oidc

  # ---------------------------------------------------------------------------
  # gha-infra-cfn-deploy
  # Assumed by deploy.yml to provision / update all other CloudFormation stacks
  # in this repo. Broad CloudFormation + resource permissions scoped to
  # mtga-companion-* and vaultmtg-* stack name prefixes where possible.
  #
  # S-04: PermissionsBoundary attached. Closes secretsmanager:GetSecretValue
  # and secretsmanager:PutSecretValue over-grants confirmed by Sarah's S-07
  # review. The boundary and inline policy are maintained in parallel -- when
  # the inline policy is tightened, tighten the boundary in the same PR.
  # ---------------------------------------------------------------------------
  GhaInfraCfnDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: gha-infra-cfn-deploy
      Description: >
        GitHub Actions OIDC role for deploy.yml (general CloudFormation deploys).
        Permits stack CRUD operations across mtga-companion-* and vaultmtg-*
        stacks, and the AWS resource actions needed to provision those stacks.
        PermissionsBoundary (gha-cfn-deploy-permissions-boundary) excludes
        secretsmanager:GetSecretValue and secretsmanager:PutSecretValue.
      PermissionsBoundary: !Ref GhaCfnDeployPermissionsBoundary
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref OidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${InfraRepo}:*
      Policies:
        - PolicyName: cfn-stack-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CloudFormationStackOperations
                Effect: Allow
                Action: cloudformation:*
                Resource:
                  - arn:aws:cloudformation:us-east-1:901347789205:stack/mtga-companion-*/*
                  - arn:aws:cloudformation:us-east-1:901347789205:stack/vaultmtg-*/*
              - Sid: CloudFormationGlobal
                Effect: Allow
                Action:
                  - cloudformation:ValidateTemplate
                  - cloudformation:ListStacks
                  - cloudformation:DescribeStacks
                Resource: "*"
              - Sid: IAMPassAndManage
                Effect: Allow
                Action:
                  - iam:PassRole
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:UpdateRole
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:ListRolePolicies
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:ListAttachedRolePolicies
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:CreateInstanceProfile
                  - iam:DeleteInstanceProfile
                  - iam:GetInstanceProfile
                  - iam:AddRoleToInstanceProfile
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:CreateOIDCProvider
                  - iam:DeleteOIDCProvider
                  - iam:GetOIDCProvider
                  - iam:UpdateOIDCProvider
                  - iam:TagOIDCProvider
                  - iam:ListOIDCProviders
                  - iam:PutRolePermissionsBoundary
                  - iam:CreatePolicy
                  - iam:CreatePolicyVersion
                  - iam:DeletePolicy
                  - iam:DeletePolicyVersion
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:ListPolicies
                  - iam:ListPolicyVersions
                Resource: "*"
              - Sid: EC2
                Effect: Allow
                Action: ec2:*
                Resource: "*"
              - Sid: RDS
                Effect: Allow
                Action: rds:*
                Resource: "*"
              - Sid: Lambda
                Effect: Allow
                Action: lambda:*
                Resource: "*"
              - Sid: S3
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:GetBucketLocation
                  - s3:GetBucketPolicy
                  - s3:PutBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:GetBucketVersioning
                  - s3:PutBucketVersioning
                  - s3:PutBucketPublicAccessBlock
                  - s3:GetBucketPublicAccessBlock
                  - s3:PutBucketEncryption
                  - s3:GetBucketEncryption
                  - s3:PutBucketTagging
                  - s3:GetBucketTagging
                  - s3:PutLifecycleConfiguration
                  - s3:GetLifecycleConfiguration
                  - s3:PutBucketNotification
                  - s3:GetBucketNotification
                  - s3:GetBucketCORS
                  - s3:PutBucketCORS
                Resource: "*"
              - Sid: CloudFront
                Effect: Allow
                Action: cloudfront:*
                Resource: "*"
              - Sid: ACM
                Effect: Allow
                Action:
                  - acm:RequestCertificate
                  - acm:DescribeCertificate
                  - acm:DeleteCertificate
                  - acm:ListCertificates
                  - acm:AddTagsToCertificate
                  - acm:ListTagsForCertificate
                Resource: "*"
              - Sid: Route53
                Effect: Allow
                Action:
                  - route53:CreateHostedZone
                  - route53:DeleteHostedZone
                  - route53:GetHostedZone
                  - route53:ListHostedZones
                  - route53:ChangeResourceRecordSets
                  - route53:GetChange
                  - route53:ListResourceRecordSets
                  - route53:CreateHealthCheck
                  - route53:DeleteHealthCheck
                  - route53:GetHealthCheck
                Resource: "*"
              - Sid: CloudWatch
                Effect: Allow
                Action:
                  - cloudwatch:PutMetricAlarm
                  - cloudwatch:DeleteAlarms
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:ListTagsForResource
                  - cloudwatch:TagResource
                Resource: "*"
              - Sid: SNS
                Effect: Allow
                Action:
                  - sns:CreateTopic
                  - sns:DeleteTopic
                  - sns:GetTopicAttributes
                  - sns:SetTopicAttributes
                  - sns:Subscribe
                  - sns:Unsubscribe
                  - sns:ListSubscriptionsByTopic
                  - sns:TagResource
                  - sns:ListTagsForResource
                Resource: "*"
              - Sid: SSM
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:PutParameter
                  - ssm:DeleteParameter
                  - ssm:DescribeParameters
                  - ssm:AddTagsToResource
                  - ssm:ListTagsForResource
                Resource: "*"
              # Secrets Manager: lifecycle management only.
              # secretsmanager:GetSecretValue removed -- the deploy role does
              # not read secret values. The EC2 instance role reads secrets at
              # runtime. secretsmanager:PutSecretValue removed -- RDS
              # ManageMasterUserPassword has AWS rotate the credential directly.
              # The permissions boundary (GhaCfnDeployPermissionsBoundary)
              # enforces these exclusions as a hard ceiling.
              - Sid: SecretsManagerLifecycle
                Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:DeleteSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:TagResource
                  - secretsmanager:ListSecrets
                Resource: "*"
              - Sid: KMS
                Effect: Allow
                Action:
                  - kms:DescribeKey
                  - kms:ListKeys
                  - kms:CreateGrant
                  - kms:CreateKey
                  - kms:EnableKeyRotation
                  - kms:GetKeyPolicy
                  - kms:PutKeyPolicy
                  - kms:TagResource
                  - kms:CreateAlias
                  - kms:DeleteAlias
                  - kms:ListAliases
                  - kms:ScheduleKeyDeletion
                Resource: "*"
              - Sid: EventBridge
                Effect: Allow
                Action:
                  - scheduler:CreateSchedule
                  - scheduler:UpdateSchedule
                  - scheduler:DeleteSchedule
                  - scheduler:GetSchedule
                  - scheduler:ListSchedules
                  - events:PutRule
                  - events:DeleteRule
                  - events:DescribeRule
                  - events:PutTargets
                  - events:RemoveTargets
                Resource: "*"
              - Sid: SQS
                Effect: Allow
                Action:
                  - sqs:CreateQueue
                  - sqs:DeleteQueue
                  - sqs:GetQueueAttributes
                  - sqs:SetQueueAttributes
                  - sqs:ListQueueTags
                  - sqs:TagQueue
                Resource: "*"
              - Sid: CloudTrail
                Effect: Allow
                Action:
                  - cloudtrail:CreateTrail
                  - cloudtrail:DeleteTrail
                  - cloudtrail:DescribeTrails
                  - cloudtrail:GetTrail
                  - cloudtrail:GetTrailStatus
                  - cloudtrail:UpdateTrail
                  - cloudtrail:StartLogging
                  - cloudtrail:StopLogging
                  - cloudtrail:PutEventSelectors
                  - cloudtrail:GetEventSelectors
                  - cloudtrail:AddTags
                  - cloudtrail:ListTags
                Resource: "*"
      Tags:
        - Key: ManagedBy
          Value: cloudformation
        - Key: Stack
          Value: !Sub mtga-companion-iam-gha-roles
        - Key: Purpose
          Value: github-actions-oidc

Outputs:
  GhaAppDeployRoleArn:
    Description: ARN of the github-actions-oidc-deploy role (used by staging-deploy.yml and deploy-spa*.yml)
    Value: !GetAtt GhaAppDeployRole.Arn
    Export:
      Name: !Sub mtga-companion-iam-gha-roles-AppDeployRoleArn

  GhaInfraSyncDeployRoleArn:
    Description: ARN of the gha-infra-sync-deploy OIDC role (used by deploy-sync-lambda.yml)
    Value: !GetAtt GhaInfraSyncDeployRole.Arn
    Export:
      Name: !Sub mtga-companion-iam-gha-roles-SyncDeployRoleArn

  GhaInfraCfnDeployRoleArn:
    Description: ARN of the gha-infra-cfn-deploy OIDC role (used by deploy.yml)
    Value: !GetAtt GhaInfraCfnDeployRole.Arn
    Export:
      Name: !Sub mtga-companion-iam-gha-roles-CfnDeployRoleArn

  GhaCfnDeployPermissionsBoundaryArn:
    Description: ARN of the permissions boundary policy for gha-infra-cfn-deploy
    Value: !Ref GhaCfnDeployPermissionsBoundary
    Export:
      Name: !Sub mtga-companion-iam-gha-roles-CfnDeployBoundaryArn
