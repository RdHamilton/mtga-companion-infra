AWSTemplateFormatVersion: "2010-09-09"
Description: >
  VaultMTG PRODUCTION RDS PostgreSQL instance (vaultmtg-rds stack).
  Private subnet only, encrypted at rest, RDS-managed master password.
  Production-only as of 2026-05-27 -- prior to the staging separation
  (Phase 1, infra PR #238) this same instance also hosted the staging
  vaultmtg_staging database via logical-only separation. Staging now lives
  on its own dedicated instance (rds-vaultmtg-staging stack); this one
  serves production traffic exclusively.
  This template is the import target for the 'mtga-companion-rds' -> vaultmtg-rds
  stack rename (ticket #2592). The live RDS instance and its supporting
  resources were created by the legacy 'mtga-companion-rds' stack and are being
  adopted into this new stack via a CFN ChangeSetType=IMPORT changeset (see
  ADR-022 § stack-rename). All importable resources carry both DeletionPolicy
  and UpdateReplacePolicy: Retain so the IMPORT operation is non-destructive
  and reversible at every step.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
# NOTE: Subnet IDs and VPC ID are kept as parameters to preserve parity with
# rds.yml so the consumer-migration PR (PR B for #2592) can swap stack names
# without re-parameterising. Live values are pinned by the parameters file at
# cloudformation/parameters/rds-vaultmtg.json (filed in PR B alongside the
# STACK_MAP wiring).
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC the RDS instance lives in (vpc-01d097c495e941d32 in prod)

  PrivateSubnet1Id:
    Type: AWS::EC2::Subnet::Id
    Description: First private subnet (us-east-1a in prod)

  PrivateSubnet2Id:
    Type: AWS::EC2::Subnet::Id
    Description: Second private subnet (us-east-1b in prod)

  DBName:
    Type: String
    Default: mtga_companion
    Description: >
      Initial database name as recorded by RDS at instance creation. This
      field is frozen at create time and does NOT reflect the in-database
      ALTER DATABASE rename performed in #1996 §5e (the live PG database is
      named `vaultmtg`). The RDS metadata field cannot be rewritten without
      replacing the instance, so the template carries the legacy value to
      satisfy the IMPORT property-match requirement.

  DBUsername:
    Type: String
    Default: mtga_admin
    Description: Master username on the RDS instance (frozen at create time)

  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # --- Security Group ---------------------------------------------------------
  # Ingress rules are owned by consumer stacks (ec2-sg.yml's RDSIngressFromEC2,
  # sync-lambda.yml's RDSIngressFromLambda) to break the cross-stack dependency
  # cycle that would form if this stack imported the source SG IDs. See #2534
  # for the symmetric-refactor history. The live SG (sg-0290854dc63d3b6e9)
  # currently has two ingress rules attached, both owned by those external
  # stacks; this template MUST NOT redeclare them or IMPORT will fail.
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      GroupDescription: Allow PostgreSQL access from EC2 only
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: mtga-companion-rds-sg
        - Key: Project
          Value: mtga-companion
        - Key: Environment
          Value: !Ref Environment

  # --- Subnet Group -----------------------------------------------------------
  # The live subnet group name ('mtga-companion-rds-dbsubnetgroup-w2lokqtloot6')
  # was CFN-autogenerated by the legacy stack and cannot be renamed in place.
  # The IMPORT resources-to-import map binds this logical ID to the existing
  # physical name; the rename to a vaultmtg-* identifier is a future ticket
  # that will require an instance recreate.
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DBSubnetGroupDescription: Private subnets for MTGA Companion RDS
      SubnetIds:
        - !Ref PrivateSubnet1Id
        - !Ref PrivateSubnet2Id
      Tags:
        - Key: Project
          Value: mtga-companion
        - Key: Environment
          Value: !Ref Environment

  # --- Parameter Group --------------------------------------------------------
  # Same naming constraint as the subnet group above — live name is
  # 'mtga-companion-rds-dbparametergroup-fumbwwhbvnwr' (CFN-autogenerated). The
  # rename to vaultmtg-* requires the new group to be created and attached
  # via a separate change window (parameter group switch on an active
  # instance requires a reboot).
  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: MTGA Companion PostgreSQL 15
      Family: postgres15
      Parameters:
        shared_preload_libraries: pg_stat_statements
        log_connections: "1"
        log_disconnections: "1"
        log_min_duration_statement: "1000"
      Tags:
        - Key: Project
          Value: mtga-companion
        - Key: Environment
          Value: !Ref Environment

  # --- RDS Instance -----------------------------------------------------------
  # All identifier properties below are pinned to the LIVE values verified via
  # `aws rds describe-db-instances --db-instance-identifier vaultmtg-postgres`
  # on 2026-05-25. Any drift between this template and the live instance will
  # cause the IMPORT changeset to fail validation (CloudFormation refuses to
  # adopt a resource whose properties don't match what you declare).
  DBInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DBInstanceIdentifier: vaultmtg-postgres
      DBName: !Ref DBName
      Engine: postgres
      EngineVersion: "15.7"
      DBInstanceClass: db.t3.micro
      AllocatedStorage: "20"
      StorageType: gp3
      StorageEncrypted: true
      MasterUsername: !Ref DBUsername
      ManageMasterUserPassword: true
      # IAM database authentication is required by the sync Lambda (ADR-003,
      # ADR-035). Without this flag set on the instance, the rds_iam Postgres
      # role does not exist and the engine treats inbound IAM tokens as raw
      # passwords -- producing the SASL "password authentication failed"
      # error observed against mtga_sync on the live instance prior to this
      # change. Enabling IAM auth is an online operation (Update requires:
      # No interruption) and is non-destructive: existing password-auth
      # connections (vaultmtg_app, mtga_admin) continue to work alongside
      # token-auth connections from the sync Lambda. See vault-mtg-tickets#37.
      EnableIAMDatabaseAuthentication: true
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      DBParameterGroupName: !Ref DBParameterGroup
      MultiAZ: false
      PubliclyAccessible: false
      BackupRetentionPeriod: 7
      PreferredBackupWindow: "03:00-04:00"
      PreferredMaintenanceWindow: "mon:04:00-mon:05:00"
      EnablePerformanceInsights: false
      AutoMinorVersionUpgrade: true
      DeletionProtection: true
      Tags:
        - Key: Project
          Value: mtga-companion
        - Key: Environment
          Value: !Ref Environment

# ---------------------------------------------------------------------------
# Intentionally NOT declared
# ---------------------------------------------------------------------------
# - AWS::SecretsManager::Secret (master password)
#     The instance uses ManageMasterUserPassword: true, so AWS owns the secret
#     natively. The secret ARN
#     (arn:aws:secretsmanager:us-east-1:...:secret:rds!db-12c647a0-...-qzBP5e)
#     is an RDS-managed secret with the `rds!db-...` prefix and CANNOT be
#     adopted into CloudFormation as an AWS::SecretsManager::Secret. The
#     DBInstance resource exposes it via the !GetAtt
#     DBInstance.MasterUserSecret.SecretArn intrinsic, which is what the
#     Outputs block below uses. There is no IMPORT path for the secret itself.
#
# - AWS::SecretsManager::RotationSchedule
#     The legacy template declared a RotationSchedule overriding the rotation
#     cadence to 90 days. That CFN resource was deleted from CFN's view when
#     the stack drifted during the live rename, but the underlying rotation
#     config is still active on the RDS-managed secret. Re-importing it as a
#     CFN resource is not supported for RDS-managed secrets (RotationSchedule
#     IMPORT is only documented for customer-owned secrets). Rotation cadence
#     can be re-asserted post-import via `aws secretsmanager rotate-secret`
#     or by attaching a new RotationSchedule once the import settles; this is
#     deferred to a follow-on ticket.

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
# Export names use the new vaultmtg-rds-* prefix. Consumer migration (PR B
# for #2592) updates every Fn::ImportValue and RdsStackName default to match.
Outputs:
  DBEndpoint:
    Description: RDS PostgreSQL endpoint hostname
    Value: !GetAtt DBInstance.Endpoint.Address
    Export:
      Name: !Sub "${AWS::StackName}-DBEndpoint"

  DBPort:
    Description: RDS PostgreSQL port
    Value: !GetAtt DBInstance.Endpoint.Port
    Export:
      Name: !Sub "${AWS::StackName}-DBPort"

  DBName:
    Description: >
      Database name as recorded by RDS metadata at instance creation. NOTE:
      the live PG database is named `vaultmtg` (renamed via ALTER DATABASE in
      #1996 §5e); this output reflects the frozen RDS field, not the active
      DB name. Consumers should not rely on this output to construct
      connection strings — use SSM parameter
      /vaultmtg/app/production/db-endpoint and the database name baked into
      DATABASE_URL instead.
    Value: !Ref DBName
    Export:
      Name: !Sub "${AWS::StackName}-DBName"

  RDSSecurityGroupId:
    Description: RDS security group ID (referenced by ec2-sg and sync-lambda stacks)
    Value: !Ref RDSSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-RDSSecurityGroupId"

  DBSecretArn:
    Description: ARN of the RDS-managed Secrets Manager secret for master credentials
    Value: !GetAtt DBInstance.MasterUserSecret.SecretArn
    Export:
      Name: !Sub "${AWS::StackName}-DBSecretArn"
