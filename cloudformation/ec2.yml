AWSTemplateFormatVersion: "2010-09-09"
Description: >
  MTGA Companion - EC2 instance (BFF).
  Imports EC2SecurityGroupId from the ec2-sg stack and DBSecretArn from the rds stack.
  Deploy order: ec2-sg -> rds -> ec2.

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]
    Description: Deployment environment

  InstanceType:
    Type: String
    Default: t3.small
    Description: EC2 instance type

  AMI:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Amazon Linux 2023 latest AMI (resolved from SSM Parameter Store)

  KeyName:
    Type: String
    Default: ""
    Description: >
      EC2 key pair name for emergency access only. Leave empty if not needed.
      Port 22 is never opened - use SSM Session Manager instead.

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, ""]]

Resources:

  # ---------------------------------------------------------
  # IAM Role for EC2 instance
  # ---------------------------------------------------------
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "mtga-companion-ec2-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # SSM Session Manager access - port 22 is never opened
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: SecretsManagerDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !ImportValue mtga-companion-rds-DBSecretArn
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:mtga-companion/*"
        - PolicyName: SSMParameterStoreAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mtga-companion/*"
              # kms:Decrypt is required to read SecureString parameters (e.g.
              # /mtga-companion/prod/daemon-jwt-secret) encrypted with the
              # default SSM KMS key (alias/aws/ssm).
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/*"
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "ssm.${AWS::Region}.amazonaws.com"
        - PolicyName: S3DeployArtifactsRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub "arn:aws:s3:::mtga-companion-deploy-artifacts-${Environment}/*"
                  # Production EC2 also hosts the staging BFF service; grant read
                  # access to the staging artifact bucket so SSM deploy commands work.
                  - arn:aws:s3:::mtga-companion-deploy-artifacts-staging/*
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::mtga-companion-deploy-artifacts-${Environment}"
                  - arn:aws:s3:::mtga-companion-deploy-artifacts-staging
        - PolicyName: CloudFormationReadExports
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: cloudformation:ListExports
                Resource: "*"
        - PolicyName: CloudWatchMetricsPublish
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Allows the CloudWatch agent to push disk/mem metrics and allows
              # the bff-staging restart-metric timer to publish BffStagingRestartCount.
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:ListMetrics
                Resource: "*"
      Tags:
        - Key: Project
          Value: mtga-companion
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # IAM Instance Profile
  # ---------------------------------------------------------
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "mtga-companion-ec2-profile-${Environment}"
      Roles:
        - !Ref EC2InstanceRole

  # ---------------------------------------------------------
  # EC2 Instance
  # ---------------------------------------------------------
  EC2Instance:
    Type: AWS::EC2::Instance
    DeletionPolicy: Retain
    Properties:
      ImageId: !Ref AMI
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !ImportValue
          Fn::Sub: "mtga-companion-${Environment}-EC2SecurityGroupId"
      SubnetId: subnet-021e2cc715f426da1
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref "AWS::NoValue"]
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          # Bootstrap: install and configure MTGA Companion on Amazon Linux 2023.
          # Runs once at instance launch. All output logged to /var/log/mtga-companion-setup.log.
          exec > >(tee /var/log/mtga-companion-setup.log) 2>&1

          APP_USER="mtga-companion"
          BINARY_PATH="/usr/local/bin/mtga-bff"
          ENV_DIR="/etc/mtga-companion"
          SSM_PATH="/mtga-companion/production"
          REGION="${AWS::Region}"

          log() { echo "[setup] $(date '+%Y-%m-%dT%H:%M:%S') $*"; }

          # ---------------------------------------------------------
          # 1. System packages
          # ---------------------------------------------------------
          log "Updating packages..."
          dnf update -y --quiet
          dnf install -y nginx logrotate aws-cli jq python3 python3-pip
          pip3 install --quiet certbot certbot-nginx

          # ---------------------------------------------------------
          # 2. Application user and directories
          # ---------------------------------------------------------
          log "Creating app user..."
          id "$APP_USER" &>/dev/null || useradd --system --no-create-home --shell /sbin/nologin "$APP_USER"
          mkdir -p "$(dirname "$BINARY_PATH")" "$ENV_DIR"
          chmod 750 "$ENV_DIR"

          # ---------------------------------------------------------
          # 3. Environment file from Secrets Manager + SSM
          # ---------------------------------------------------------
          log "Fetching config from Secrets Manager and SSM..."
          fetch_ssm() {
              aws ssm get-parameter \
                  --region "$REGION" \
                  --name "$1" \
                  --with-decryption \
                  --query 'Parameter.Value' \
                  --output text 2>/dev/null || echo ""
          }
          PORT=$(fetch_ssm "${!SSM_PATH}/PORT" || echo "")
          PORT="${!PORT:-8080}"
          ALLOWED_ORIGINS=$(fetch_ssm "${!SSM_PATH}/ALLOWED_ORIGINS" || echo "")
          DAEMON_JWT_SECRET=$(fetch_ssm "/mtga-companion/prod/daemon-jwt-secret" || echo "")

          # Assemble DATABASE_URL from the RDS Secrets Manager secret
          DB_SECRET_ARN=$(aws cloudformation list-exports \
              --query "Exports[?Name=='mtga-companion-rds-DBSecretArn'].Value" \
              --output text --region "$REGION" 2>/dev/null || echo "")
          DATABASE_URL=""
          if [ -n "${!DB_SECRET_ARN}" ] && [ "${!DB_SECRET_ARN}" != "None" ]; then
              DB_JSON=$(aws secretsmanager get-secret-value \
                  --secret-id "${!DB_SECRET_ARN}" --query SecretString \
                  --output text --region "$REGION" 2>/dev/null || echo "{}")
              DB_HOST=$(echo "${!DB_JSON}" | jq -r '.host // empty' 2>/dev/null || echo "")
              DB_PORT=$(echo "${!DB_JSON}" | jq -r '.port // "5432"' 2>/dev/null || echo "5432")
              DB_NAME=$(echo "${!DB_JSON}" | jq -r '.dbname // empty' 2>/dev/null || echo "")
              DB_USER=$(echo "${!DB_JSON}" | jq -r '.username // empty' 2>/dev/null || echo "")
              DB_PASS=$(echo "${!DB_JSON}" | jq -r '.password // empty' 2>/dev/null || echo "")
              if [ -n "${!DB_HOST}" ]; then
                  DATABASE_URL="postgres://${!DB_USER}:${!DB_PASS}@${!DB_HOST}:${!DB_PORT}/${!DB_NAME}?sslmode=require"
              fi
          fi

          cat > "$ENV_DIR/env" <<ENVEOF
          PORT=${!PORT}
          DATABASE_URL=${!DATABASE_URL}
          MTGA_ENV=production
          AWS_REGION=${!REGION}
          GIN_MODE=release
          ALLOWED_ORIGINS=${!ALLOWED_ORIGINS}
          DAEMON_JWT_SECRET=${!DAEMON_JWT_SECRET}
          ENVEOF
          chmod 600 "$ENV_DIR/env"
          chown "root:$APP_USER" "$ENV_DIR/env"

          # ---------------------------------------------------------
          # 4. systemd service
          # ---------------------------------------------------------
          log "Installing systemd service..."
          cat > /etc/systemd/system/mtga-companion.service <<'UNIT'
          [Unit]
          Description=MTGA Companion BFF Service
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=mtga-companion
          Group=mtga-companion
          ExecStart=/usr/local/bin/mtga-bff
          Restart=on-failure
          RestartSec=5
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=mtga-bff
          EnvironmentFile=/etc/mtga-companion/env
          NoNewPrivileges=true
          PrivateTmp=true
          ProtectSystem=full

          [Install]
          WantedBy=multi-user.target
          UNIT

          systemctl daemon-reload
          systemctl enable mtga-companion

          # ---------------------------------------------------------
          # 5. nginx configuration
          # ---------------------------------------------------------
          log "Configuring nginx..."
          cat > /etc/nginx/conf.d/mtga-companion.conf <<'NGINX'
          limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

          server {
              listen 80 default_server;
              server_name _;

              location /.well-known/acme-challenge/ {
                  root /var/www/certbot;
              }

              location /api/v1/ {
                  limit_req zone=api_limit burst=10 nodelay;
                  proxy_pass         http://127.0.0.1:8080;
                  proxy_http_version 1.1;
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_connect_timeout 10s;
                  proxy_read_timeout    60s;
                  proxy_send_timeout    30s;
              }

              location /health {
                  proxy_pass       http://127.0.0.1:8080/health;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  access_log off;
              }

              root /var/www/mtga-companion;
              index index.html;

              location / {
                  try_files $uri $uri/ /index.html;
              }

              location ~ /\. {
                  deny all;
              }
          }
          NGINX

          rm -f /etc/nginx/conf.d/default.conf
          mkdir -p /var/www/mtga-companion /var/www/certbot
          chown -R nginx:nginx /var/www/mtga-companion /var/www/certbot
          nginx -t
          systemctl enable nginx
          systemctl start nginx

          # ---------------------------------------------------------
          # 6. Log rotation
          # ---------------------------------------------------------
          log "Configuring logrotate..."
          cat > /etc/logrotate.d/mtga-companion <<'LOGROTATE'
          /var/log/mtga-companion/*.log {
              daily
              rotate 14
              compress
              delaycompress
              missingok
              notifempty
              sharedscripts
              postrotate
                  systemctl kill -s HUP mtga-companion || true
              endscript
          }
          LOGROTATE

          # ---------------------------------------------------------
          # 7. Certbot / Let's Encrypt — ticket #977
          # Reads domain from SSM. Idempotent: skips if domain not set or cert exists.
          # ---------------------------------------------------------
          log "Checking for domain in SSM..."
          DOMAIN=$(fetch_ssm "/mtga-companion/production/domain-name" || echo "")
          if [ -n "${!DOMAIN}" ] && [ "${!DOMAIN}" != "None" ]; then
              log "Domain: ${!DOMAIN} — running certbot..."
              if [ ! -d "/etc/letsencrypt/live/${!DOMAIN}" ]; then
                  certbot --nginx --non-interactive --agree-tos \
                      --email "ray.hamilton@stablekernel.com" \
                      --domains "${!DOMAIN}" --redirect \
                      2>&1 | tee /var/log/certbot-init.log || log "WARNING: certbot failed"
              else
                  log "Cert already present — skipping."
              fi
              crontab -l 2>/dev/null | grep -q "certbot renew" || \
                  { crontab -l 2>/dev/null; echo "0 3 * * * certbot renew --quiet --nginx && systemctl reload nginx"; } | crontab -
          else
              log "No domain in SSM (/mtga-companion/production/domain-name) — skipping certbot."
          fi

          log "Bootstrap complete. Deploy binary to $BINARY_PATH then: systemctl start mtga-companion"
      Tags:
        - Key: Name
          Value: !Sub "mtga-companion-bff-${Environment}"
        - Key: Project
          Value: mtga-companion
        - Key: Environment
          Value: !Ref Environment

Outputs:
  InstanceId:
    Description: EC2 instance ID
    Value: !Ref EC2Instance
    Export:
      Name: !Sub "${AWS::StackName}-InstanceId"

  PublicIP:
    Description: EC2 instance public IP address
    Value: !GetAtt EC2Instance.PublicIp
    Export:
      Name: !Sub "${AWS::StackName}-PublicIP"
