AWSTemplateFormatVersion: "2010-09-09"
Description: >
  MTGA Companion - EC2 instance (BFF).
  Imports EC2SecurityGroupId from the ec2-sg stack and DBSecretArn from the rds stack.
  Deploy order: ec2-sg -> rds -> ec2.

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]
    Description: Deployment environment

  InstanceType:
    Type: String
    Default: t3.small
    Description: EC2 instance type

  AMI:
    Type: AWS::EC2::Image::Id
    # Pinned 2026-05-19. Previously used the SSM /aws/service/ami-amazon-linux-latest/...
    # dynamic pointer, which resolved to a different AMI on each stack update and risked
    # deploying an unverified OS version during instance replacement.
    #
    # Pinned value: ami-0236922087fa98b6e
    #   Name:    al2023-ami-2023.11.20260514.0-kernel-6.1-x86_64
    #   OS:      Amazon Linux 2023 (kernel 6.1, x86_64 HVM)
    #   Created: 2026-05-15
    #
    # AMI Rotation Procedure:
    #   1. Identify the new target AMI via:
    #        aws ec2 describe-images --owners amazon \
    #          --filters "Name=name,Values=al2023-ami-*-x86_64" \
    #                    "Name=state,Values=available" \
    #          --query 'sort_by(Images,&CreationDate)[-1].[ImageId,Name]' \
    #          --output table --profile personal
    #   2. Update this Default value to the new AMI ID.
    #   3. Commit, open a PR, and deploy via the deploy.yml GitHub Actions workflow.
    #      A CloudFormation changeset will show the AMI diff before execution.
    #   4. After deployment, verify the new instance is healthy via
    #        curl https://api.vaultmtg.app/healthz
    #      then update this comment with the new AMI ID, name, and pin date.
    Default: ami-0236922087fa98b6e
    Description: >
      Amazon Linux 2023 AMI pinned to ami-0236922087fa98b6e
      (al2023-ami-2023.11.20260514.0-kernel-6.1-x86_64, pinned 2026-05-19).
      See rotation procedure in the comment above.

  KeyName:
    Type: String
    Default: ""
    Description: >
      EC2 key pair name for emergency access only. Leave empty if not needed.
      Port 22 is never opened - use SSM Session Manager instead.

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, ""]]

Resources:

  # ---------------------------------------------------------
  # IAM Role for EC2 instance
  # ---------------------------------------------------------
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "mtga-companion-ec2-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        # ---------------------------------------------------------
        # SSMAgentConnectivity — replaces AmazonSSMManagedInstanceCore (F-1, #2441).
        #
        # AmazonSSMManagedInstanceCore (v2) includes ssm:GetParameter and
        # ssm:GetParameters on Resource: * — a wildcard that undercuts the
        # ARN-scoped parameter grants established by S-02 (#2310) and S-03 (#2364).
        #
        # This inline policy reproduces every statement from the managed policy
        # EXCEPT the GetParameter* actions, which are already covered by the
        # narrowed SSMParameterStoreAccess policy on this same role.
        #
        # Actions retained from managed policy statement 1 (SSM agent operations):
        #   ssm:DescribeAssociation, ssm:GetDeployablePatchSnapshotForInstance,
        #   ssm:GetDocument, ssm:DescribeDocument, ssm:GetManifest,
        #   ssm:ListAssociations, ssm:ListInstanceAssociations,
        #   ssm:PutInventory, ssm:PutComplianceItems, ssm:PutConfigurePackageResult,
        #   ssm:UpdateAssociationStatus, ssm:UpdateInstanceAssociationStatus,
        #   ssm:UpdateInstanceInformation
        # Actions omitted (covered by SSMParameterStoreAccess — ARN-scoped):
        #   ssm:GetParameter, ssm:GetParameters
        # ---------------------------------------------------------
        - PolicyName: SSMAgentConnectivity
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # SSM Agent operations — required for Session Manager, patch
              # management, Run Command. Resource: * is unavoidable for agent
              # control-plane actions (no ARN scope exists for these).
              # ssm:GetParameter and ssm:GetParameters intentionally omitted —
              # parameter reads are covered by the ARN-scoped SSMParameterStoreAccess
              # policy on this role (S-02 #2310, S-03 #2364).
              - Effect: Allow
                Action:
                  - ssm:DescribeAssociation
                  - ssm:GetDeployablePatchSnapshotForInstance
                  - ssm:GetDocument
                  - ssm:DescribeDocument
                  - ssm:GetManifest
                  - ssm:ListAssociations
                  - ssm:ListInstanceAssociations
                  - ssm:PutInventory
                  - ssm:PutComplianceItems
                  - ssm:PutConfigurePackageResult
                  - ssm:UpdateAssociationStatus
                  - ssm:UpdateInstanceAssociationStatus
                  - ssm:UpdateInstanceInformation
                Resource: "*"
              # SSM Messages — required for Session Manager connectivity
              - Effect: Allow
                Action:
                  - ssmmessages:CreateControlChannel
                  - ssmmessages:CreateDataChannel
                  - ssmmessages:OpenControlChannel
                  - ssmmessages:OpenDataChannel
                Resource: "*"
              # EC2 Messages — required for SSM Run Command
              - Effect: Allow
                Action:
                  - ec2messages:AcknowledgeMessage
                  - ec2messages:DeleteMessage
                  - ec2messages:FailMessage
                  - ec2messages:GetEndpoint
                  - ec2messages:GetMessages
                  - ec2messages:SendReply
                Resource: "*"
        - PolicyName: SecretsManagerDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !ImportValue mtga-companion-rds-DBSecretArn
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:mtga-companion/*"
        - PolicyName: SSMParameterStoreAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # ---------------------------------------------------------------
              # Statement 1: /mtga-companion/* BFF bootstrap paths.
              # REVERSIBLE WINDOW — retained until all consumers are verified
              # reading from /vaultmtg/app/production/* (Phase 5c cutover).
              # Removed in Phase 5d (R-13 IAM contract step).
              #
              # Consumers: EC2 UserData bootstrap (reads /mtga-companion/production/*
              # and /mtga-companion/prod/daemon-jwt-secret).
              # ---------------------------------------------------------------
              - Sid: LegacyMtgaCompanionBootstrap
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mtga-companion/production/ALLOWED_ORIGINS"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mtga-companion/production/CLERK_FRONTEND_API"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mtga-companion/production/CLERK_SECRET_KEY"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mtga-companion/production/clerk-secret-key"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mtga-companion/production/db-endpoint"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mtga-companion/production/db-name"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mtga-companion/production/db-secret-arn"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mtga-companion/production/domain-name"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mtga-companion/prod/daemon-jwt-secret"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mtga-companion/daemon-jwt-secret"
              # ---------------------------------------------------------------
              # Statement 2: /vaultmtg/app/production/* — new canonical BFF
              # runtime and provisioning namespace (R-13).
              #
              # Covers: provision-env.sh, provision-db-url.sh (deploy pipeline)
              # and UserData bootstrap (after Phase 5c UserData literal update).
              #
              # OQ-6 resolution: staging BFF is purely EnvironmentFile=-driven
              # (confirmed from infra/systemd/mtga-bff-staging.service and the
              # provision-staging-env.sh flow). The production instance role does
              # NOT need /vaultmtg/app/staging/* for runtime BFF reads — staging
              # parameters are only read by provision-staging-env.sh during
              # deploy-time provisioning, which runs under the dedicated
              # vaultmtg-staging-deploy-provisioner role (S-03).
              # ---------------------------------------------------------------
              - Sid: VaultmtgAppProductionNamespace
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/app/production/*"
              # ---------------------------------------------------------------
              # Statement 3: /vaultmtg/production/* deploy provisioning paths.
              # Read by provision-env.sh and provision-db-url.sh which execute
              # ON the production EC2 instance via SSM RunCommand from deploy-bff.yml.
              # These are the paths deploy-env.sh SSM_PROD_* constants currently
              # point at (pre-Phase 5c cutover).
              #
              # After Phase 5c (app-repo deploy-env.sh update to /vaultmtg/app/*),
              # this statement is folded into Statement 2 and removed.
              # ---------------------------------------------------------------
              - Sid: VaultmtgProductionProvisioningLegacy
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/production/ALLOWED_ORIGINS"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/production/CLERK_SECRET_KEY"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/production/db-secret-arn"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/production/db-endpoint"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/production/db-name"
              # ---------------------------------------------------------------
              # Statement 4: /vaultmtg/staging/* staging provisioning paths.
              # Read by provision-staging-env.sh when it runs under the
              # production EC2 instance role (interim — before the Path-B
              # vaultmtg-staging-deploy-provisioner OIDC refactor lands).
              #
              # After the Path-B refactor (Bob, app-repo ticket), this statement
              # is removed from the production instance role; provision-staging-env.sh
              # will run in the GHA runner under vaultmtg-staging-deploy-provisioner.
              # ---------------------------------------------------------------
              - Sid: VaultmtgStagingProvisioningInterim
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource:
                  # /vaultmtg/staging/* (current flat namespace — pre-cutover)
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/staging/PORT"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/staging/ALLOWED_ORIGINS"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/staging/CLERK_PUBLISHABLE_KEY"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/staging/CLERK_SECRET_KEY"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/staging/CLERK_FRONTEND_API"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/staging/db-secret-arn"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/staging/db-endpoint"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/staging/db-name"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/staging/resend-api-key"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/staging/sentry-bff-dsn"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/staging/discord-bot-token"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/staging/discord-guild-id"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/staging/mailchimp-api-key"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/staging/mailchimp-list-id"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/staging/crisp-website-id"
                  # /vaultmtg/app/staging/* (new namespace — for cutover window and post-cutover)
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/app/staging/*"
              # ---------------------------------------------------------------
              # Statement 5: /vaultmtg/prod/* — two specific BFF runtime paths
              # that are NOT migrating (owned by Greg/Faye marketing automation).
              # These remain at /vaultmtg/prod/* permanently.
              # ---------------------------------------------------------------
              - Sid: VaultmtgProdRuntimePaths
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/prod/sentry-bff-dsn"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/prod/posthog-api-key"
              # kms:Decrypt is required to read SecureString parameters encrypted
              # with the default SSM KMS key (alias/aws/ssm).
              - Sid: SSMKMSDecrypt
                Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/*"
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "ssm.${AWS::Region}.amazonaws.com"
        - PolicyName: S3DeployArtifactsRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub "arn:aws:s3:::mtga-companion-deploy-artifacts-${Environment}/*"
                  # Production EC2 also hosts the staging BFF service; grant read
                  # access to the staging artifact bucket so SSM deploy commands work.
                  - arn:aws:s3:::mtga-companion-deploy-artifacts-staging/*
                  # Bucket renamed from mtga-companion-deploy-artifacts-staging to
                  # vaultmtg-deploy-artifacts-staging post repo rename (ADR-022).
                  - arn:aws:s3:::vaultmtg-deploy-artifacts-staging/*
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::mtga-companion-deploy-artifacts-${Environment}"
                  - arn:aws:s3:::mtga-companion-deploy-artifacts-staging
                  - arn:aws:s3:::vaultmtg-deploy-artifacts-staging
        - PolicyName: CloudFormationReadExports
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: cloudformation:ListExports
                Resource: "*"
        - PolicyName: CloudWatchMetricsPublish
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Allows the CloudWatch agent to push disk/mem/cpu metrics and allows
              # the bff-staging restart-metric timer to publish BffStagingRestartCount.
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:ListMetrics
                Resource: "*"
        - PolicyName: CloudWatchLogsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Allows the CloudWatch agent to create and write to the BFF and nginx
              # log groups. Scoped to /vaultmtg/production/* log groups only.
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/vaultmtg/production/bff:*"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/vaultmtg/production/nginx:*"
              # DescribeLogGroups is not resource-scopeable; limit to the minimum needed.
              - Effect: Allow
                Action:
                  - logs:DescribeLogGroups
                Resource: "*"
      Tags:
        - Key: Project
          Value: mtga-companion
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # IAM Instance Profile
  # ---------------------------------------------------------
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "mtga-companion-ec2-profile-${Environment}"
      Roles:
        - !Ref EC2InstanceRole

  # ---------------------------------------------------------
  # EC2 Instance
  # ---------------------------------------------------------
  EC2Instance:
    Type: AWS::EC2::Instance
    DeletionPolicy: Retain
    Properties:
      ImageId: !Ref AMI
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !ImportValue
          Fn::Sub: "mtga-companion-${Environment}-EC2SecurityGroupId"
      SubnetId: subnet-021e2cc715f426da1
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref "AWS::NoValue"]
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          # Bootstrap: install and configure MTGA Companion on Amazon Linux 2023.
          # Runs once at instance launch. All output logged to /var/log/mtga-companion-setup.log.
          exec > >(tee /var/log/mtga-companion-setup.log) 2>&1

          APP_USER="mtga-companion"
          BINARY_PATH="/usr/local/bin/mtga-bff"
          ENV_DIR="/etc/mtga-companion"
          REGION="${AWS::Region}"

          log() { echo "[setup] $(date '+%Y-%m-%dT%H:%M:%S') $*"; }

          # Fetch an SSM parameter value by name (with decryption).
          # Returns empty string on failure -- callers must check and fail-loud if required.
          fetch_ssm() {
              aws ssm get-parameter \
                  --region "$REGION" \
                  --name "$1" \
                  --with-decryption \
                  --query 'Parameter.Value' \
                  --output text 2>/dev/null || true
          }

          # Fail loudly if a required SSM parameter is missing or empty.
          # Writes to the setup log and exits non-zero so cfn-signal propagates the failure.
          require_ssm() {
              local _name="$1"
              local _val
              _val=$(fetch_ssm "$_name")
              if [ -z "$_val" ] || [ "$_val" = "None" ]; then
                  log "FATAL: required SSM parameter '$_name' is missing or empty. Aborting bootstrap."
                  exit 1
              fi
              printf '%s' "$_val"
          }

          # ---------------------------------------------------------
          # 1. System packages
          # ---------------------------------------------------------
          log "Updating packages..."
          dnf update -y --quiet
          dnf install -y nginx logrotate aws-cli jq python3 python3-pip postgresql15 amazon-cloudwatch-agent
          pip3 install --quiet certbot certbot-nginx

          # ---------------------------------------------------------
          # 2. Application user and directories
          # ---------------------------------------------------------
          log "Creating app user..."
          id "$APP_USER" &>/dev/null || useradd --system --no-create-home --shell /sbin/nologin "$APP_USER"
          mkdir -p "$(dirname "$BINARY_PATH")" "$ENV_DIR"
          chmod 750 "$ENV_DIR"

          # ---------------------------------------------------------
          # 3. Environment file from SSM
          #
          # R-13 cutover: reads from /vaultmtg/app/production/* (new canonical
          # namespace) with fallback to /mtga-companion/production/* (old namespace)
          # during the cutover window. After Phase 5c is verified and Phase 5d
          # removes the legacy IAM grants, the fallback paths are deleted from this
          # UserData block.
          #
          # Bug fix (R-05): uses printf statements and the credential-free
          # DATABASE_URL pattern — credentials resolved at BFF startup via DB_SECRET_ARN.
          # ---------------------------------------------------------
          log "Fetching config from SSM (primary: /vaultmtg/app/production/*)..."

          # Helper: fetch from primary path; fall back to legacy path if empty.
          # Returns empty string if both are absent.
          fetch_ssm_with_fallback() {
              local _primary="$1"
              local _legacy="$2"
              local _val
              _val=$(fetch_ssm "$_primary")
              if [ -z "$_val" ] || [ "$_val" = "None" ]; then
                  log "Primary SSM path '$_primary' empty - trying legacy '$_legacy'"
                  _val=$(fetch_ssm "$_legacy")
              fi
              printf '%s' "$_val"
          }

          require_ssm_with_fallback() {
              local _primary="$1"
              local _legacy="$2"
              local _val
              _val=$(fetch_ssm_with_fallback "$_primary" "$_legacy")
              if [ -z "$_val" ] || [ "$_val" = "None" ]; then
                  log "FATAL: required SSM parameter '$_primary' (and legacy '$_legacy') missing. Aborting bootstrap."
                  exit 1
              fi
              printf '%s' "$_val"
          }

          PORT=$(fetch_ssm_with_fallback "/vaultmtg/app/production/PORT" "/mtga-companion/production/PORT")
          PORT="${!PORT:-8080}"

          ALLOWED_ORIGINS=$(require_ssm_with_fallback "/vaultmtg/app/production/ALLOWED_ORIGINS" "/mtga-companion/production/ALLOWED_ORIGINS")
          DAEMON_JWT_SECRET=$(fetch_ssm_with_fallback "/vaultmtg/app/production/daemon-jwt-secret" "/mtga-companion/prod/daemon-jwt-secret")

          # Credential-free DATABASE_URL -- BFF resolves credentials via DB_SECRET_ARN
          # at startup (matches provision-db-url.sh and deploy-env.sh pattern).
          DB_SECRET_ARN=$(require_ssm_with_fallback "/vaultmtg/app/production/db-secret-arn" "/mtga-companion/production/db-secret-arn")
          DB_ENDPOINT=$(require_ssm_with_fallback "/vaultmtg/app/production/db-endpoint" "/mtga-companion/production/db-endpoint")
          DB_NAME=$(require_ssm_with_fallback "/vaultmtg/app/production/db-name" "/mtga-companion/production/db-name")
          DATABASE_URL="postgresql://${!DB_ENDPOINT}:5432/${!DB_NAME}?sslmode=require"

          log "Writing env file to $ENV_DIR/env..."
          {
              printf 'PORT=%s\n'              "$PORT"
              printf 'DATABASE_URL=%s\n'     "$DATABASE_URL"
              printf 'DB_SECRET_ARN=%s\n'    "$DB_SECRET_ARN"
              printf 'MTGA_ENV=production\n'
              printf 'AWS_DEFAULT_REGION=%s\n' "$REGION"
              printf 'GIN_MODE=release\n'
              printf 'ALLOWED_ORIGINS=%s\n'  "$ALLOWED_ORIGINS"
              printf 'DAEMON_JWT_SECRET=%s\n' "$DAEMON_JWT_SECRET"
          } > "$ENV_DIR/env"
          chmod 600 "$ENV_DIR/env"
          chown "root:$APP_USER" "$ENV_DIR/env"
          log "Env file written successfully."

          # ---------------------------------------------------------
          # 4. BFF binary install
          #
          # New (R-05): fetch the latest released BFF binary from S3 so a fresh
          # instance is fully self-installing without any manual deploy step.
          #
          # The deploy pipeline writes the deployed SHA to SSM after each release:
          #   /mtga-companion/production/latest-bff-sha
          # See vault-mtg issue #2323 (app-repo follow-on) for the deploy-bff.yml
          # change that keeps this param current.
          #
          # If the param is absent (pre-first-deploy), skip start but leave the
          # service enabled so the next CI deploy triggers a start automatically.
          # ---------------------------------------------------------
          log "Fetching BFF binary from S3..."
          DEPLOY_SHA=$(fetch_ssm "/mtga-companion/production/latest-bff-sha")
          DEPLOY_BUCKET="mtga-companion-deploy-artifacts-production"

          if [ -n "$DEPLOY_SHA" ] && [ "$DEPLOY_SHA" != "None" ]; then
              log "Downloading mtga-bff @ ${!DEPLOY_SHA} from s3://${!DEPLOY_BUCKET}/releases/${!DEPLOY_SHA}/mtga-bff"
              aws s3 cp \
                  "s3://${!DEPLOY_BUCKET}/releases/${!DEPLOY_SHA}/mtga-bff" \
                  "$BINARY_PATH.next" \
                  --region "$REGION"
              chmod +x "$BINARY_PATH.next"
              mv "$BINARY_PATH.next" "$BINARY_PATH"
              log "BFF binary installed at $BINARY_PATH"
          else
              log "WARNING: SSM /mtga-companion/production/latest-bff-sha not set."
              log "Binary not installed. The next CI deploy will install and start the service."
              log "Action required: ensure deploy-bff.yml writes latest-bff-sha to SSM (issue #2323)."
          fi

          # ---------------------------------------------------------
          # 5. systemd service
          # ---------------------------------------------------------
          log "Installing systemd service..."
          # The heredoc body must be indented to remain within the YAML scalar.
          # Pipe through sed to strip the 10-space indent before writing the
          # unit file -- systemd requires section headers ([Unit] etc.) to start
          # at column 0 with no leading whitespace.
          sed 's/^          //' > /etc/systemd/system/mtga-companion.service <<'UNIT'
          [Unit]
          Description=MTGA Companion BFF Service
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=mtga-companion
          Group=mtga-companion
          ExecStart=/usr/local/bin/mtga-bff
          Restart=on-failure
          RestartSec=5
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=mtga-bff
          EnvironmentFile=/etc/mtga-companion/env
          NoNewPrivileges=true
          PrivateTmp=true
          ProtectSystem=full

          [Install]
          WantedBy=multi-user.target
          UNIT

          systemctl daemon-reload
          systemctl enable mtga-companion

          if [ -f "$BINARY_PATH" ]; then
              log "Starting mtga-companion service..."
              systemctl start mtga-companion
              systemctl is-active mtga-companion && log "mtga-companion started successfully." || \
                  log "WARNING: mtga-companion failed to start. Check: journalctl -u mtga-companion"
          else
              log "Skipping service start -- binary not present (pending first CI deploy)."
          fi

          # ---------------------------------------------------------
          # 6. nginx configuration
          # ---------------------------------------------------------
          log "Configuring nginx..."
          # Pipe through sed to strip the 10-space YAML indent before writing nginx config.
          sed 's/^          //' > /etc/nginx/conf.d/mtga-companion.conf <<'NGINX'
          limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

          server {
              listen 80 default_server;
              server_name _;

              location /.well-known/acme-challenge/ {
                  root /var/www/certbot;
              }

              location /api/v1/ {
                  limit_req zone=api_limit burst=10 nodelay;
                  proxy_pass         http://127.0.0.1:8080;
                  proxy_http_version 1.1;
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_connect_timeout 10s;
                  proxy_read_timeout    60s;
                  proxy_send_timeout    30s;
              }

              location /health {
                  proxy_pass       http://127.0.0.1:8080/health;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  access_log off;
              }

              root /var/www/mtga-companion;
              index index.html;

              location / {
                  try_files $uri $uri/ /index.html;
              }

              location ~ /\. {
                  deny all;
              }
          }
          NGINX

          rm -f /etc/nginx/conf.d/default.conf
          mkdir -p /var/www/mtga-companion /var/www/certbot
          chown -R nginx:nginx /var/www/mtga-companion /var/www/certbot
          nginx -t
          systemctl enable nginx
          systemctl start nginx

          # ---------------------------------------------------------
          # 7. Log rotation
          # ---------------------------------------------------------
          log "Configuring logrotate..."
          # Pipe through sed to strip the 10-space YAML indent before writing logrotate config.
          sed 's/^          //' > /etc/logrotate.d/mtga-companion <<'LOGROTATE'
          /var/log/mtga-companion/*.log {
              daily
              rotate 14
              compress
              delaycompress
              missingok
              notifempty
              sharedscripts
              postrotate
                  systemctl kill -s HUP mtga-companion || true
              endscript
          }
          LOGROTATE

          sed 's/^          //' > /etc/logrotate.d/mtga-bff <<'LOGROTATE'
          /var/log/mtga-bff/*.log {
              daily
              rotate 14
              compress
              delaycompress
              missingok
              notifempty
              sharedscripts
              postrotate
                  systemctl kill -s HUP rsyslog || true
              endscript
          }
          LOGROTATE

          # ---------------------------------------------------------
          # 8. Certbot / Let's Encrypt
          # Reads domain from SSM. Idempotent: skips if domain not set or cert exists.
          # Issue #2316: /mtga-companion/production/domain-name must be pre-created
          # in SSM before deploying -- a missing param now fails loudly (non-zero exit)
          # via require_ssm rather than silently skipping certbot.
          # ---------------------------------------------------------
          log "Checking for domain in SSM..."
          DOMAIN=$(fetch_ssm_with_fallback "/vaultmtg/app/production/domain-name" "/mtga-companion/production/domain-name")
          if [ -n "$DOMAIN" ] && [ "$DOMAIN" != "None" ]; then
              log "Domain: $DOMAIN -- running certbot..."
              if [ ! -d "/etc/letsencrypt/live/$DOMAIN" ]; then
                  certbot --nginx --non-interactive --agree-tos \
                      --email "ray.hamilton@stablekernel.com" \
                      --domains "$DOMAIN" --redirect \
                      2>&1 | tee /var/log/certbot-init.log || log "WARNING: certbot failed"
              else
                  log "Cert already present -- skipping."
              fi
              # Ensure certbot renewal cron is active (related: issue #2315).
              crontab -l 2>/dev/null | grep -q "certbot renew" || \
                  (crontab -l 2>/dev/null; echo "0 3 * * * certbot renew --quiet --nginx && systemctl reload nginx") | crontab -
              log "Certbot renewal cron confirmed."
          else
              log "No domain in SSM (/vaultmtg/app/production/domain-name or /mtga-companion/production/domain-name) -- skipping certbot."
              log "WARNING: set /vaultmtg/app/production/domain-name in SSM before deploying (issue #2316)."
          fi

          # ---------------------------------------------------------
          # 9. BFF log forwarding via rsyslog
          # AL2023 uses journald only by default -- no /var/log/messages.
          # rsyslog filters mtga-bff entries (by syslog identifier) into a
          # dedicated file so the CloudWatch Agent can collect them as files.
          # ---------------------------------------------------------
          log "Configuring rsyslog for BFF log forwarding..."
          dnf install -y rsyslog
          mkdir -p /var/log/mtga-bff
          # Pipe through sed to strip the 10-space YAML indent before writing the rsyslog rule.
          sed 's/^          //' > /etc/rsyslog.d/mtga-bff.conf <<'RSYSLOG'
          :programname, isequal, "mtga-bff" /var/log/mtga-bff/bff.log
          & stop
          RSYSLOG
          systemctl enable rsyslog
          systemctl restart rsyslog
          log "rsyslog configured."

          # Fix nginx log group ownership so cwagent (added to the nginx group)
          # can read existing and future log files.
          # nginx creates log files as root:root by default on AL2023;
          # chown nginx:nginx so the nginx group read bit grants access.
          chown nginx:nginx /var/log/nginx/access.log /var/log/nginx/error.log 2>/dev/null || true
          # Ensure cwagent is in the nginx group for group-read access to nginx logs
          usermod -a -G nginx cwagent 2>/dev/null || true

          # ---------------------------------------------------------
          # 10. CloudWatch Agent configuration
          # Writes the canonical config from config/cloudwatch-agent.json
          # (committed to the infra repo) and starts the agent.
          # Collects: CPU (idle/user/system), memory, disk utilisation.
          # Ships logs: BFF (via rsyslog -> /var/log/mtga-bff/bff.log) -> /vaultmtg/production/bff
          #             nginx access+error -> /vaultmtg/production/nginx
          # Note: CWAgent 1.x schema does not support systemd_journal directly;
          #       BFF logs are forwarded to file via rsyslog (section 9 above).
          # ---------------------------------------------------------
          log "Configuring CloudWatch Agent..."
          sed 's/^          //' > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json <<'CWCONFIG'
          {
            "agent": {
              "metrics_collection_interval": 60,
              "run_as_user": "cwagent"
            },
            "metrics": {
              "namespace": "CWAgent",
              "append_dimensions": {
                "InstanceId": "${!aws:InstanceId}"
              },
              "metrics_collected": {
                "cpu": {
                  "measurement": [
                    "cpu_usage_idle",
                    "cpu_usage_user",
                    "cpu_usage_system"
                  ],
                  "metrics_collection_interval": 60,
                  "totalcpu": true
                },
                "disk": {
                  "measurement": [
                    "disk_used_percent"
                  ],
                  "metrics_collection_interval": 60,
                  "resources": [
                    "/"
                  ],
                  "ignore_file_system_types": [
                    "tmpfs",
                    "devtmpfs"
                  ]
                },
                "mem": {
                  "measurement": [
                    "mem_used_percent"
                  ],
                  "metrics_collection_interval": 60
                }
              }
            },
            "logs": {
              "logs_collected": {
                "files": {
                  "collect_list": [
                    {
                      "file_path": "/var/log/mtga-bff/bff.log",
                      "log_group_name": "/vaultmtg/production/bff",
                      "log_stream_name": "{instance_id}/mtga-bff",
                      "timezone": "UTC"
                    },
                    {
                      "file_path": "/var/log/nginx/access.log",
                      "log_group_name": "/vaultmtg/production/nginx",
                      "log_stream_name": "{instance_id}/access",
                      "timezone": "UTC"
                    },
                    {
                      "file_path": "/var/log/nginx/error.log",
                      "log_group_name": "/vaultmtg/production/nginx",
                      "log_stream_name": "{instance_id}/error",
                      "timezone": "UTC"
                    }
                  ]
                }
              }
            }
          }
          CWCONFIG

          /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
              -a fetch-config \
              -m ec2 \
              -s \
              -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json

          systemctl enable amazon-cloudwatch-agent
          systemctl restart amazon-cloudwatch-agent

          CWA_STATUS=$(systemctl is-active amazon-cloudwatch-agent 2>/dev/null || echo unknown)
          log "CloudWatch agent status: $CWA_STATUS"

          log "Bootstrap complete."
      Tags:
        - Key: Name
          Value: !Sub "mtga-companion-bff-${Environment}"
        - Key: Project
          Value: mtga-companion
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # Elastic IP + Association
  # ---------------------------------------------------------
  # An EIP pins a stable public IP to the instance so that EC2 replacement
  # (e.g., the R-13 namespace cutover) does not require a DNS change.
  # The EIP address is the value to set on the api.vaultmtg.app A record.
  #
  # Intentionally deployed 2026-05-21 via #2429 (R-02: EIP pre-requisite for R-13).
  # After deploy: update api.vaultmtg.app A record to the ElasticIPAddress stack output.
  # See PR #64 for the drift-reconciliation changeset transcript and DNS runbook.
  #
  # Deploy note: associating an EIP changes the instance public IP immediately.
  # Coordinate the DNS repoint (api.vaultmtg.app A record) with the CFN
  # changeset execution as documented in the deploy runbook in the PR body.
  ElasticIP:
    Type: AWS::EC2::EIP
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "mtga-companion-eip-${Environment}"
        - Key: Project
          Value: vaultmtg
        - Key: Environment
          Value: !Ref Environment

  ElasticIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref EC2Instance
      EIP: !Ref ElasticIP

Outputs:
  InstanceId:
    Description: EC2 instance ID
    Value: !Ref EC2Instance
    Export:
      Name: !Sub "${AWS::StackName}-InstanceId"

  ElasticIPAddress:
    Description: >
      Elastic IP address allocated to the EC2 instance.
      Set the api.vaultmtg.app A record to this value after deploying this changeset.
    Value: !Ref ElasticIP
    Export:
      Name: !Sub "${AWS::StackName}-ElasticIPAddress"

  PublicIP:
    Description: EC2 instance public IP address (same as ElasticIPAddress after association)
    Value: !GetAtt EC2Instance.PublicIp
    Export:
      Name: !Sub "${AWS::StackName}-PublicIP"
