# DEPRECATED 2026-05-25 — superseded by rds-vaultmtg.yml (#2592). The legacy
# stack 'mtga-companion-rds' tracks NOTHING live after the Window A rename in
# #1996 §5e — CloudFormation marks the DBInstance as DELETED in the stack
# because the live rename moved the resource out of the stack's purview. This
# file remains in-tree as historical reference only; do NOT deploy it. The new
# stack definition is in rds-vaultmtg.yml and is adopted into a new vaultmtg-rds
# stack via a ChangeSetType=IMPORT changeset. After consumer migration (PR B
# for #2592) and the irreversible delete of the empty 'mtga-companion-rds' stack
# (PR C), this file will be deleted from the repo.
AWSTemplateFormatVersion: "2010-09-09"
Description: >
  VaultMTG RDS PostgreSQL instance.
  Private subnet only, pgvector-enabled parameter group, encrypted at rest.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy the RDS instance into

  PrivateSubnet1Id:
    Type: AWS::EC2::Subnet::Id
    Description: First private subnet (must be in different AZ from Subnet2)

  PrivateSubnet2Id:
    Type: AWS::EC2::Subnet::Id
    Description: Second private subnet (RDS subnet groups require >= 2 AZs)

  DBName:
    Type: String
    Default: mtga_companion
    Description: Initial database name

  DBUsername:
    Type: String
    Default: mtga_admin
    Description: Master username for the RDS instance

  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # --- Security Group ---------------------------------------------------------
  # Ingress rules are owned by consumer stacks (ec2-sg.yml's RDSIngressFromEC2,
  # sync-lambda.yml's RDSIngressFromLambda) to break the cross-stack dependency
  # cycle that would form if this stack imported the source SG IDs. The drift
  # detector cannot see standalone SecurityGroupIngress resources in cross-stack
  # analysis, so this design intentionally leaves the RDSSecurityGroup empty of
  # inline rules — see #2534 for the symmetric-refactor history.
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      GroupDescription: Allow PostgreSQL access from EC2 only
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: vaultmtg-rds-sg
        - Key: Project
          Value: vaultmtg
        - Key: Environment
          Value: !Ref Environment

  # --- Subnet Group -----------------------------------------------------------
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DBSubnetGroupDescription: Private subnets for VaultMTG RDS
      SubnetIds:
        - !Ref PrivateSubnet1Id
        - !Ref PrivateSubnet2Id
      Tags:
        - Key: Project
          Value: vaultmtg
        - Key: Environment
          Value: !Ref Environment

  # --- Parameter Group --------------------------------------------------------
  # pgvector must be listed as a shared_preload_library to activate the extension.
  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: VaultMTG PostgreSQL 15
      Family: postgres15
      Parameters:
        shared_preload_libraries: pg_stat_statements
        log_connections: "1"
        log_disconnections: "1"
        log_min_duration_statement: "1000"   # log queries > 1s
      Tags:
        - Key: Project
          Value: vaultmtg
        - Key: Environment
          Value: !Ref Environment

  # --- RDS Secret Rotation Schedule ------------------------------------------
  # The RDS instance uses ManageMasterUserPassword: true, so AWS owns the
  # Secrets Manager secret natively.  The default rotation cadence for
  # RDS-managed secrets is 7 days.  This resource overrides it to 90 days,
  # which is the VaultMTG policy (see engineering/runbooks/secret-rotation-policy.md).
  #
  # No HostedRotationLambda is needed here — RDS-managed secrets are rotated
  # internally by the RDS service, not by a customer-deployed Lambda.
  DBSecretRotationSchedule:
    Type: AWS::SecretsManager::RotationSchedule
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    DependsOn: DBInstance
    Properties:
      SecretId: !GetAtt DBInstance.MasterUserSecret.SecretArn
      RotationRules:
        AutomaticallyAfterDays: 90

  # --- RDS Instance -----------------------------------------------------------
  DBInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Retain   # PR A.5 (#2592): flipped from Snapshot to Retain for the IMPORT-changeset transition
    UpdateReplacePolicy: Retain   # PR A.5 (#2592): flipped from Snapshot to Retain for the IMPORT-changeset transition
    Properties:
      # DBInstanceIdentifier intentionally retains the legacy name in PR-B
      # (#1759). The live RDS instance was named at create time and cannot be
      # renamed via a CFN property change — it requires an out-of-band
      # `aws rds modify-db-instance --new-db-instance-identifier` (a short
      # reboot) followed by the CFN template flip in the same window. That
      # out-of-band rename is tracked in #1996 §5e and has not yet shipped —
      # verified via `aws rds describe-db-instances`. Flipping this line ahead
      # of the live rename would fail the stack with "DBInstance not found"
      # on the next CFN update, so the line is held in the legacy state and
      # carried in the ADR-022 §C grandfathered allowlist until #1996 §5e
      # delivers the live rename.
      DBInstanceIdentifier: mtga-companion-postgres
      DBName: !Ref DBName
      Engine: postgres
      EngineVersion: "15.7"
      DBInstanceClass: db.t3.micro
      AllocatedStorage: "20"
      StorageType: gp3
      StorageEncrypted: true
      MasterUsername: !Ref DBUsername
      ManageMasterUserPassword: true
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      DBParameterGroupName: !Ref DBParameterGroup
      MultiAZ: false           # single-AZ to minimise cost; upgrade when revenue justifies
      PubliclyAccessible: false
      BackupRetentionPeriod: 7
      PreferredBackupWindow: "03:00-04:00"
      PreferredMaintenanceWindow: "mon:04:00-mon:05:00"
      EnablePerformanceInsights: false   # free tier not available on t3.micro
      AutoMinorVersionUpgrade: true
      Tags:
        - Key: Project
          Value: vaultmtg
        - Key: Environment
          Value: !Ref Environment

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  DBEndpoint:
    Description: RDS PostgreSQL endpoint hostname
    Value: !GetAtt DBInstance.Endpoint.Address
    Export:
      Name: !Sub "${AWS::StackName}-DBEndpoint"

  DBPort:
    Description: RDS PostgreSQL port
    Value: !GetAtt DBInstance.Endpoint.Port
    Export:
      Name: !Sub "${AWS::StackName}-DBPort"

  DBName:
    Description: Database name
    Value: !Ref DBName
    Export:
      Name: !Sub "${AWS::StackName}-DBName"

  RDSSecurityGroupId:
    Description: RDS security group ID (reference from EC2 stack if needed)
    Value: !Ref RDSSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-RDSSecurityGroupId"

  DBSecretArn:
    Description: ARN of the Secrets Manager secret holding the master DB credentials
    Value: !GetAtt DBInstance.MasterUserSecret.SecretArn
    Export:
      Name: !Sub "${AWS::StackName}-DBSecretArn"
