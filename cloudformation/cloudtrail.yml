AWSTemplateFormatVersion: "2010-09-09"
Description: >
  VaultMTG - Basic single-region (us-east-1) CloudTrail trail capturing
  management events only, delivering to one dedicated KMS-encrypted S3 bucket
  AND to a dedicated CloudWatch Logs log group for real-time metric filters.
  Deploy order: standalone (no cross-stack imports required).

  Scope decision (Ramone, 2026-05-21): the enterprise-tier gold-plating
  (multi-region trail, log-file integrity validation, Object Lock,
  S3 data-event selectors) was descoped. The account is solo-operated, so a
  basic audit trail is the right observability floor for a solo-dev beta.
  See ADR-0025.

  CloudWatch Logs integration (vault-mtg#2333, S-06):
  The trail now also publishes events to a dedicated log group so the
  security-alarms stack can attach CloudWatch metric filters for root account
  usage and IAM credential writes. The CWL log group + delivery IAM role are
  managed by this stack so they share the trail's lifecycle; the metric
  filters and alarms are owned by cloudformation/security-alarms.yml.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]
    Description: Deployment environment (production or staging).

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # -----------------------------------------------------------------------
  # KMS key -- CloudTrail log encryption
  #
  # CloudTrail requires the key policy to grant cloudtrail.amazonaws.com
  # GenerateDataKey and Decrypt actions; these are mandated in the
  # key resource policy (not in an IAM policy attached to a principal).
  # Single-region key -- the trail is single-region.
  # -----------------------------------------------------------------------
  CloudTrailKMSKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: KMS key for VaultMTG CloudTrail log-file encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          # Allow the AWS account (root) full key administration
          - Sid: AllowRootFullAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"

          # CloudTrail service principal must be able to encrypt logs
          - Sid: AllowCloudTrailEncrypt
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action:
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: "*"
            Condition:
              StringLike:
                kms:EncryptionContext:aws:cloudtrail:arn:
                  !Sub "arn:aws:cloudtrail:*:${AWS::AccountId}:trail/*"

          # CloudTrail service principal must be able to decrypt log files
          - Sid: AllowCloudTrailDecrypt
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: kms:Decrypt
            Resource: "*"
            Condition:
              "Null":
                kms:EncryptionContext:aws:cloudtrail:arn: "false"

      Tags:
        - Key: Project
          Value: vault-mtg
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  CloudTrailKMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/vaultmtg-cloudtrail-${Environment}"
      TargetKeyId: !Ref CloudTrailKMSKey

  # -----------------------------------------------------------------------
  # S3 bucket -- CloudTrail log storage
  #
  # Requirements:
  #   - KMS encryption using the dedicated CloudTrail key
  #   - Public access fully blocked
  #   - Versioning enabled (allows recovery of accidental overwrites)
  #   - Bucket policy grants CloudTrail PutObject; requires HTTPS
  #
  # Object Lock was descoped (see ADR-0025) -- it is tamper-proofing against a
  # malicious insider, a threat model that does not apply to a solo account.
  # -----------------------------------------------------------------------
  CloudTrailLogsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "vaultmtg-cloudtrail-logs-${Environment}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref CloudTrailKMSKey
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: vault-mtg
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  # CloudTrail requires a bucket policy that explicitly grants it access.
  # The policy also requires SecureTransport (HTTPS only).
  CloudTrailLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudTrailLogsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:

          # CloudTrail must be able to verify the bucket ACL before writing
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt CloudTrailLogsBucket.Arn
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

          # CloudTrail must be able to write log objects
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "${CloudTrailLogsBucket.Arn}/AWSLogs/${AWS::AccountId}/*"
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
                aws:SourceAccount: !Ref AWS::AccountId

          # Require HTTPS for all access
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !GetAtt CloudTrailLogsBucket.Arn
              - !Sub "${CloudTrailLogsBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: "false"

  # -----------------------------------------------------------------------
  # CloudWatch Logs -- destination for real-time trail events
  #
  # CloudTrail can fan out events to a CloudWatch Logs log group in addition
  # to the S3 bucket. We use this fanout to attach metric filters that drive
  # the S-06 security alarms (root account usage, IAM credential writes).
  # See cloudformation/security-alarms.yml for the filters and alarms.
  #
  # Retention: 90 days. Long-term archival lives in the S3 bucket above
  # (retained indefinitely); the CWL group is for near-real-time analysis.
  # KMS: AWS-managed key (the CloudTrail KMS key cannot be used here without
  # a separate grant; the solo-dev threat model does not justify the extra
  # operational surface).
  # -----------------------------------------------------------------------
  CloudTrailLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub "/vaultmtg/cloudtrail/${Environment}"
      RetentionInDays: 90
      Tags:
        - Key: Project
          Value: vault-mtg
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  # IAM role assumed by the CloudTrail service to write events into the
  # log group above. The role name is bound to the vaultmtg-* prefix so
  # the gha-infra-cfn-deploy role's IAMPassAndManageScoped statement can
  # pass it to CloudTrail.
  CloudTrailLogsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "vaultmtg-cloudtrail-cwl-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: cloudtrail-cwl-publish
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AWSCloudTrailCreateLogStream
                Effect: Allow
                Action: logs:CreateLogStream
                Resource: !GetAtt CloudTrailLogGroup.Arn
              - Sid: AWSCloudTrailPutLogEvents
                Effect: Allow
                Action: logs:PutLogEvents
                Resource: !GetAtt CloudTrailLogGroup.Arn
      Tags:
        - Key: Project
          Value: vault-mtg
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  # -----------------------------------------------------------------------
  # CloudTrail trail -- single-region, management events only
  #
  # IsMultiRegionTrail: false  -- single-region (us-east-1) trail.
  # IncludeGlobalServiceEvents: true -- IAM/STS/CloudFront global-service
  #   events still land in this trail.
  # EnableLogFileValidation: descoped (see ADR-0025).
  # No S3 data-event selectors (descoped).
  #
  # CloudWatchLogsLogGroupArn + CloudWatchLogsRoleArn: fan trail events
  # into the CloudTrailLogGroup above so the security-alarms stack can
  # attach metric filters (vault-mtg#2333, S-06).
  # -----------------------------------------------------------------------
  CloudTrailTrail:
    Type: AWS::CloudTrail::Trail
    DependsOn:
      - CloudTrailLogsBucketPolicy
    Properties:
      TrailName: !Sub "vaultmtg-trail-${Environment}"
      S3BucketName: !Ref CloudTrailLogsBucket
      IncludeGlobalServiceEvents: true
      IsMultiRegionTrail: false
      IsLogging: true
      KMSKeyId: !GetAtt CloudTrailKMSKey.Arn
      CloudWatchLogsLogGroupArn: !GetAtt CloudTrailLogGroup.Arn
      CloudWatchLogsRoleArn: !GetAtt CloudTrailLogsRole.Arn

      # Management events only (read + write). No data-event selectors.
      EventSelectors:
        - ReadWriteType: All
          IncludeManagementEvents: true

      Tags:
        - Key: Project
          Value: vault-mtg
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:

  CloudTrailTrailArn:
    Description: ARN of the VaultMTG CloudTrail trail.
    Value: !GetAtt CloudTrailTrail.Arn
    Export:
      Name: !Sub "vaultmtg-${Environment}-CloudTrailTrailArn"

  CloudTrailLogsBucketName:
    Description: Name of the dedicated S3 bucket receiving CloudTrail logs.
    Value: !Ref CloudTrailLogsBucket
    Export:
      Name: !Sub "vaultmtg-${Environment}-CloudTrailLogsBucketName"

  CloudTrailKMSKeyArn:
    Description: ARN of the KMS key used to encrypt CloudTrail log files.
    Value: !GetAtt CloudTrailKMSKey.Arn
    Export:
      Name: !Sub "vaultmtg-${Environment}-CloudTrailKMSKeyArn"

  CloudTrailKMSKeyId:
    Description: ID of the KMS key used to encrypt CloudTrail log files.
    Value: !Ref CloudTrailKMSKey
    Export:
      Name: !Sub "vaultmtg-${Environment}-CloudTrailKMSKeyId"

  CloudTrailLogGroupName:
    Description: |
      Name of the CloudWatch Logs log group receiving CloudTrail events.
      Imported by cloudformation/security-alarms.yml to attach the S-06
      metric filters.
    Value: !Ref CloudTrailLogGroup
    Export:
      Name: !Sub "vaultmtg-${Environment}-CloudTrailLogGroupName"

  CloudTrailLogGroupArn:
    Description: ARN of the CloudWatch Logs log group receiving CloudTrail events.
    Value: !GetAtt CloudTrailLogGroup.Arn
    Export:
      Name: !Sub "vaultmtg-${Environment}-CloudTrailLogGroupArn"
