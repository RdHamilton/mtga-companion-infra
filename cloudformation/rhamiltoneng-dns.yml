AWSTemplateFormatVersion: "2010-09-09"
Description: >
  rhamiltoneng.com production DNS (Route 53).
  Codifies every production record so live state matches IaC.  Kept in a
  separate stack from any vaultmtg DNS to decouple the two brands (same
  split as vaultmtg-app-cdn vs rhamiltoneng-cdn).  The vaultmtg.app
  hosted zone is managed directly in the AWS console, not via
  CloudFormation.  Cutover (one-shot) requires console deletion of each
  existing record then CREATE of this stack -- see PR #2335 body for the
  runbook.  AWS::Route53::RecordSet is NOT importable.  Every record has
  DeletionPolicy: Retain.

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production]
    Description: Deployment environment (production only)

  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Default: Z03270731AI8C2XXNO5IB
    Description: Route 53 hosted zone ID for rhamiltoneng.com

  TTL:
    Type: Number
    Default: 300
    MinValue: 60
    MaxValue: 86400
    Description: Default TTL for non-alias records (seconds)

Mappings:
  CloudFront:
    Aliases:
      HostedZoneId: Z2FDTNDATAQYW2  # AWS-fixed global CloudFront zone ID

Resources:

  # =====================================================================
  # rhamiltoneng.com (apex) -> CloudFront
  # =====================================================================
  ApexARecord:
    Type: AWS::Route53::RecordSet
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: "rhamiltoneng.com."
      Type: A
      AliasTarget:
        HostedZoneId: !FindInMap [CloudFront, Aliases, HostedZoneId]
        DNSName: !ImportValue rhamiltoneng-production-DistributionDomain
        EvaluateTargetHealth: false
      Comment: rhamiltoneng.com apex - CloudFront alias

  WwwARecord:
    Type: AWS::Route53::RecordSet
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: "www.rhamiltoneng.com."
      Type: A
      AliasTarget:
        HostedZoneId: !FindInMap [CloudFront, Aliases, HostedZoneId]
        DNSName: !ImportValue rhamiltoneng-production-DistributionDomain
        EvaluateTargetHealth: false
      Comment: www.rhamiltoneng.com - CloudFront alias

  # ---------------------------------------------------------------------
  # ImprovMX email forwarding
  # ---------------------------------------------------------------------
  ApexMxRecord:
    Type: AWS::Route53::RecordSet
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: "rhamiltoneng.com."
      Type: MX
      TTL: !Ref TTL
      ResourceRecords:
        - "10 mx1.improvmx.com"
        - "20 mx2.improvmx.com"
      Comment: ImprovMX email forwarding

  ApexTxtRecord:
    Type: AWS::Route53::RecordSet
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: "rhamiltoneng.com."
      Type: TXT
      TTL: !Ref TTL
      ResourceRecords:
        - '"v=spf1 include:spf.improvmx.com ~all"'
      Comment: SPF record for ImprovMX

  # ---------------------------------------------------------------------
  # ACM certificate validation CNAMEs
  # ---------------------------------------------------------------------
  AcmValidationApex:
    Type: AWS::Route53::RecordSet
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: "_1fe97ae510d37943177aea6480cbf579.rhamiltoneng.com."
      Type: CNAME
      TTL: !Ref TTL
      ResourceRecords:
        - "_7c76b245d4750620c12619a153e28698.jkddzztszm.acm-validations.aws."
      Comment: ACM validation for rhamiltoneng.com

  AcmValidationWww:
    Type: AWS::Route53::RecordSet
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: "_bcd08a4ce3b550d245a2f3036af0852b.www.rhamiltoneng.com."
      Type: CNAME
      TTL: !Ref TTL
      ResourceRecords:
        - "_982f26971c85aa6cc5795bf1c2928a0f.jkddzztszm.acm-validations.aws."
      Comment: ACM validation for www.rhamiltoneng.com

  # ---------------------------------------------------------------------
  # NOT IN THIS STACK (intentional):
  #   - SOA + NS records: managed by Route 53 itself, not safely
  #     importable/updatable via CFN.
  # ---------------------------------------------------------------------

Outputs:
  HostedZoneId:
    Description: Hosted zone ID for rhamiltoneng.com
    Value: !Ref HostedZoneId
    Export:
      Name: !Sub "${AWS::StackName}-HostedZoneId"

  ApexEndpoint:
    Description: Production apex endpoint
    Value: "https://rhamiltoneng.com"
    Export:
      Name: !Sub "${AWS::StackName}-ApexEndpoint"
