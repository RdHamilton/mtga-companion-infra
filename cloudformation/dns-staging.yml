AWSTemplateFormatVersion: "2010-09-09"
Description: >
  VaultMTG - Route 53 A record for staging-api.vaultmtg.app.
  Points the staging API subdomain at the shared EC2 Elastic IP (same instance as
  production; staging BFF runs on a separate port). The EIP is imported from the
  mtga-companion-ec2 stack — no dedicated ec2-staging stack exists.

Parameters:
  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Description: >
      Route 53 hosted zone ID for vaultmtg.app.
      Value: Z0998299Z86TCLNNF1LS

  TTL:
    Type: Number
    Default: 60
    MinValue: 60
    MaxValue: 86400
    Description: DNS record TTL in seconds (60s for staging to allow fast iteration)

Resources:

  # ---------------------------------------------------------
  # A record: staging-api.vaultmtg.app -> shared EC2 Elastic IP
  # The staging BFF co-exists on the same instance as production (different port).
  # EIP is cross-stack imported from mtga-companion-ec2 — no separate staging EIP.
  # ---------------------------------------------------------
  StagingApiARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: staging-api.vaultmtg.app.
      Type: A
      TTL: !Ref TTL
      ResourceRecords:
        - !ImportValue mtga-companion-ec2-ElasticIPAddress
      Comment: VaultMTG staging API subdomain - shared EC2 instance with production BFF

Outputs:
  StagingApiDomain:
    Description: Staging API domain pointing to shared EC2
    Value: https://staging-api.vaultmtg.app
    Export:
      Name: !Sub "${AWS::StackName}-StagingApiDomain"

  StagingApiIP:
    Description: Shared EC2 EIP used for the staging API A record
    Value: !ImportValue mtga-companion-ec2-ElasticIPAddress
    Export:
      Name: !Sub "${AWS::StackName}-StagingApiIP"
