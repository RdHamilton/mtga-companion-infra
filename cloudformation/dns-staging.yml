AWSTemplateFormatVersion: "2010-09-09"
Description: >
  VaultMTG - Route 53 A record for staging-api.vaultmtg.app.
  Points the staging API subdomain at the same EC2 Elastic IP as api.vaultmtg.app.
  Deploy after the ec2 stack is stable and the vaultmtg.app hosted zone exists.
  Deploy order: ec2-sg -> rds -> ec2 -> dns-staging

Parameters:
  Environment:
    Type: String
    Default: staging
    AllowedValues: [staging]
    Description: Deployment environment (staging only; production DNS is managed separately)

  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Description: >
      Route 53 hosted zone ID for vaultmtg.app.
      Value: Z0998299Z86TCLNNF1LS

  ElasticIP:
    Type: String
    Description: >
      EC2 Elastic IP address for the BFF instance (same as api.vaultmtg.app).
      Value: 3.82.48.206

  TTL:
    Type: Number
    Default: 300
    MinValue: 60
    MaxValue: 86400
    Description: DNS record TTL in seconds

Resources:

  # ---------------------------------------------------------
  # A record: staging-api.vaultmtg.app -> EC2 Elastic IP
  # ---------------------------------------------------------
  StagingApiARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: staging-api.vaultmtg.app.
      Type: A
      TTL: !Ref TTL
      ResourceRecords:
        - !Ref ElasticIP
      Comment: VaultMTG staging API subdomain - points at same EC2 as production

Outputs:
  StagingApiDomain:
    Description: Staging API domain pointing to EC2
    Value: https://staging-api.vaultmtg.app
    Export:
      Name: !Sub "${AWS::StackName}-StagingApiDomain"

  StagingApiIP:
    Description: EC2 IP for the staging API A record
    Value: !Ref ElasticIP
    Export:
      Name: !Sub "${AWS::StackName}-StagingApiIP"
