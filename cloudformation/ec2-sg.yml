AWSTemplateFormatVersion: "2010-09-09"
Description: >
  VaultMTG EC2 security group.
  Deploy this FIRST, then pass its output (EC2SecurityGroupId) into rds.yml.
  The EC2 instance itself is not created here -only the SG it will use.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to create the security group in

  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]

# ---------------------------------------------------------------------------
# Conditions
# ---------------------------------------------------------------------------
Conditions:
  # The EC2->RDS ingress is only created on the production stack — RDS is a
  # single shared instance and only the production EC2 instance currently
  # talks to it. The staging ec2-sg stack instance reuses this template but
  # skips RDSIngressFromEC2.
  IsProduction: !Equals [!Ref Environment, production]

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "MTGA Companion EC2 - HTTP/HTTPS inbound, all outbound"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
          Description: "HTTP public for ACME challenge and nginx"
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"
          Description: "HTTPS public production traffic"
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
          Description: "All outbound"
      Tags:
        - Key: Name
          Value: !Sub "vaultmtg-ec2-sg-${Environment}"
        - Key: Environment
          Value: !Ref Environment

  # Standalone ingress rule on the RDS SG granting access from this stack's
  # EC2 SG. Owned here (consumer-side) to break the rds<->ec2-sg cross-stack
  # dependency cycle that would otherwise exist if rds.yml imported the EC2
  # SG ID. Mirrors the RDSIngressFromLambda pattern in sync-lambda.yml.
  # Resolves the #2534 false-positive drift on the rds stack.
  #
  # GroupId is pinned to the live RDS SG physical ID rather than imported
  # from the (DRIFTED, about-to-be-deleted) mtga-companion-rds stack. The
  # same SG will be adopted into the vaultmtg-rds IMPORT stack (#2592 PR C)
  # so the literal remains correct across the rename. See ADR-022 stack-
  # rename + #2592 PR B (consumer migration off mtga-companion-rds-* exports).
  RDSIngressFromEC2:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: IsProduction
    Properties:
      GroupId: sg-0290854dc63d3b6e9
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref EC2SecurityGroup
      Description: "Allow PostgreSQL from production EC2 instance security group"

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
# Dual-emit (#1759 PR-A): both legacy and new export names point to the same
# physical SG. The legacy-prefix export remains the sole consumer (see
# ec2.yml:421-422 and ADR-022 §3 GAP-A). PR-B (full sweep + consumer cutover)
# flips consumers to the `vaultmtg-*` export, and a later PR removes the
# legacy export once no stack imports it.
Outputs:
  EC2SecurityGroupId:
    Description: EC2 SG ID - pass to rds.yml as EC2SecurityGroupId (legacy export name)
    Value: !Ref EC2SecurityGroup
    Export:
      Name: !Sub "mtga-companion-${Environment}-EC2SecurityGroupId"

  EC2SecurityGroupIdVaultMTG:
    Description: EC2 SG ID - vaultmtg-prefixed export (PR-B will migrate consumers here)
    Value: !Ref EC2SecurityGroup
    Export:
      Name: !Sub "vaultmtg-${Environment}-EC2SecurityGroupId"
