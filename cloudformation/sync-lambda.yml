AWSTemplateFormatVersion: '2010-09-09'
Description: Sync Lambda VPC placement, IAM execution role, EventBridge daily schedule, DLQ, and CloudWatch alarms

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]
    Description: Deployment environment
  LambdaFunctionName:
    Type: String
    Default: vault-mtg-sync
    Description: Name of the existing sync Lambda function
  # NOTE: the former 'RdsStackName' parameter (default 'mtga-companion-rds')
  # was removed in #2592 PR B. The RDS security group ID is now pinned to the
  # live physical ID inline (see LambdaSecurityGroup.SecurityGroupEgress and
  # RDSIngressFromLambda below). The legacy 'mtga-companion-rds' stack exports
  # are being deleted; the same SG is being adopted into vaultmtg-rds via a
  # CFN IMPORT changeset, so the literal remains correct across the rename.
  AlarmsStackName:
    Type: String
    Default: vault-mtg-cloudwatch-alarms
    Description: |
      Name of the CloudWatch alarms stack whose SNS topic receives sync alarm notifications.
      The stack must export vaultmtg-${Environment}-AlertTopicArn.
  SubnetIdA:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-05f881623516300b0
    Description: VPC subnet in AZ-a for Lambda (private subnet vaultmtg-production-private-1a, NAT-routed via nat-07dd75f2da096369f; provisioned in #236)
  SubnetIdB:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-06d52651558bfbe7e
    Description: VPC subnet in AZ-b for Lambda (private subnet vaultmtg-production-private-1b, NAT-routed via nat-07dd75f2da096369f; provisioned in #236)
  LambdaTimeout:
    Type: Number
    Default: 900
    Description: Lambda function timeout in seconds (Lambda max = 900s / 15 min; sized for the 22 fetch combinations of 11 sets x 2 formats per run, each making an external HTTPS call + DB write)
  LambdaMemorySize:
    Type: Number
    Default: 256
    Description: Lambda function memory allocation in MB
  ScheduleCron:
    Type: String
    Default: 'cron(0 2 * * ? *)'
    Description: EventBridge Scheduler cron expression (UTC)
  LambdaErrorThreshold:
    Type: Number
    Default: 1
    Description: |
      Number of Lambda invocation errors within EvaluationPeriods × 300s that triggers
      the SyncLambdaErrorAlarm. Default 1 means any single failure fires the alarm.
  LambdaErrorEvaluationPeriods:
    Type: Number
    Default: 1
    Description: |
      Number of consecutive 5-minute periods used by the SyncLambdaErrorAlarm.
      With the default of 1 the alarm fires as soon as one error is observed.
  DLQDepthThreshold:
    Type: Number
    Default: 1
    Description: |
      Number of visible messages in the DLQ that triggers the SyncDLQDepthAlarm.
      Default 1 means any message landing in the DLQ fires the alarm.
  # ---------------------------------------------------------
  # Sync Lambda runtime environment variables (ADR-035)
  #
  # Per ADR-035, this CloudFormation template is the single
  # source-of-record for the sync Lambda's Environment.Variables.
  # SSM paths are resolved declaratively at stack-update time
  # via CFN-native '{{resolve:ssm:...}}' dynamic references.
  # AWS_REGION is intentionally NOT declared here -- the Lambda
  # runtime auto-populates it. LAMBDA_LOCAL_DSN is a local-dev
  # override and is FORBIDDEN in production.
  # ---------------------------------------------------------
  DbEndpointSsmPath:
    Type: String
    Default: /vaultmtg/app/production/db-endpoint
    Description: SSM Parameter Store path that holds the RDS endpoint hostname (resolved at stack-update time into DB_HOST).
  DbNameSsmPath:
    Type: String
    Default: /vaultmtg/app/production/db-name
    Description: SSM Parameter Store path that holds the PostgreSQL database name (resolved at stack-update time into DB_NAME).
  DbUser:
    Type: String
    Default: mtga_sync
    Description: PostgreSQL role the sync Lambda authenticates as via password auth (DB_USER). M2M-only role; password is set out-of-band by the master user and stored in SSM at DbPasswordSsmPath.
  DbPort:
    Type: String
    Default: '5432'
    Description: PostgreSQL port the sync Lambda connects to (DB_PORT).
  DbPasswordSsmPath:
    Type: String
    Default: /vaultmtg/app/production/sync-db-password
    Description: SSM Parameter Store path that holds the sync Lambda PostgreSQL password (resolved at stack-update time into DB_PASSWORD). Stored as SSM Type=String (not SecureString) because the ssm-secure dynamic reference is not supported in Lambda env vars; the credential is M2M-only with no user PII path. See ADR-035 and the #37 pivot PR body for the full security trade-off.

Resources:

  # Security group for the sync Lambda - allows outbound to RDS and AWS APIs
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "mtga-companion-${Environment} sync Lambda outbound access"
      VpcId: vpc-01d097c495e941d32
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          # RDS SG pinned to live physical ID (#2592 PR B). Previously imported
          # via "${RdsStackName}-RDSSecurityGroupId" against 'mtga-companion-rds'.
          DestinationSecurityGroupId: sg-0290854dc63d3b6e9
          Description: Allow outbound to RDS PostgreSQL
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow outbound HTTPS for AWS API calls (CloudWatch logs, SSM-resolved env at runtime if added later)
      Tags:
        - Key: Project
          Value: vaultmtg
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub "mtga-companion-${Environment}-sync-lambda-sg"

  # Inject ingress rule into RDS security group to allow Lambda access.
  # GroupId pinned to live RDS SG physical ID (#2592 PR B) -- see note on the
  # removed RdsStackName parameter above.
  RDSIngressFromLambda:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: sg-0290854dc63d3b6e9
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref LambdaSecurityGroup
      Description: Allow inbound from sync Lambda security group

  # IAM execution role for the Lambda
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    DependsOn: SyncDLQ
    Properties:
      RoleName: !Sub "mtga-companion-${Environment}-sync-lambda-role"
      Description: Execution role for sync Lambda with VPC access (RDS auth is password-based via DB_PASSWORD env injected from SSM)
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      # NOTE: the former 'RdsIamConnect' inline policy granting rds-db:connect
      # was removed in the #37 pivot PR. The sync Lambda now authenticates to
      # RDS via password auth -- DB_PASSWORD is injected by CFN at stack-update
      # time from SSM (see DbPasswordSsmPath above). PR #2650 retains the
      # forensic record of the prior IAM-auth attempt.
      Policies:
        - PolicyName: DLQSendMessage
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt SyncDLQ.Arn
      Tags:
        - Key: Project
          Value: vaultmtg
        - Key: Environment
          Value: !Ref Environment

  # Custom resource to apply VPC config and execution role to the existing Lambda
  # (Lambda was created before this stack; we update its configuration here)
  LambdaVpcConfigFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "mtga-companion-${Environment}-cfn-vpc-config"
      Description: CloudFormation custom resource to configure VPC placement on sync Lambda
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaVpcConfigRole.Arn
      Timeout: 300
      Code:
        ZipFile: |
          import boto3, json, urllib.request

          def send(event, context, status, data={}, reason=''):
              body = json.dumps({
                  'Status': status,
                  'Reason': reason,
                  'PhysicalResourceId': event.get('PhysicalResourceId', 'sync-vpc-config'),
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data,
              }).encode()
              req = urllib.request.Request(event['ResponseURL'], data=body,
                  method='PUT', headers={'Content-Type': ''})
              urllib.request.urlopen(req)

          def handler(event, context):
              try:
                  props = event['ResourceProperties']
                  client = boto3.client('lambda')
                  if event['RequestType'] == 'Delete':
                      send(event, context, 'SUCCESS')
                      return
                  waiter = client.get_waiter('function_updated')
                  waiter.wait(FunctionName=props['FunctionName'])
                  # Per ADR-035, this custom resource is the single source-of-record
                  # for Environment.Variables on the sync Lambda. When the template
                  # supplies EnvironmentVariables, pass it through; when absent, omit
                  # the Environment kwarg so the call is a no-op on that field.
                  kwargs = dict(
                      FunctionName=props['FunctionName'],
                      VpcConfig={
                          'SubnetIds': props['SubnetIds'],
                          'SecurityGroupIds': props['SecurityGroupIds'],
                      },
                      Role=props['ExecutionRoleArn'],
                      Timeout=int(props['Timeout']),
                      MemorySize=int(props['MemorySize']),
                  )
                  env_vars = props.get('EnvironmentVariables')
                  if env_vars:
                      kwargs['Environment'] = {'Variables': dict(env_vars)}
                  client.update_function_configuration(**kwargs)
                  waiter.wait(FunctionName=props['FunctionName'])
                  send(event, context, 'SUCCESS')
              except Exception as e:
                  send(event, context, 'FAILED', reason=str(e))

  LambdaVpcConfigRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Role for the VPC config custom resource Lambda
      # RoleName intentionally omitted -- CFN auto-generates to match the
      # deployed physical ID 'mtga-companion-sync-lambda-LambdaVpcConfigRole-jaapidGm6Kmp'.
      # The literal 'vault-mtg-${Environment}-vpc-config-lambda-role' that lived here
      # was an out-of-window rename (PR #43) deferred per ADR-022 §3; restoring to
      # CFN-managed name avoids replacement until the maintenance-window rename
      # batch can re-add the proper 'vaultmtg-*' (no hyphen) form.
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ConfigureSyncLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:UpdateFunctionConfiguration
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - iam:PassRole
                Resource:
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${LambdaFunctionName}"
                  - !GetAtt LambdaExecutionRole.Arn
              - Effect: Allow
                Action:
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                Resource: "*"
      Tags:
        - Key: Project
          Value: vaultmtg
        - Key: Environment
          Value: !Ref Environment

  LambdaVpcConfigCustomResource:
    Type: Custom::LambdaVpcConfig
    DependsOn:
      - RDSIngressFromLambda
      - LambdaExecutionRole
    Properties:
      ServiceToken: !GetAtt LambdaVpcConfigFunction.Arn
      FunctionName: !Ref LambdaFunctionName
      SubnetIds:
        - !Ref SubnetIdA
        - !Ref SubnetIdB
      SecurityGroupIds:
        - !Ref LambdaSecurityGroup
      ExecutionRoleArn: !GetAtt LambdaExecutionRole.Arn
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemorySize
      # Per ADR-035, the CFN template is the source-of-record for the sync
      # Lambda's Environment.Variables. SSM-backed values are resolved at
      # stack-update time via CFN-native dynamic references. Literal values
      # (DB_USER, DB_PORT) come from template parameters. AWS_REGION is
      # auto-injected by the Lambda runtime and is intentionally omitted.
      EnvironmentVariables:
        DB_HOST: !Sub '{{resolve:ssm:${DbEndpointSsmPath}}}'
        DB_NAME: !Sub '{{resolve:ssm:${DbNameSsmPath}}}'
        DB_USER: !Ref DbUser
        DB_PORT: !Ref DbPort
        # DB_PASSWORD is resolved from SSM at stack-update time and injected
        # into the Lambda's env. Per AWS docs, '{{resolve:ssm-secure:...}}' is
        # NOT supported in Lambda env vars, so DbPasswordSsmPath is an SSM
        # parameter of Type=String. The credential is M2M-only -- see the
        # security trade-off in the #37 pivot PR body. The orchestrator
        # provisions the SSM parameter + sets the DB user's password
        # out-of-band; this template just resolves whatever the param holds.
        DB_PASSWORD: !Sub '{{resolve:ssm:${DbPasswordSsmPath}}}'

  # EventBridge Scheduler execution role
  SchedulerExecutionRole:
    Type: AWS::IAM::Role
    DependsOn: SyncDLQ
    Properties:
      RoleName: !Sub "mtga-companion-${Environment}-sync-scheduler-role"
      Description: Role for EventBridge Scheduler to invoke sync Lambda and write to DLQ
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeSyncLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${LambdaFunctionName}"
        - PolicyName: SendToDLQ
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt SyncDLQ.Arn
      Tags:
        - Key: Project
          Value: vaultmtg
        - Key: Environment
          Value: !Ref Environment

  # Daily EventBridge Scheduler to trigger the sync Lambda at 02:00 UTC
  DailySyncSchedule:
    Type: AWS::Scheduler::Schedule
    DependsOn: SyncDLQ
    Properties:
      Name: !Sub "mtga-companion-${Environment}-sync-daily"
      Description: Daily sync Lambda trigger at 02:00 UTC
      ScheduleExpression: !Ref ScheduleCron
      ScheduleExpressionTimezone: UTC
      FlexibleTimeWindow:
        Mode: 'OFF'
      State: ENABLED
      Target:
        Arn: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${LambdaFunctionName}"
        RoleArn: !GetAtt SchedulerExecutionRole.Arn
        DeadLetterConfig:
          Arn: !GetAtt SyncDLQ.Arn
        RetryPolicy:
          MaximumRetryAttempts: 2

  # On-demand schedule for manual card metadata sync triggers
  # State is DISABLED by default; enable via CLI or console to trigger a one-off sync
  CardsSyncSchedule:
    Type: AWS::Scheduler::Schedule
    DependsOn: SyncDLQ
    Properties:
      Name: !Sub "mtga-companion-${Environment}-sync-cards-manual"
      Description: On-demand schedule for manual card metadata sync - enable to trigger
      ScheduleExpression: 'rate(1 day)'
      ScheduleExpressionTimezone: UTC
      FlexibleTimeWindow:
        Mode: 'OFF'
      State: DISABLED
      Target:
        Arn: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${LambdaFunctionName}"
        RoleArn: !GetAtt SchedulerExecutionRole.Arn
        Input: '{"sync_type":"cards"}'
        DeadLetterConfig:
          Arn: !GetAtt SyncDLQ.Arn
        RetryPolicy:
          MaximumRetryAttempts: 2

  # Allow EventBridge Scheduler to invoke the Lambda for cards sync
  LambdaPermissionSchedulerCards:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Action: lambda:InvokeFunction
      Principal: scheduler.amazonaws.com
      SourceArn: !GetAtt CardsSyncSchedule.Arn

  # Allow EventBridge Scheduler to invoke the Lambda
  LambdaPermissionScheduler:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Action: lambda:InvokeFunction
      Principal: scheduler.amazonaws.com
      SourceArn: !GetAtt DailySyncSchedule.Arn

  # Dead-letter queue for failed EventBridge Scheduler invocations and Lambda async errors
  SyncDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "mtga-companion-${Environment}-sync-dlq"
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Project
          Value: vaultmtg
        - Key: Environment
          Value: !Ref Environment

  # Allow the EventBridge Scheduler role to send failed invocation payloads to the DLQ
  SchedulerDLQPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SyncDLQ
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSchedulerDLQ
            Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt SyncDLQ.Arn

  # Lambda async invocation config: 2 retries; failed events land in the DLQ
  #
  # DependsOn: LambdaExecutionRole is required because the Lambda
  # PutFunctionEventInvokeConfig API validates the function's execution role
  # has sqs:SendMessage on the OnFailure destination at API call time.
  # The inferred dependency on SyncDLQ alone is insufficient -- without this
  # explicit DependsOn, CFN races the EventInvokeConfig create against the
  # LambdaExecutionRole update that adds the DLQSendMessage inline policy.
  # See incident #2611 (2026-05-25 deploy run 26388880578).
  SyncLambdaEventInvokeConfig:
    Type: AWS::Lambda::EventInvokeConfig
    DependsOn: LambdaExecutionRole
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Qualifier: $LATEST
      MaximumRetryAttempts: 2
      DestinationConfig:
        OnFailure:
          Destination: !GetAtt SyncDLQ.Arn

  # ---------------------------------------------------------
  # CloudWatch alarm: Lambda invocation errors
  #
  # Fires when the sync Lambda error count exceeds LambdaErrorThreshold
  # within LambdaErrorEvaluationPeriods × 5-minute windows. A Lambda error
  # means a run failed (fetch/upsert failure or consecutive-skip guard trip).
  # After two EventBridge retries, the failed invocation is routed to the DLQ.
  #
  # TreatMissingData=notBreaching: the Lambda only runs once daily; most
  # evaluation periods will have no data points. Treating missing data as
  # breaching would cause permanent false-alarm state.
  # ---------------------------------------------------------
  SyncLambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: SyncDLQ
    Properties:
      AlarmName: !Sub "mtga-companion-${Environment}-sync-lambda-errors"
      AlarmDescription: !Sub |
        Sync Lambda (${LambdaFunctionName}) reported invocation errors.
        Check CloudWatch Logs for the Lambda function and inspect the DLQ:
          aws sqs receive-message --queue-url ${SyncDLQ} --profile personal
        The consecutive-skip guard may have tripped (set returning 0 cards for
        3+ consecutive days), or the upstream 17Lands API may be unreachable.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref LambdaFunctionName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: !Ref LambdaErrorEvaluationPeriods
      Threshold: !Ref LambdaErrorThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !ImportValue
          Fn::Sub: "vaultmtg-${Environment}-AlertTopicArn"
      OKActions:
        - !ImportValue
          Fn::Sub: "vaultmtg-${Environment}-AlertTopicArn"
      Tags:
        - Key: Project
          Value: vaultmtg
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # CloudWatch alarm: DLQ message depth
  #
  # Fires when any message lands in the DLQ. Each message represents a
  # sync invocation that exhausted all EventBridge retries. A non-empty DLQ
  # is always actionable — inspect the message body for the schedule event
  # payload and cross-reference with Lambda logs.
  #
  # TreatMissingData=notBreaching: SQS only emits the NumberOfMessagesSent
  # metric when messages are delivered; periods with no DLQ activity have no
  # data points and should not trigger the alarm.
  # ---------------------------------------------------------
  SyncDLQDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: SyncDLQ
    Properties:
      AlarmName: !Sub "mtga-companion-${Environment}-sync-dlq-depth"
      AlarmDescription: !Sub |
        Messages have landed in the sync DLQ (${SyncDLQ}).
        This means the sync Lambda failed and exhausted all EventBridge retries.
        Inspect the DLQ messages:
          aws sqs receive-message --queue-url ${SyncDLQ} --profile personal
        Then check CloudWatch Logs for the Lambda invocation error.
      Namespace: AWS/SQS
      MetricName: NumberOfMessagesSent
      Dimensions:
        - Name: QueueName
          Value: !GetAtt SyncDLQ.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref DLQDepthThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !ImportValue
          Fn::Sub: "vaultmtg-${Environment}-AlertTopicArn"
      OKActions:
        - !ImportValue
          Fn::Sub: "vaultmtg-${Environment}-AlertTopicArn"
      Tags:
        - Key: Project
          Value: vaultmtg
        - Key: Environment
          Value: !Ref Environment

Outputs:
  LambdaSecurityGroupId:
    Description: Security group ID for the sync Lambda
    Value: !Ref LambdaSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-LambdaSecurityGroupId"

  LambdaExecutionRoleArn:
    Description: ARN of the sync Lambda execution role
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LambdaExecutionRoleArn"

  DailySyncScheduleArn:
    Description: ARN of the EventBridge daily sync schedule
    Value: !GetAtt DailySyncSchedule.Arn
    Export:
      Name: !Sub "${AWS::StackName}-DailySyncScheduleArn"

  CardsSyncScheduleArn:
    Description: ARN of the on-demand cards sync schedule (disabled by default)
    Value: !GetAtt CardsSyncSchedule.Arn
    Export:
      Name: !Sub "${AWS::StackName}-CardsSyncScheduleArn"

  SyncDLQArn:
    Description: ARN of the SQS dead-letter queue for failed sync invocations
    Value: !GetAtt SyncDLQ.Arn
    Export:
      Name: !Sub "${AWS::StackName}-SyncDLQArn"

  SyncDLQUrl:
    Description: URL of the SQS dead-letter queue for failed sync invocations
    Value: !Ref SyncDLQ
    Export:
      Name: !Sub "${AWS::StackName}-SyncDLQUrl"

  SyncLambdaErrorAlarmArn:
    Description: ARN of the CloudWatch alarm for sync Lambda invocation errors
    Value: !GetAtt SyncLambdaErrorAlarm.Arn
    Export:
      Name: !Sub "${AWS::StackName}-SyncLambdaErrorAlarmArn"

  SyncDLQDepthAlarmArn:
    Description: ARN of the CloudWatch alarm for DLQ message depth
    Value: !GetAtt SyncDLQDepthAlarm.Arn
    Export:
      Name: !Sub "${AWS::StackName}-SyncDLQDepthAlarmArn"
