AWSTemplateFormatVersion: "2010-09-09"
Description: >
  MTGA Companion - Deploy artifacts S3 bucket and GitHub Actions OIDC provider.
  Provides the production S3 bucket for BFF binary artifacts and the OIDC provider
  for GitHub Actions federation. The deploy IAM role (mtga-companion-github-deploy-production)
  was removed in PR #113 and now lives in iam-gha-roles.yml.
  Deploy order: deploy-artifacts (standalone, no dependencies).

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]
    Description: Deployment environment


Resources:

  # ---------------------------------------------------------
  # S3 bucket for production BFF binary artifacts
  # ---------------------------------------------------------
  DeployArtifactsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub "mtga-companion-deploy-artifacts-${Environment}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
          - Id: DeleteOldReleases
            Status: Enabled
            Prefix: releases/
            ExpirationInDays: 90
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: vaultmtg
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # GitHub Actions OIDC provider
  # ---------------------------------------------------------
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd
      Tags:
        - Key: Project
          Value: vaultmtg
        - Key: Environment
          Value: !Ref Environment

  # NOTE: GitHubActionsDeployRole (mtga-companion-github-deploy-production) was
  # deleted from IAM via PR #113. The resource block has been removed from this
  # template to reconcile drift. The replacement role lives in iam-gha-roles.yml.

Outputs:
  DeployBucketName:
    Description: S3 bucket name for production deploy artifacts
    Value: !Ref DeployArtifactsBucket
    Export:
      Name: !Sub "${AWS::StackName}-DeployBucketName"

