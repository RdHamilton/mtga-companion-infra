AWSTemplateFormatVersion: "2010-09-09"
Description: >
  MTGA Companion - Deploy artifacts S3 buckets and GitHub Actions OIDC deploy role.
  Provides the production S3 bucket for BFF binary artifacts and the IAM role
  that GitHub Actions assumes via OIDC to upload binaries and trigger SSM deploys.
  The staging bucket (mtga-companion-deploy-artifacts-staging) was created out-of-band
  by the staging-deploy workflow and is referenced here only by ARN for IAM grants;
  importing it into this stack is tracked separately.
  Deploy order: deploy-artifacts (standalone, no dependencies).

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]
    Description: Deployment environment

  GitHubOrg:
    Type: String
    Default: RdHamilton
    Description: GitHub organization or user name

  GitHubRepo:
    Type: String
    Default: vault-mtg
    Description: GitHub repository name (app repo)

  StagingArtifactsBucketName:
    Type: String
    Default: mtga-companion-deploy-artifacts-staging
    Description: >
      Name of the staging deploy artifacts bucket. The bucket is currently
      managed out-of-band by the staging-deploy workflow; this template only
      grants the GitHub Actions deploy role access to it by ARN.

Resources:

  # ---------------------------------------------------------
  # S3 bucket for production BFF binary artifacts
  # ---------------------------------------------------------
  DeployArtifactsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub "mtga-companion-deploy-artifacts-${Environment}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
          - Id: DeleteOldReleases
            Status: Enabled
            Prefix: releases/
            ExpirationInDays: 90
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: mtga-companion
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # GitHub Actions OIDC provider
  # ---------------------------------------------------------
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd
      Tags:
        - Key: Project
          Value: mtga-companion
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # IAM role assumed by GitHub Actions via OIDC
  # Covers both production and staging artifact buckets so that
  # staging-deploy.yml and release.yml can use the same role ARN
  # stored in the AWS_DEPLOY_ROLE_ARN repository secret.
  # ---------------------------------------------------------
  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "mtga-companion-github-deploy-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
      Policies:
        - PolicyName: S3DeployArtifactsWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Production deploy artifacts bucket
              - Sid: ProductionBucketAccess
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DeployArtifactsBucket.Arn
                  - !Sub "${DeployArtifactsBucket.Arn}/*"
              # Staging deploy artifacts bucket
              # The bucket is managed out-of-band; grant access by ARN.
              # PutBucketVersioning/GetBucketVersioning are required because
              # staging-deploy.yml calls `aws s3api put-bucket-versioning`
              # to ensure versioning is enabled idempotently.
              - Sid: StagingBucketAccess
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:CreateBucket
                  - s3:PutBucketVersioning
                  - s3:GetBucketVersioning
                Resource:
                  - !Sub "arn:aws:s3:::${StagingArtifactsBucketName}"
                  - !Sub "arn:aws:s3:::${StagingArtifactsBucketName}/*"
        - PolicyName: SSMSendCommand
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                Resource:
                  - !Sub "arn:aws:ssm:us-east-1::document/AWS-RunShellScript"
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                Resource:
                  - !Sub "arn:aws:ec2:us-east-1:${AWS::AccountId}:instance/*"
                Condition:
                  StringEquals:
                    aws:ResourceTag/Project: mtga-companion
              - Effect: Allow
                Action:
                  - ssm:GetCommandInvocation
                  - ssm:ListCommandInvocations
                Resource: "*"
        # Grants the deploy runner read access to SSM parameters used during
        # the deploy pipeline (ALLOWED_ORIGINS, CLERK_SECRET_KEY).
        # SecureString parameters require kms:Decrypt on the SSM KMS key.
        - PolicyName: SSMParameterRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource:
                  - !Sub "arn:aws:ssm:us-east-1:${AWS::AccountId}:parameter/mtga-companion/production/*"
                  - !Sub "arn:aws:ssm:us-east-1:${AWS::AccountId}:parameter/mtga-companion/staging/*"
                  # 5a (Phase 5 VaultMTG rename) -- additive expand; mtga-companion entries
                  # remain and will be removed in step 5d after SSM cutover is verified.
                  - !Sub "arn:aws:ssm:us-east-1:${AWS::AccountId}:parameter/vaultmtg/production/*"
                  - !Sub "arn:aws:ssm:us-east-1:${AWS::AccountId}:parameter/vaultmtg/staging/*"
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: !Sub "arn:aws:kms:us-east-1:${AWS::AccountId}:key/*"
                Condition:
                  StringEquals:
                    kms:ViaService: ssm.us-east-1.amazonaws.com
      Tags:
        - Key: Project
          Value: mtga-companion
        - Key: Environment
          Value: !Ref Environment

Outputs:
  DeployBucketName:
    Description: S3 bucket name for production deploy artifacts
    Value: !Ref DeployArtifactsBucket
    Export:
      Name: !Sub "${AWS::StackName}-DeployBucketName"

  StagingDeployBucketName:
    Description: S3 bucket name for staging deploy artifacts (managed out-of-band)
    Value: !Ref StagingArtifactsBucketName
    Export:
      Name: !Sub "${AWS::StackName}-StagingDeployBucketName"

  GitHubActionsDeployRoleArn:
    Description: IAM role ARN for GitHub Actions to assume via OIDC
    Value: !GetAtt GitHubActionsDeployRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-GitHubActionsDeployRoleArn"
