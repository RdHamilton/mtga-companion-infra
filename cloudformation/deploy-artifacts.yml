AWSTemplateFormatVersion: "2010-09-09"
Description: >
  MTGA Companion - Deploy artifacts S3 bucket and GitHub Actions OIDC deploy role.
  Provides the S3 bucket for BFF binary artifacts and the IAM role that GitHub Actions
  assumes via OIDC to upload binaries and trigger SSM deployments.
  Deploy order: deploy-artifacts (standalone, no dependencies).

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]
    Description: Deployment environment

  GitHubOrg:
    Type: String
    Default: RdHamilton
    Description: GitHub organization or user name

  GitHubRepo:
    Type: String
    Default: MTGA-Companion
    Description: GitHub repository name (app repo)

Resources:

  # ---------------------------------------------------------
  # S3 bucket for BFF binary artifacts
  # ---------------------------------------------------------
  DeployArtifactsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub "mtga-companion-deploy-artifacts-${Environment}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
          - Id: DeleteOldReleases
            Status: Enabled
            Prefix: releases/
            ExpirationInDays: 90
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: mtga-companion
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # GitHub Actions OIDC provider
  # ---------------------------------------------------------
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd
      Tags:
        - Key: Project
          Value: mtga-companion
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # IAM role assumed by GitHub Actions via OIDC
  # ---------------------------------------------------------
  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "mtga-companion-github-deploy-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
      Policies:
        - PolicyName: S3DeployArtifactsWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DeployArtifactsBucket.Arn
                  - !Sub "${DeployArtifactsBucket.Arn}/*"
        - PolicyName: SSMSendCommand
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                Resource:
                  - !Sub "arn:aws:ssm:us-east-1::document/AWS-RunShellScript"
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                Resource:
                  - !Sub "arn:aws:ec2:us-east-1:${AWS::AccountId}:instance/*"
                Condition:
                  StringEquals:
                    aws:ResourceTag/Project: mtga-companion
              - Effect: Allow
                Action:
                  - ssm:GetCommandInvocation
                  - ssm:ListCommandInvocations
                Resource: "*"
        # Grants the deploy runner read access to SSM parameters used during
        # the deploy pipeline (ALLOWED_ORIGINS, DAEMON_JWT_SECRET). The
        # daemon-jwt-secret is a SecureString so kms:Decrypt is also required
        # on the default SSM KMS key.
        - PolicyName: SSMParameterRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource:
                  - !Sub "arn:aws:ssm:us-east-1:${AWS::AccountId}:parameter/mtga-companion/production/ALLOWED_ORIGINS"
                  - !Sub "arn:aws:ssm:us-east-1:${AWS::AccountId}:parameter/mtga-companion/prod/daemon-jwt-secret"
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: !Sub "arn:aws:kms:us-east-1:${AWS::AccountId}:key/*"
                Condition:
                  StringEquals:
                    kms:ViaService: ssm.us-east-1.amazonaws.com
      Tags:
        - Key: Project
          Value: mtga-companion
        - Key: Environment
          Value: !Ref Environment

Outputs:
  DeployBucketName:
    Description: S3 bucket name for deploy artifacts
    Value: !Ref DeployArtifactsBucket
    Export:
      Name: !Sub "${AWS::StackName}-DeployBucketName"

  GitHubActionsDeployRoleArn:
    Description: IAM role ARN for GitHub Actions to assume via OIDC
    Value: !GetAtt GitHubActionsDeployRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-GitHubActionsDeployRoleArn"
