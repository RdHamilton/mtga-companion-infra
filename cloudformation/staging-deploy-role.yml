AWSTemplateFormatVersion: "2010-09-09"
Description: >
  S-03: vaultmtg-staging-deploy-provisioner scoped IAM role (ADR-022 addendum
  sect4A). Dedicated deploy-provisioning identity for provision-staging-env.sh
  AND run-staging-migrations.sh (Path 2 mirror, Path X 2026-05-24).
  Scoped to the staging SSM namespaces and KMS aliases listed in the role
  block below, plus the staging RDS-managed secret. This PR (Path X PR 1c,
  2026-05-24) additionally grants read-only S3 access on the
  vaultmtg-deploy-artifacts-staging bucket scoped to the migrations/* and
  infra-db/* prefixes only.
  No production SSM access. No writes. No EC2 control-plane.
  Trust: GitHub OIDC (Path B, end state) + EC2 instance AssumeRole bridge
  (Path A, interim - restored Path X 2026-05-24, ADR-022 sect4A.7 addendum).
  Gates S-02 and EC-6.
  Deploy order: standalone. See RdHamilton/vault-mtg#2364, #2525.

Parameters:
  GitHubOrg:
    Type: String
    Default: RdHamilton
    Description: GitHub organization or user that owns the app repo

  GitHubRepo:
    Type: String
    Default: vault-mtg
    Description: GitHub app repository name (vault-mtg)

  OidcProviderArn:
    Type: String
    Default: arn:aws:iam::901347789205:oidc-provider/token.actions.githubusercontent.com
    Description: ARN of the GitHub Actions OIDC provider in this account

  EC2RoleArn:
    Type: String
    Default: arn:aws:iam::901347789205:role/mtga-companion-ec2-role-production
    Description: >
      ARN of the production EC2 instance role. Used for the Path A interim trust
      statement (sts:AssumeRole bridge). Path A is the canonical interim per
      ADR-022 sect4A.7 (Path X reversal, 2026-05-24); Path B (GHA-runner render)
      is deferred to Wave-2 hardening. Removed when Path B refactor lands.

Resources:

  # ---------------------------------------------------------------------------
  # vaultmtg-staging-deploy-provisioner
  #
  # Purpose: dedicated, scoped IAM identity for the staging BFF env-file
  #   provisioning step. Replaces the production EC2 instance role as the
  #   credential source for provision-staging-env.sh.
  #
  # Trust policy (two statements):
  #   Path B (end state) -- GitHub OIDC. staging-deploy.yml assumes this role
  #   directly in the GHA runner after Bob's refactor lands (sect4A.3). The
  #   sub-claim is pinned to refs/heads/main to restrict the scope to the
  #   canonical deploy path; the staging-deploy.yml workflow runs only on
  #   pushes to main and workflow_dispatch from main.
  #
  #   Path A (interim) -- the production EC2 instance role may assume this
  #   role via sts:AssumeRole so that provision-staging-env.sh can call
  #   sts:AssumeRole from inside the SSM RunCommand session and export
  #   scoped credentials before any aws ssm get-parameter call. The
  #   instance role needs only sts:AssumeRole on this one ARN (not the
  #   SSM grants), which is strictly smaller than its current /vaultmtg/*
  #   grant. The Path A statement is removed in the same PR as the Path B
  #   refactor (sect4A.3, sect4A.6).
  #
  # Permission set: exactly the SSM paths and secrets provision-staging-env.sh
  #   calls, auditable line-by-line against the script:
  #
  #   /vaultmtg/staging/*          -- BFF core + DB config + integration secrets
  #   /vaultmtg/app/staging/*      -- target namespace after R-13 cutover
  #   /mtga-companion/staging/*    -- legacy path; dropped in step 5d
  #   kms:Decrypt via SSM KMS key  -- SecureString params (CLERK_SECRET_KEY etc.)
  #   secretsmanager:GetSecretValue on mtga-companion/staging/* -- staging RDS credential only
  #   s3:ListBucket / s3:GetObject on vaultmtg-deploy-artifacts-staging
  #     scoped to migrations/* and infra-db/* -- run-staging-migrations.sh
  #     downloads SQL migrations (aws s3 sync .../migrations/postgres/) and
  #     grant-staging-tables.sql (aws s3 cp .../infra-db/grant-staging-tables.sql)
  #     from these prefixes AFTER assume-role. The scripts/ and infra-scripts/
  #     prefixes are read by the EC2 instance role at the SSM RunCommand step
  #     BEFORE this role is assumed and are therefore deliberately NOT granted
  #     here (the EC2 instance role's S3DeployArtifactsRead policy in ec2.yml
  #     already covers those reads).
  #
  # What is NOT granted (explicit scope boundary):
  #   - /vaultmtg/prod/* or /vaultmtg/production/*
  #   - /mtga-companion/production/*
  #   - ssm:PutParameter, ssm:DeleteParameter (no write)
  #   - S3 outside vaultmtg-deploy-artifacts-staging (no other buckets)
  #   - S3 writes (no PutObject, no DeleteObject)
  #   - S3 keys outside migrations/* and infra-db/* on the staging bucket
  #     (no scripts/*, no infra-scripts/*, no staging/* state files)
  #   - EC2 control-plane actions
  #   - secretsmanager:GetSecretValue on production secrets
  # ---------------------------------------------------------------------------
  StagingDeployProvisionerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: vaultmtg-staging-deploy-provisioner
      Description: >
        Dedicated scoped IAM role for the staging BFF env-file provisioning step.
        Grants the staging SSM namespaces and the staging RDS-managed secret
        per the inline policies below. Path X PR 1c additionally grants
        s3:ListBucket / s3:GetObject on vaultmtg-deploy-artifacts-staging
        scoped to the migrations/* and infra-db/* prefixes.
        No production SSM access. No parameter writes. No S3 writes.
        See ADR-022 addendum sect4A and RdHamilton/vault-mtg#2364.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          # Path B -- GitHub OIDC (end state).
          # staging-deploy.yml assumes this role in the GHA runner after the
          # Bob-owned Path B refactor lands (vault-mtg#2364 sect4A.3).
          # sub claims:
          #   refs/heads/main  -- canonical push-to-main / workflow_dispatch deploy path
          #   environment:staging -- staging-deploy.yml runs under environment: staging;
          #                         its OIDC sub is repo:org/repo:environment:staging,
          #                         not a ref sub. Both must be accepted or the
          #                         assume-role call fails at cutover.
          - Sid: GitHubOIDCTrust
            Effect: Allow
            Principal:
              Federated: !Ref OidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:sub:
                  - !Sub "repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/main"
                  - !Sub "repo:${GitHubOrg}/${GitHubRepo}:environment:staging"
          # Path A -- interim bridge (canonical interim per ADR-022 sect4A.7,
          # restored 2026-05-24 via Path X reversal; removed when Path B
          # GHA-runner refactor lands in Wave-2 hardening).
          # Allows provision-staging-env.sh, running on-instance via SSM RunCommand,
          # to call sts:AssumeRole and export scoped credentials before any SSM read.
          # The EC2 instance role needs only sts:AssumeRole on this one ARN (S-02
          # replaces the current blanket /vaultmtg/* grant with this pinhole).
          # Tracked for removal: Wave-2 Path B refactor ticket.
          - Sid: EC2InstanceRoleBridge
            Effect: Allow
            Principal:
              AWS: !Ref EC2RoleArn
            Action: sts:AssumeRole
      Policies:
        # SSM reads: exactly the staging parameter paths provision-staging-env.sh
        # enumerates. Both the current flat paths and the post-cutover app sub-path
        # are granted so the role works before, during, and after the R-13 namespace
        # migration. The mtga-companion/staging/* entry is dropped in step 5d.
        - PolicyName: StagingProvisioningSSMRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: StagingSSMRead
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource:
                  # Current flat path (pre-cutover + cutover window)
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/staging/*"
                  # Target path (post-R-13 namespace cutover)
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/vaultmtg/app/staging/*"
                  # Legacy path (dropped in step 5d after SSM cutover verified)
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mtga-companion/staging/*"
        # KMS Decrypt: required for two distinct envelope-encrypted reads:
        #   1. SecureString SSM parameters (CLERK_SECRET_KEY, CLERK_PUBLISHABLE_KEY,
        #      etc.) encrypted with the AWS-managed SSM KMS key (alias/aws/ssm).
        #   2. The RDS-managed staging DB secret (rds!db-12c647a0-...) encrypted
        #      with the AWS-managed Secrets Manager KMS key (alias/aws/secretsmanager).
        #      RDS auto-rotation publishes the credential under the default
        #      Secrets Manager key, not the SSM key -- a separate Decrypt grant
        #      is required, scoped via kms:ViaService to the Secrets Manager
        #      service endpoint only.
        # Each statement is constrained via kms:ViaService so the Decrypt can
        # only be called through the originating service endpoint, not directly
        # against the key. No customer-managed KMS keys in scope.
        - PolicyName: StagingProvisioningKMSDecrypt
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: KMSDecryptViaSSM
                Effect: Allow
                Action: kms:Decrypt
                Resource: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/ssm"
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "ssm.${AWS::Region}.amazonaws.com"
              - Sid: KMSDecryptViaSecretsManager
                Effect: Allow
                Action: kms:Decrypt
                Resource: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/secretsmanager"
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "secretsmanager.${AWS::Region}.amazonaws.com"
        # Secrets Manager: staging DB credentials only.
        # Two distinct secret sources, both required by the staging deploy flow:
        #
        #   1. mtga-companion/staging/*  -- user-created staging secrets namespace
        #      (legacy DB credential path, integration secrets).
        #
        #   2. rds!db-12c647a0-0880-45e5-bf35-d9c1ccb05433-*  -- the RDS-managed
        #      auto-rotated credential for the staging RDS instance. The trailing
        #      "-*" suffix is the 6-char random suffix AWS appends to the ARN
        #      (e.g. -qzBP5e); the unique secret-id prefix is pinned to staging.
        #      run-staging-migrations.sh reads this secret to obtain the
        #      postgres password before running migrations (Path 2 mirror of
        #      vault-mtg#2537 / provision-staging-env.sh refactor).
        #
        # Scope: there is currently no production RDS instance in this account
        # (staging is the only RDS), but the explicit secret-id prefix is used
        # rather than the broad rds!db-* wildcard so that a future production
        # RDS creation does not silently widen this role's blast radius.
        - PolicyName: StagingProvisioningDBSecretRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: StagingDBSecretRead
                Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  # Staging user-created secrets namespace (legacy + integration)
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:mtga-companion/staging/*"
                  # Staging RDS-managed credential (auto-rotated by RDS).
                  # Explicit secret-id prefix -- NOT the broad rds!db-* wildcard --
                  # so a future prod RDS does not silently inherit this grant.
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:rds!db-12c647a0-0880-45e5-bf35-d9c1ccb05433-*"
        # S3 read-only on the staging deploy artifacts bucket.
        # Path X PR 1c (2026-05-24): run-staging-migrations.sh, after assume-role,
        # downloads two artifact sets from S3 (script lives in the app repo at
        # RdHamilton/vault-mtg infra/scripts/run-staging-migrations.sh):
        #
        #   1. Migrations (L179):
        #        aws s3 sync s3://vaultmtg-deploy-artifacts-staging/migrations/postgres/
        #      -> requires s3:ListBucket on the bucket (sync enumerates keys
        #         under the prefix) and s3:GetObject on migrations/* (sync
        #         fetches each enumerated key).
        #
        #   2. Table grants SQL (L323):
        #        aws s3 cp s3://vaultmtg-deploy-artifacts-staging/infra-db/grant-staging-tables.sql
        #      -> requires s3:GetObject on infra-db/*.
        #
        # Bucket server-side encryption is AES256 (S3-managed) per
        # `aws s3api get-bucket-encryption --bucket vaultmtg-deploy-artifacts-staging`
        # (verified 2026-05-24) -- no kms:Decrypt grant required for GetObject.
        #
        # NOT granted (scope boundary):
        #   - s3:PutObject / s3:DeleteObject (read-only deploy consumer).
        #   - scripts/* and infra-scripts/* prefixes: those are read by the
        #     EC2 instance role at the SSM RunCommand step (workflow lives at
        #     RdHamilton/vault-mtg .github/workflows/deploy-bff.yml L290) to
        #     bootstrap the migration script onto the instance BEFORE this
        #     role is assumed.
        #     The instance role's S3DeployArtifactsRead policy (ec2.yml)
        #     already covers those reads.
        #   - staging/* state-file prefix and all other prefixes / buckets.
        #
        # ListBucket is constrained by an s3:prefix condition so this role can
        # only enumerate the migrations/ and infra-db/ prefixes -- it cannot
        # walk the bucket root to discover other artifacts.
        - PolicyName: StagingProvisioningS3Read
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: StagingDeployArtifactsListBucket
                Effect: Allow
                Action: s3:ListBucket
                Resource: arn:aws:s3:::vaultmtg-deploy-artifacts-staging
                Condition:
                  StringLike:
                    s3:prefix:
                      - migrations/*
                      - infra-db/*
              - Sid: StagingDeployArtifactsGetObject
                Effect: Allow
                Action: s3:GetObject
                Resource:
                  - arn:aws:s3:::vaultmtg-deploy-artifacts-staging/migrations/*
                  - arn:aws:s3:::vaultmtg-deploy-artifacts-staging/infra-db/*
      Tags:
        - Key: Project
          Value: mtga-companion
        - Key: Environment
          Value: staging
        - Key: ManagedBy
          Value: cloudformation
        - Key: Stack
          Value: mtga-companion-staging-deploy-role
        - Key: Purpose
          Value: staging-deploy-provisioner
        - Key: Ticket
          Value: "2364"

Outputs:
  ProvisionerRoleArn:
    Description: >
      ARN of the vaultmtg-staging-deploy-provisioner role.
      Use this ARN in staging-deploy.yml (Path B) and as the target for
      sts:AssumeRole in provision-staging-env.sh (Path A interim bridge).
      Also used by S-02 to replace the /vaultmtg/* blanket grant on the
      production EC2 instance role with a single sts:AssumeRole pinhole.
    Value: !GetAtt StagingDeployProvisionerRole.Arn
    Export:
      Name: mtga-companion-staging-deploy-ProvisionerRoleArn

  ProvisionerRoleName:
    Description: Name of the vaultmtg-staging-deploy-provisioner role
    Value: !Ref StagingDeployProvisionerRole
    Export:
      Name: mtga-companion-staging-deploy-ProvisionerRoleName
