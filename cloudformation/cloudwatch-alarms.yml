    Value: !GetAtt TlsCertExpiryAlarm.Arn
    Export:
      Name: !Sub "vaultmtg-${Environment}-TlsCertExpiryAlarmArn"

  ProjectionDLQAlarmArn:
    Description: ARN of the projection dead-letter (DLQ) CloudWatch alarm.
    Value: !GetAtt ProjectionDLQAlarm.Arn
    Export:
      Name: !Sub "vaultmtg-${Environment}-ProjectionDLQAlarmArn"

  RdsDatabaseConnectionsAlarmArn:
    Description: ARN of the RDS database-connections CloudWatch alarm.
    Value: !GetAtt RdsDatabaseConnectionsAlarm.Arn
    Export:
      Name: !Sub "vaultmtg-${Environment}-RdsDatabaseConnectionsAlarmArn"
