AWSTemplateFormatVersion: "2010-09-09"
Description: |
  VaultMTG - CloudWatch alarms for the VaultMTG stack.
  Monitors disk utilisation and bff-staging service restart loops on the shared EC2 instance
  (staging alarms), BFF HTTP 5xx rate, BFF p99 latency, BFF-down synthetic health check
  (Route 53), BFF production restart loops, EC2 CPU/memory, RDS latency/CPU/free-storage,
  TLS certificate expiry for production, and projection dead-letter (DLQ) events.
  All alarms publish to a single shared SNS topic (vaultmtg-ENV-alerts) so that
  additional alarm sources -- e.g. the S-06 security alarms once CloudTrail exists -- can
  subscribe to the same topic via the exported vaultmtg-ENV-AlertTopicArn.
  Deploy order: ec2-sg -> rds -> ec2 -> cloudwatch-alarms.

Parameters:
  Environment:
    Type: String
    Description: Deployment environment (production or staging).
    Default: production
    AllowedValues: [production, staging]

  AlarmEmail:
    Type: String
    Description: |
      E-mail address that receives alarm notifications. Must be set via the
      cloudwatch-alarms.json / cloudwatch-alarms-staging.json parameter file
      -- there is no useful default. SNS will send a one-time confirmation
      e-mail to this address; the link must be clicked before the topic will
      deliver alarms to the inbox.
    AllowedPattern: "^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$"
    ConstraintDescription: AlarmEmail must be a valid e-mail address.

  AlertWebhookUrl:
    Type: String
    Description: |
      HTTPS endpoint for chat alert delivery (e.g. a Slack or Discord incoming
      webhook). When set, an https subscription is added to the shared alerts
      topic so alarm notifications are also posted to chat. Leave blank to
      provision the topic with the e-mail subscription only.
    Default: ""
    NoEcho: true

  # ----- Staging-only parameters -----

  DiskAlarmThreshold:
    Type: Number
    Description: Disk utilisation percentage that triggers the staging disk-fill alarm.
    Default: 70

  RestartCountThreshold:
    Type: Number
    Description: |
      Number of bff-staging service restarts within the evaluation period that
      triggers the restart-loop alarm.
    Default: 3

  # ----- BFF HTTP 5xx alarm -----

  Bff5xxThreshold:
    Type: Number
    Description: |
      Number of HTTP 5xx responses per 5-minute period that triggers the BFF 5xx alarm.
      Default 5 allows for occasional transient errors without false-positive pages.
    Default: 5

  Bff5xxEvaluationPeriods:
    Type: Number
    Description: |
      Number of consecutive 5-minute periods with 5xx count above threshold before alarm fires.
      Default 2 (10 minutes) reduces noise while keeping response time acceptable.
    Default: 2

  # ----- EC2 CPU alarm -----

  EC2CpuThreshold:
    Type: Number
    Description: EC2 CPU utilisation percentage that triggers the alarm (default 85%).
    Default: 85

  EC2CpuEvaluationPeriods:
    Type: Number
    Description: |
      Number of consecutive 5-minute periods above EC2CpuThreshold before alarm fires.
      Default 3 (15 minutes) guards against transient spikes during deploys.
    Default: 3

  # ----- EC2 memory alarm (CWAgent) -----

  EC2MemThreshold:
    Type: Number
    Description: EC2 memory utilisation percentage that triggers the alarm (default 90%).
    Default: 90

  EC2MemEvaluationPeriods:
    Type: Number
    Description: |
      Number of consecutive 1-minute periods above EC2MemThreshold before alarm fires.
      Memory pressure tends to be sustained rather than spiky, so default 5 (5 minutes)
      is sufficient.
    Default: 5

  # ----- RDS latency alarms -----

  RdsReadLatencyThreshold:
    Type: Number
    Description: |
      RDS ReadLatency threshold in seconds (P99 proxy via Average).
      Default 0.05 s (50 ms) -- appropriate for t3.micro with pgvector workloads.
    Default: 0.05

  RdsWriteLatencyThreshold:
    Type: Number
    Description: |
      RDS WriteLatency threshold in seconds (P99 proxy via Average).
      Default 0.1 s (100 ms).
    Default: 0.1

  RdsLatencyEvaluationPeriods:
    Type: Number
    Description: |
      Number of consecutive 5-minute periods above the latency threshold before alarm fires.
    Default: 3

  # ----- RDS CPU alarm -----

  RdsCpuThreshold:
    Type: Number
    Description: RDS CPU utilisation percentage that triggers the alarm (default 80%).
    Default: 80

  RdsCpuEvaluationPeriods:
    Type: Number
    Description: |
      Number of consecutive 5-minute periods above RdsCpuThreshold before alarm fires.
    Default: 3

  # ----- RDS free-storage alarm -----

  RdsFreeStorageThresholdBytes:
    Type: Number
    Description: |
      RDS FreeStorageSpace threshold in bytes. The alarm fires when free storage
      drops below this value. Default 4294967296 (4 GiB) -- 20% of the 20 GiB
      allocated storage, leaving a comfortable window to extend storage or clean
      up before the volume fills and the database becomes read-only.
    Default: 4294967296

  RdsFreeStorageEvaluationPeriods:
    Type: Number
    Description: |
      Number of consecutive 5-minute periods below RdsFreeStorageThresholdBytes
      before the alarm fires. Default 1 -- a low-storage condition does not
      self-resolve, so there is no value in waiting multiple periods.
    Default: 1

  # ----- BFF p99 latency alarm -----

  BffLatencyThresholdMs:
    Type: Number
    Description: |
      BFF request latency threshold in milliseconds. The alarm fires when the
      per-minute p99 request time published by the latency metric publisher
      exceeds this value. Default 750 ms -- generous headroom over the expected
      sub-100 ms BFF response time, so the alarm flags genuine degradation.
    Default: 750

  BffLatencyEvaluationPeriods:
    Type: Number
    Description: |
      Number of consecutive 5-minute periods with p99 latency above
      BffLatencyThresholdMs before the alarm fires. Default 3 (15 minutes)
      reduces noise from transient spikes during deploys or cold caches.
    Default: 3

  # ----- BFF production restart-loop alarm -----

  BffRestartCountThreshold:
    Type: Number
    Description: |
      Number of production BFF (vaultmtg-bff.service) restarts within the
      5-minute evaluation window that triggers the restart-loop alarm.
    Default: 3

  # ----- RDS database-connections alarm -----

  RdsDatabaseConnectionsThreshold:
    Type: Number
    Description: |
      Number of active RDS database connections that triggers the alarm.
      Default 80 -- conservative ceiling for a db.t3.micro (max_connections ~100)
      that leaves headroom before the database starts refusing new connections.
    Default: 80

  RdsDatabaseConnectionsEvaluationPeriods:
    Type: Number
    Description: |
      Number of consecutive 1-minute periods above RdsDatabaseConnectionsThreshold
      before the alarm fires. Default 5 (5 minutes) guards against transient spikes
      during cold-start request bursts while still catching genuine connection leaks.
    Default: 5

  # ----- RDS identifier -----

  RdsInstanceIdentifier:
    Type: String
    Description: RDS DB instance identifier (used to scope the latency, CPU and free-storage alarms).
    Default: mtga-companion-postgres

  # ----- BFF-down synthetic health check -----

  BffHealthCheckHost:
    Type: String
    Description: |
      Fully-qualified hostname for the BFF Route 53 health check (no protocol prefix).
      The health checker sends HTTPS GET /healthz to this host on port 443.
    Default: api.vaultmtg.app

  BffHealthCheckFailureThreshold:
    Type: Number
    Description: |
      Number of consecutive Route 53 health check failures before the alarm fires.
      Default 3 (~90 s at 30 s interval) balances sensitivity with false-positive avoidance.
    Default: 3

  # ----- TLS certificate expiry alarm -----

  AcmCertificateArn:
    Type: String
    Description: |
      ARN of the ACM certificate to monitor for impending expiry.
      The alarm fires when DaysToExpiry drops below TlsExpiryThresholdDays.
    Default: "arn:aws:acm:us-east-1:901347789205:certificate/a59cef77-0b50-40b7-b6b9-1183e3f3b61f"
    AllowedPattern: "arn:aws:acm:[a-z0-9-]+:[0-9]{12}:certificate/[a-f0-9-]+"
    ConstraintDescription: Must be a valid ACM certificate ARN.

  TlsExpiryThresholdDays:
    Type: Number
    Description: |
      Number of days before TLS certificate expiry at which the alarm fires.
      Default 30 gives one full renewal window to act before the cert expires.
    Default: 30

Conditions:
  # True when an AlertWebhookUrl was supplied -- gates the https chat subscription.
  HasAlertWebhook: !Not [!Equals [!Ref AlertWebhookUrl, ""]]

Resources:

  # ---------------------------------------------------------
  # Shared SNS topic - operational alert notifications
  #
  # Single shared topic for all VaultMTG operational alarms.
  # Every CloudWatch alarm in this stack publishes here, and the
  # topic ARN is exported as vaultmtg-${Environment}-AlertTopicArn
  # so additional alarm sources can subscribe later WITHOUT a topic
  # replacement -- notably the S-06 security alarms (#2333) once the
  # CloudTrail stack exists.
  #
  # Subscriptions are declared OUTSIDE the topic as separate
  # AWS::SNS::Subscription resources (AlertEmailSubscription,
  # AlertWebhookSubscription) so an Endpoint change forces CFN to
  # replace the subscription instead of being silently ignored --
  # the inline Subscription property on AWS::SNS::Topic has
  # create-only semantics for email and does not re-evaluate when
  # the underlying parameter value changes (#2544).
  # ---------------------------------------------------------
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "vaultmtg-${Environment}-alerts"
      DisplayName: VaultMTG Operational Alerts
      Tags:
        - Key: Project
          Value: vault-mtg
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # E-mail subscription (always created)
  #
  # Separate AWS::SNS::Subscription resource so that changing the
  # AlarmEmail parameter forces CFN to replace the subscription
  # (delete the old endpoint, create a new pending one), instead of
  # silently keeping the previous Endpoint as it does with an
  # inline Subscription on the topic (#2544).
  #
  # The new endpoint will receive a one-time SNS confirmation email;
  # the click-through must be completed for the topic to deliver
  # alarms to the inbox. SubscriptionsConfirmed transitions from
  # 0 -> 1 once the link is clicked.
  # ---------------------------------------------------------
  AlertEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertTopic
      Protocol: email
      Endpoint: !Ref AlarmEmail

  # ---------------------------------------------------------
  # Explicit topic access control (Sarah #54, ticket #2385 AC1).
  #
  # Without an explicit TopicPolicy, SNS falls back to an implicit policy
  # that grants the topic owner full management, but service-principal
  # Publish access is undefined for cross-account / cross-service callers.
  # CloudWatch and EventBridge inside the same account CAN publish without
  # an explicit policy, but the gap leaves us no audit trail and no way to
  # add additional publishers safely. This policy makes the trust surface
  # explicit:
  #
  #   - cloudwatch.amazonaws.com  : CloudWatch Alarm actions in this stack
  #                                 plus the S-06 security alarms stack
  #                                 (security-alarms.yml) that imports
  #                                 vaultmtg-${Environment}-AlertTopicArn.
  #   - events.amazonaws.com      : EventBridge (forward-compatible — not
  #                                 currently used, but lets us add EventBridge
  #                                 rule targets without re-deploying this
  #                                 stack first).
  #
  # The aws:SourceAccount condition restricts each principal to publishing
  # only from this AWS account, preventing the confused-deputy pattern.
  #
  # Publish is the only action allowed; topic management (Subscribe, Delete,
  # SetTopicAttributes, etc.) remains restricted to the topic owner under
  # the implicit default policy.
  # ---------------------------------------------------------
  AlertTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref AlertTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudWatchAlarmsPublish
            Effect: Allow
            Principal:
              Service: cloudwatch.amazonaws.com
            Action: sns:Publish
            Resource: !Ref AlertTopic
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref "AWS::AccountId"
          - Sid: AllowEventBridgePublish
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref AlertTopic
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref "AWS::AccountId"
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "sns:Publish"
            Resource: !Ref AlertTopic
            Condition:
              Bool:
                aws:SecureTransport: "false"

  # ---------------------------------------------------------
  # Chat webhook subscription (conditional)
  #
  # An https subscription that posts alarm notifications to a chat
  # incoming webhook. Created only when AlertWebhookUrl is set.
  # Separate resource (not inline on the topic) so the webhook can
  # be added or rotated without touching the topic itself.
  # ---------------------------------------------------------
  AlertWebhookSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlertWebhook
    Properties:
      TopicArn: !Ref AlertTopic
      Protocol: https
      Endpoint: !Ref AlertWebhookUrl
      DeliveryPolicy:
        healthyRetryPolicy:
          numRetries: 5
          minDelayTarget: 10
          maxDelayTarget: 60
          backoffFunction: exponential

  # ---------------------------------------------------------
  # Disk utilisation alarm (staging)
  #
  # Fires when the root filesystem on the staging EC2 instance
  # exceeds DiskAlarmThreshold (default 70%).
  #
  # Metric source: Amazon CloudWatch Agent (CWAgent namespace).
  # The agent must be installed and configured on the instance
  # before this alarm will transition out of INSUFFICIENT_DATA.
  # Install via scripts/install-cwagent.sh.
  #
  # Dimensions match the CWAgent config shipped with this repo
  # (scripts/install-cwagent.sh):
  #   device  = nvme0n1p1  (root volume on Amazon Linux 2023 t3.small)
  #   fstype  = xfs
  #   path    = /
  # ---------------------------------------------------------
  DiskFillAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "vaultmtg-${Environment}-disk-fill"
      AlarmDescription: !Sub |
        Staging EC2 root disk utilisation has exceeded ${DiskAlarmThreshold}%.
        Log in via SSM Session Manager and clean up: journalctl --vacuum-size=500M
        or remove old deploy artifacts from /tmp.
        Runbook: vault_mtg_docs/engineering/runbooks/cloudwatch-alarms-runbook.md
      Namespace: CWAgent
      MetricName: disk_used_percent
      Dimensions:
        - Name: InstanceId
          Value: !ImportValue mtga-companion-ec2-InstanceId
        - Name: path
          Value: /
        - Name: device
          Value: nvme0n1p1
        - Name: fstype
          Value: xfs
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref DiskAlarmThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      # INSUFFICIENT_DATA while CWAgent is not yet installed -- treat as alarm
      # so missing-agent is visible rather than silent.
      TreatMissingData: breaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
      Tags:
        - Key: Project
          Value: vault-mtg
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # bff-staging restart-loop alarm (staging)
  #
  # Fires when the custom metric BffStagingRestartCount exceeds
  # RestartCountThreshold (default 3) within a 5-minute window.
  #
  # Metric source: a systemd oneshot service + timer installed
  # on the EC2 instance via scripts/install-restart-metric.sh.
  # The script runs every 60 s, counts bff-staging.service
  # restarts from journald since the last run, and calls
  # cloudwatch put-metric-data.
  #
  # Namespace : MTGA/Staging
  # MetricName: BffStagingRestartCount
  # Dimension : Service=bff-staging
  # ---------------------------------------------------------
  BffStagingRestartAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "vaultmtg-${Environment}-bff-staging-restart-loop"
      AlarmDescription: !Sub |
        bff-staging.service has restarted more than ${RestartCountThreshold} times
        in a 5-minute window. Check systemd journal:
          journalctl -u bff-staging -n 100 --no-pager
        and inspect the binary at /usr/local/bin/mtga-bff-staging.
        Runbook: vault_mtg_docs/engineering/runbooks/cloudwatch-alarms-runbook.md
      Namespace: MTGA/Staging
      MetricName: BffStagingRestartCount
      Dimensions:
        - Name: Service
          Value: bff-staging
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref RestartCountThreshold
      ComparisonOperator: GreaterThanThreshold
      # OK when bff-staging is not running (pre-deploy). Only alarm on actual restarts.
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
      Tags:
        - Key: Project
          Value: vault-mtg
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # BFF HTTP 5xx metric filter (R-23, ticket #2363)
  #
  # Counts HTTP 5xx response lines in the nginx access log group
  # and emits one custom metric per matched event into MTGA/BFF::Http5xxCount.
  #
  # This metric filter replaces the previous systemd-timer-based
  # publisher (scripts/install-bff-5xx-metric.sh) which required
  # an out-of-band SSM step on every EC2 replacement -- a classic
  # operational change activation coupling defect: the alarm shipped
  # to production with no metric source running, so it remained
  # silently in OK regardless of real 5xx rate.
  #
  # The filter operates on the log group already provisioned by
  # cloudformation/logs.yml (NginxLogGroup, /vaultmtg/${Environment}/nginx)
  # which is fed by the CloudWatch Agent installed via ec2-bootstrap.sh.
  # No additional IAM is required; metric filters operate inside CWL.
  #
  # Pattern: standard nginx combined-log format positional filter.
  # Field 6 (status_code) prefix-matches "5*" to capture 5xx responses.
  # Tested via aws logs test-metric-filter against real production logs;
  # matches 500, 503; excludes 200, 301.
  #
  # Cost: one custom metric (MTGA/BFF::Http5xxCount @ Environment dim).
  # Standard CWL data-ingest charges already apply for the log group.
  # ---------------------------------------------------------
  Bff5xxMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Sub "/vaultmtg/${Environment}/nginx"
      FilterName: !Sub "vaultmtg-${Environment}-bff-5xx"
      FilterPattern: '[ip, ident, user, ts, request, status_code=5*, size, ...]'
      # NOTE: AWS::Logs::MetricFilter Dimensions.Value must be a parsed-field
      # selector ($-prefixed) from the log line, NOT a literal template value.
      # !Ref Environment resolves to a literal string at deploy time and AWS
      # rejects it ("dimension value must be valid selector"). We embed
      # Environment in the MetricName instead, giving prod and staging
      # distinct metric series: Http5xxCount-production / Http5xxCount-staging.
      MetricTransformations:
        - MetricNamespace: MTGA/BFF
          MetricName: !Sub "Http5xxCount-${Environment}"
          MetricValue: "1"
          Unit: Count

  # ---------------------------------------------------------
  # BFF HTTP 5xx rate alarm (AC1)
  #
  # Fires when the count of HTTP 5xx responses served by nginx
  # in front of the BFF exceeds Bff5xxThreshold within a
  # 5-minute window for Bff5xxEvaluationPeriods consecutive periods.
  #
  # Metric source: Bff5xxMetricFilter (above) extracts the count
  # from the nginx access log group /vaultmtg/${Environment}/nginx.
  #
  # Namespace : MTGA/BFF
  # MetricName: Http5xxCount-<environment>
  #
  # Environment is embedded in the metric NAME (not a CW dimension)
  # because AWS::Logs::MetricFilter Dimensions.Value must be a parsed-
  # field selector from the log line, not a template literal. See the
  # NOTE on Bff5xxMetricFilter above.
  #
  # TreatMissingData=notBreaching: at very low traffic the metric
  # filter emits one datapoint per matched 5xx event; periods with
  # no 5xx events have no metric data and are treated as not breaching
  # by the alarm (safe default — no false-positive on zero traffic).
  # ---------------------------------------------------------
  Bff5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "vaultmtg-${Environment}-bff-5xx-rate"
      AlarmDescription: !Sub |
        BFF is returning elevated HTTP 5xx responses (>${Bff5xxThreshold} per 5 min
        for ${Bff5xxEvaluationPeriods} consecutive windows).
        1. Check nginx error log: sudo journalctl -u nginx -n 200 --no-pager
        2. Check BFF service log: sudo journalctl -u vaultmtg-bff -n 200 --no-pager
        3. Verify database connectivity: check RDS latency alarm state.
        Runbook: vault_mtg_docs/engineering/runbooks/cloudwatch-alarms-runbook.md
      Namespace: MTGA/BFF
      MetricName: !Sub "Http5xxCount-${Environment}"
      Statistic: Sum
      Period: 300
      EvaluationPeriods: !Ref Bff5xxEvaluationPeriods
      Threshold: !Ref Bff5xxThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
      Tags:
        - Key: Project
          Value: vault-mtg
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # Projection dead-letter (DLQ) metric filter (#209)
  #
  # Counts BFF log lines that indicate a projection event was
  # written to the projection_errors dead-letter table.  The log
  # line is emitted by the projection worker in writeToDLQ:
  #
  #   [projection] dead-lettered id=<n> event_type=<t>: <reason>
  #
  # The plain-text filter pattern is a substring match -- no field
  # parsing required.
  #
  # Namespace : VaultMTG/Projection
  # MetricName: ProjectionDLQCount-<environment>
  #
  # Environment is embedded in the metric name (not a CW dimension)
  # for the same reason as Http5xxCount: AWS::Logs::MetricFilter
  # Dimensions.Value must be a parsed-field selector, not a template
  # literal.
  #
  # The BFF log group /vaultmtg/${Environment}/bff is provisioned by
  # cloudformation/logs.yml and fed by the CloudWatch Agent installed
  # via ec2-bootstrap.sh.  No additional IAM is required; metric
  # filters are a CWL control-plane operation.
  # ---------------------------------------------------------
  ProjectionDLQMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Sub "/vaultmtg/${Environment}/bff"
      FilterName: !Sub "vaultmtg-${Environment}-projection-dlq"
      FilterPattern: '"[projection] dead-lettered"'
      MetricTransformations:
        - MetricNamespace: VaultMTG/Projection
          MetricName: !Sub "ProjectionDLQCount-${Environment}"
          MetricValue: "1"
          Unit: Count

  # ---------------------------------------------------------
  # Projection dead-letter alarm (#209, AC1)
  #
  # Fires when any event is written to the projection_errors DLQ
  # (count > 0) in any 5-minute window.  A single DLQ write
  # indicates a structurally malformed event that cannot be
  # projected -- this warrants immediate investigation because
  # the affected user will see missing match/deck/quest history.
  #
  # Threshold=0 / ComparisonOperator=GreaterThanThreshold means
  # any count above zero triggers the alarm.
  #
  # TreatMissingData=notBreaching: periods with no DLQ writes
  # have no metric data -- healthy state, not an alarm condition.
  #
  # Metric source: ProjectionDLQMetricFilter (above).
  # ---------------------------------------------------------
  ProjectionDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "vaultmtg-${Environment}-projection-dlq"
      AlarmDescription: |
        The projection worker has written one or more events to the
        projection_errors dead-letter table (DLQ) in the last 5 minutes.
        Affected events could not be projected due to a structural payload
        defect (e.g. missing PK field).
        1. Query the DLQ to see the raw payloads:
             SELECT event_type, reason, raw_payload, created_at
             FROM projection_errors
             ORDER BY created_at DESC LIMIT 20;
        2. Check the BFF log for context around the dead-letter entry:
             sudo journalctl -u vaultmtg-bff -n 500 --no-pager | grep "projection"
        3. If the cause is a daemon schema regression, file a hotfix ticket
           against the daemon and check the daemon version currently deployed.
        4. After fixing the root cause, replay the affected rows by re-ingesting
           the raw_payload through the ingest endpoint.
        Runbook: vault-mtg-docs/engineering/runbooks/cloudwatch-alarms-runbook.md
      Namespace: VaultMTG/Projection
      MetricName: !Sub "ProjectionDLQCount-${Environment}"
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
      Tags:
        - Key: Project
          Value: vault-mtg
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # EC2 CPU utilisation alarm (AC4)
  #
  # Fires when EC2 CPUUtilization exceeds EC2CpuThreshold (default 85%)
  # for EC2CpuEvaluationPeriods consecutive 5-minute periods.
  #
  # Metric source: AWS/EC2 namespace (built-in; no agent required).
  # The InstanceId dimension is resolved from the ec2 stack export.
  # ---------------------------------------------------------
  EC2CpuAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "vaultmtg-${Environment}-ec2-cpu-high"
      AlarmDescription: !Sub |
        EC2 instance CPU utilisation has been above ${EC2CpuThreshold}% for
        ${EC2CpuEvaluationPeriods} consecutive 5-minute periods.
        1. Check which process is consuming CPU:
             ssh (or SSM) -> top -b -n1 -c | head -20
        2. Check BFF goroutine/request logs for runaway queries or tight loops:
             sudo journalctl -u vaultmtg-bff -n 500 --no-pager
        3. If the instance is undersized, escalate to Ray Hamilton for a resize.
        Runbook: vault_mtg_docs/engineering/runbooks/cloudwatch-alarms-runbook.md
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Dimensions:
        - Name: InstanceId
          Value: !ImportValue mtga-companion-ec2-InstanceId
      Statistic: Average
      Period: 300
      EvaluationPeriods: !Ref EC2CpuEvaluationPeriods
      Threshold: !Ref EC2CpuThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
      Tags:
        - Key: Project
          Value: vault-mtg
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # EC2 memory utilisation alarm (AC4)
  #
  # Fires when EC2 mem_used_percent exceeds EC2MemThreshold (default 90%)
  # for EC2MemEvaluationPeriods consecutive 1-minute periods.
  #
  # Metric source: Amazon CloudWatch Agent (CWAgent namespace).
  # Requires install-cwagent.sh to have been run on the instance.
  # The agent config ships mem_used_percent (see install-cwagent.sh).
  # ---------------------------------------------------------
  EC2MemAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "vaultmtg-${Environment}-ec2-memory-high"
      AlarmDescription: !Sub |
        EC2 instance memory utilisation has been above ${EC2MemThreshold}% for
        ${EC2MemEvaluationPeriods} consecutive minutes.
        1. Identify which process is consuming memory:
             ssh (or SSM) -> ps aux --sort=-%mem | head -15
        2. Check for BFF memory leaks:
             sudo journalctl -u vaultmtg-bff -n 500 --no-pager | grep -i OOM
        3. If OOM-killed, the kernel OOM reaper entry will appear in dmesg:
             sudo dmesg | tail -50
        Runbook: vault_mtg_docs/engineering/runbooks/cloudwatch-alarms-runbook.md
      Namespace: CWAgent
      MetricName: mem_used_percent
      Dimensions:
        - Name: InstanceId
          Value: !ImportValue mtga-companion-ec2-InstanceId
      Statistic: Average
      Period: 60
      EvaluationPeriods: !Ref EC2MemEvaluationPeriods
      Threshold: !Ref EC2MemThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      # INSUFFICIENT_DATA while CWAgent is not yet installed -- treat as alarm.
      TreatMissingData: breaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
      Tags:
        - Key: Project
          Value: vault-mtg
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # RDS read latency alarm (AC3)
  #
  # Fires when the average RDS ReadLatency exceeds
  # RdsReadLatencyThreshold (default 50 ms) for
  # RdsLatencyEvaluationPeriods consecutive 5-minute periods.
  #
  # Metric source: AWS/RDS namespace (built-in).
  # Note: CloudWatch exposes Average latency, not true P99.
  # The Average metric on a t3.micro with low-cardinality queries
  # is a reliable proxy; a separate X-Ray ticket can add true P99.
  # ---------------------------------------------------------
  RdsReadLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "vaultmtg-${Environment}-rds-read-latency-high"
      AlarmDescription: !Sub |
        RDS PostgreSQL read latency (average) has exceeded ${RdsReadLatencyThreshold}s
        for ${RdsLatencyEvaluationPeriods} consecutive 5-minute periods.
        1. Check slow query log in RDS Performance Insights or pg_stat_statements.
        2. Look for missing indexes: run EXPLAIN ANALYZE on suspect queries.
        3. If CPU is also elevated, check RDS CPU alarm state.
        4. Consider VACUUM ANALYZE if autovacuum has fallen behind.
        Runbook: vault_mtg_docs/engineering/runbooks/cloudwatch-alarms-runbook.md
      Namespace: AWS/RDS
      MetricName: ReadLatency
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref RdsInstanceIdentifier
      Statistic: Average
      Period: 300
      EvaluationPeriods: !Ref RdsLatencyEvaluationPeriods
      Threshold: !Ref RdsReadLatencyThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
      Tags:
        - Key: Project
          Value: vault-mtg
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # RDS write latency alarm (AC3)
  #
  # Fires when the average RDS WriteLatency exceeds
  # RdsWriteLatencyThreshold (default 100 ms) for
  # RdsLatencyEvaluationPeriods consecutive 5-minute periods.
  # ---------------------------------------------------------
  RdsWriteLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "vaultmtg-${Environment}-rds-write-latency-high"
      AlarmDescription: !Sub |
        RDS PostgreSQL write latency (average) has exceeded ${RdsWriteLatencyThreshold}s
        for ${RdsLatencyEvaluationPeriods} consecutive 5-minute periods.
        1. Look for hot rows or lock contention: SELECT * FROM pg_locks JOIN pg_stat_activity.
        2. Check for bloat on high-churn tables; run VACUUM ANALYZE.
        3. Review recent schema migrations that may have introduced index overhead.
        Runbook: vault_mtg_docs/engineering/runbooks/cloudwatch-alarms-runbook.md
      Namespace: AWS/RDS
      MetricName: WriteLatency
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref RdsInstanceIdentifier
      Statistic: Average
      Period: 300
      EvaluationPeriods: !Ref RdsLatencyEvaluationPeriods
      Threshold: !Ref RdsWriteLatencyThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
      Tags:
        - Key: Project
          Value: vault-mtg
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # RDS CPU utilisation alarm (AC4)
  #
  # Fires when RDS CPUUtilization exceeds RdsCpuThreshold (default 80%)
  # for RdsCpuEvaluationPeriods consecutive 5-minute periods.
  # ---------------------------------------------------------
  RdsCpuAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "vaultmtg-${Environment}-rds-cpu-high"
      AlarmDescription: !Sub |
        RDS PostgreSQL CPU utilisation has been above ${RdsCpuThreshold}% for
        ${RdsCpuEvaluationPeriods} consecutive 5-minute periods.
        1. Identify long-running queries via Performance Insights or pg_stat_activity.
        2. Check for sequential scans on large tables (missing indexes).
        3. If the instance is undersized, escalate to Ray Hamilton for a resize.
        Runbook: vault_mtg_docs/engineering/runbooks/cloudwatch-alarms-runbook.md
      Namespace: AWS/RDS
      MetricName: CPUUtilization
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref RdsInstanceIdentifier
      Statistic: Average
      Period: 300
      EvaluationPeriods: !Ref RdsCpuEvaluationPeriods
      Threshold: !Ref RdsCpuThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
      Tags:
        - Key: Project
          Value: vault-mtg
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # RDS free-storage alarm (R-14)
  #
  # Fires when RDS FreeStorageSpace drops below
  # RdsFreeStorageThresholdBytes (default 4 GiB) for
  # RdsFreeStorageEvaluationPeriods consecutive 5-minute periods.
  #
  # Metric source: AWS/RDS namespace (built-in; emitted in bytes).
  # When PostgreSQL runs out of storage the database is forced into
  # read-only mode, so this alarm must page well before that point.
  # Statistic=Minimum: alert on the worst observed value in the
  # window rather than smoothing transient dips away.
  #
  # TreatMissingData=breaching: AWS/RDS emits FreeStorageSpace for
  # every running instance. Missing data means the instance is not
  # reporting -- itself a signal that something is wrong.
  # ---------------------------------------------------------
  RdsFreeStorageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "vaultmtg-${Environment}-rds-free-storage-low"
      AlarmDescription: !Sub |
        RDS PostgreSQL free storage has dropped below ${RdsFreeStorageThresholdBytes} bytes.
        If storage reaches zero the database is forced read-only and all writes fail.
        1. Check current free space in RDS console -> Monitoring -> Free Storage Space.
        2. Identify what is consuming space:
             - bloated tables / indexes (run VACUUM FULL or pg_repack off-peak)
             - WAL accumulation from a stuck replication slot
             - large pg_stat_statements / temp files
        3. To buy time immediately, extend AllocatedStorage in cloudformation/rds.yml
           and deploy the rds stack -- storage can be increased online.
        Runbook: vault_mtg_docs/engineering/runbooks/cloudwatch-alarms-runbook.md
      Namespace: AWS/RDS
      MetricName: FreeStorageSpace
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref RdsInstanceIdentifier
      Statistic: Minimum
      Period: 300
      EvaluationPeriods: !Ref RdsFreeStorageEvaluationPeriods
      Threshold: !Ref RdsFreeStorageThresholdBytes
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
      Tags:
        - Key: Project
          Value: vault-mtg
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # BFF p99 latency alarm (R-14)
  #
  # Fires when the per-minute p99 request latency published by the
  # BFF latency metric publisher exceeds BffLatencyThresholdMs
  # (default 750 ms) for BffLatencyEvaluationPeriods consecutive
  # 5-minute periods.
  #
  # Metric source: a systemd timer on the EC2 instance that tails the
  # nginx access log, computes the p99 of request_time over the last
  # 60 s, and publishes it via cloudwatch put-metric-data.
  # Installed automatically by scripts/deploy/ec2-bootstrap.sh
  # (section 8b) on instance launch; the installer source lives at
  # scripts/install-bff-latency-metric.sh.
  #
  # Namespace : MTGA/BFF
  # MetricName: BffP99LatencyMs
  # Dimension : Environment=<environment>
  #
  # The publisher emits one pre-aggregated p99 value per minute, so
  # the alarm aggregates with Maximum to alert on the worst minute in
  # the 5-minute period rather than averaging spikes away.
  #
  # TreatMissingData=notBreaching: at very low traffic the publisher
  # emits no value for a period. No requests == no latency problem.
  # ---------------------------------------------------------
  BffLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "vaultmtg-${Environment}-bff-latency-high"
      AlarmDescription: !Sub |
        BFF p99 request latency has exceeded ${BffLatencyThresholdMs} ms for
        ${BffLatencyEvaluationPeriods} consecutive 5-minute periods.
        1. Check the RDS read/write latency alarms -- DB latency is the most
           common cause of BFF slowdowns.
        2. Check EC2 CPU and memory alarm state -- a saturated instance slows
           every request.
        3. Inspect slow endpoints in the BFF log:
             sudo journalctl -u vaultmtg-bff -n 500 --no-pager | grep -i latency
        4. If a deploy just ran, a cold cache can cause a transient spike --
           confirm it recovers within one evaluation window.
        Runbook: vault_mtg_docs/engineering/runbooks/cloudwatch-alarms-runbook.md
      Namespace: MTGA/BFF
      MetricName: BffP99LatencyMs
      Dimensions:
        - Name: Environment
          Value: !Ref Environment
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: !Ref BffLatencyEvaluationPeriods
      Threshold: !Ref BffLatencyThresholdMs
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
      Tags:
        - Key: Project
          Value: vault-mtg
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # BFF production restart-loop alarm (R-14)
  #
  # Fires when the custom metric BffRestartCount exceeds
  # BffRestartCountThreshold (default 3) within a 5-minute window.
  #
  # NOTE ON THE UNIT NAME: issue #2331 originally referred to the
  # production BFF unit under a hyphenated form. After Window B
  # (#1755) the production unit created by scripts/deploy/ec2-bootstrap.sh
  # is "vaultmtg-bff.service" (binary /usr/local/bin/mtga-bff -- the
  # binary file name is intentionally unchanged; only the systemd unit
  # name was renamed in Window B). The metric publisher and this alarm
  # track the REAL post-Window-B unit name to avoid the wrong-unit-name
  # class of bug (cf. v0.3.1 #2192).
  #
  # Metric source: a systemd oneshot service + timer installed
  # automatically by scripts/deploy/ec2-bootstrap.sh (section 8b)
  # on instance launch; the installer source lives at
  # scripts/install-restart-metric-production.sh.
  # It runs every 60 s, counts vaultmtg-bff.service restarts since
  # the last run, and calls cloudwatch put-metric-data.
  #
  # Namespace : MTGA/BFF
  # MetricName: BffRestartCount
  # Dimension : Environment=<environment>
  #
  # TreatMissingData=notBreaching: a steady-state service emits zero;
  # absence of data (pre-deploy) is not a restart loop.
  # ---------------------------------------------------------
  BffRestartAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "vaultmtg-${Environment}-bff-restart-loop"
      AlarmDescription: !Sub |
        The production BFF (vaultmtg-bff.service) has restarted more than
        ${BffRestartCountThreshold} times in a 5-minute window -- it is crash-looping.
        1. Inspect the systemd journal for the crash cause:
             sudo journalctl -u vaultmtg-bff -n 200 --no-pager
        2. Check the service status and last exit code:
             sudo systemctl status vaultmtg-bff
        3. Common causes: bad config in /etc/vaultmtg/env, an unreachable
           database, or a corrupt binary at /usr/local/bin/mtga-bff.
        4. If a deploy just ran, check the deploy workflow run and consider
           rolling back to the previous release.
        Runbook: vault_mtg_docs/engineering/runbooks/cloudwatch-alarms-runbook.md
      Namespace: MTGA/BFF
      MetricName: BffRestartCount
      Dimensions:
        - Name: Environment
          Value: !Ref Environment
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref BffRestartCountThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
      Tags:
        - Key: Project
          Value: vault-mtg
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # BFF-down synthetic health check (R-04 AC2)
  #
  # Route 53 HTTPS health check against api.vaultmtg.app/healthz
  # on port 443. The checker polls every 30 seconds from multiple
  # AWS health-check regions. When BffHealthCheckFailureThreshold
  # (default 3) consecutive checks fail the HealthCheckStatus metric
  # drops to 0 and BffDownAlarm fires.
  #
  # Important: Route 53 health check CloudWatch metrics are only
  # published in us-east-1 regardless of origin region. The stack
  # must be deployed in us-east-1 (which it is -- see deploy.yml).
  #
  # TreatMissingData=breaching: if CloudWatch stops receiving the
  # metric the BFF is unreachable or the health checker itself is
  # broken -- both warrant an alert.
  # ---------------------------------------------------------
  BffHealthCheck:
    Type: AWS::Route53::HealthCheck
    Properties:
      HealthCheckConfig:
        Type: HTTPS
        FullyQualifiedDomainName: !Ref BffHealthCheckHost
        ResourcePath: /healthz
        Port: 443
        RequestInterval: 30
        FailureThreshold: !Ref BffHealthCheckFailureThreshold
        EnableSNI: true
      HealthCheckTags:
        - Key: Name
          Value: !Sub "vaultmtg-${Environment}-bff-healthz"
        - Key: Project
          Value: vault-mtg
        - Key: Environment
          Value: !Ref Environment

  BffDownAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "vaultmtg-${Environment}-bff-down"
      AlarmDescription: !Sub |
        BFF health check is failing: api.vaultmtg.app/healthz did not return 200
        for ${BffHealthCheckFailureThreshold} consecutive Route 53 checks (~90 s).
        1. Verify the instance is running:
             aws ec2 describe-instance-status (look for impaired or stopped)
        2. Check the BFF systemd service:
             SSM Session Manager -> sudo systemctl status vaultmtg-bff
        3. Check nginx is forwarding correctly:
             sudo systemctl status nginx
             sudo journalctl -u nginx -n 100 --no-pager
        4. If a deploy just ran, check the deploy workflow run for errors.
        Runbook: vault_mtg_docs/engineering/runbooks/cloudwatch-alarms-runbook.md
      Namespace: AWS/Route53
      MetricName: HealthCheckStatus
      Dimensions:
        - Name: HealthCheckId
          Value: !Ref BffHealthCheck
      Statistic: Minimum
      Period: 60
      EvaluationPeriods: !Ref BffHealthCheckFailureThreshold
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
      Tags:
        - Key: Project
          Value: vault-mtg
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # TLS certificate expiry alarm (R-04 AC3)
  #
  # ACM publishes DaysToExpiry for every managed certificate.
  # This alarm fires when the metric drops below
  # TlsExpiryThresholdDays (default 30), giving one full
  # renewal window before the cert actually expires.
  #
  # Metric source: AWS/CertificateManager namespace (built-in).
  # Dimension: CertificateArn=<AcmCertificateArn parameter>.
  #
  # ACM auto-renews certificates at 60 days remaining, so this
  # alarm should only fire if auto-renewal fails or the cert is
  # not managed by ACM (e.g. a manually uploaded certbot cert).
  # It therefore acts as the last-resort safety net.
  #
  # TreatMissingData=breaching: DaysToExpiry is emitted daily.
  # Missing data means ACM has stopped reporting on the cert,
  # which is itself a signal that something is wrong.
  # ---------------------------------------------------------
  TlsCertExpiryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "vaultmtg-${Environment}-tls-cert-expiry"
      AlarmDescription: !Sub |
        TLS certificate expiry warning: fewer than ${TlsExpiryThresholdDays} days remain
        before the certificate expires.
        1. Open ACM in the AWS console and check the certificate status.
        2. If auto-renewal is pending, trigger manual renewal:
             aws acm renew-certificate --certificate-arn <ARN>
        3. If the certificate cannot be renewed via ACM (e.g. certbot), run:
             sudo certbot renew --force-renewal
             sudo systemctl reload nginx
        4. Verify the renewed cert is served:
             echo | openssl s_client -connect api.vaultmtg.app:443 2>/dev/null | openssl x509 -noout -dates
        Runbook: vault_mtg_docs/engineering/runbooks/cloudwatch-alarms-runbook.md
      Namespace: AWS/CertificateManager
      MetricName: DaysToExpiry
      Dimensions:
        - Name: CertificateArn
          Value: !Ref AcmCertificateArn
      Statistic: Minimum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: !Ref TlsExpiryThresholdDays
      ComparisonOperator: LessThanOrEqualToThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
      Tags:
        - Key: Project
          Value: vault-mtg
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------
  # RDS database-connections alarm (vmt-t#606)
  #
  # Fires when the number of active connections to the RDS
  # PostgreSQL instance exceeds RdsDatabaseConnectionsThreshold
  # (default 80) for RdsDatabaseConnectionsEvaluationPeriods
  # consecutive 1-minute periods.
  #
  # Metric source: AWS/RDS namespace (built-in; no agent required).
  # The db.t3.micro default max_connections is ~100 (memory-derived).
  # Alerting at 80 gives a 20-connection window to investigate before
  # the database starts refusing new connections and the BFF returns
  # 5xx errors on every DB-bound request.
  #
  # Typical causes: BFF connection pool misconfiguration, a connection
  # leak in a handler that does not release pgxpool conns, or a burst
  # of concurrent requests during beta launch.
  #
  # Period=60 (1 minute): DatabaseConnections is emitted once per
  # minute, so a 5-minute period would aggregate across 5 samples.
  # Using 1-minute periods with EvaluationPeriods=5 catches a
  # sustained leak without false-positiving on a single cold-start burst.
  #
  # TreatMissingData=notBreaching: the metric is not emitted when no
  # connections are active (e.g. pre-deploy). Not a concern.
  # ---------------------------------------------------------
  RdsDatabaseConnectionsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "vaultmtg-${Environment}-rds-connections-high"
      AlarmDescription: !Sub |
        RDS PostgreSQL active connections have been above ${RdsDatabaseConnectionsThreshold}
        for ${RdsDatabaseConnectionsEvaluationPeriods} consecutive minutes.
        The db.t3.micro max_connections ceiling is ~100; at ${RdsDatabaseConnectionsThreshold}
        the database is near capacity and may start refusing connections.
        1. Check current connections:
             psql ... -c "SELECT count(*) FROM pg_stat_activity;"
        2. Identify clients holding idle connections:
             psql ... -c "SELECT application_name, state, count(*) FROM pg_stat_activity GROUP BY 1,2 ORDER BY 3 DESC;"
        3. Check BFF connection pool config in /etc/vaultmtg/env (DB_MAX_OPEN_CONNS).
        4. If a connection leak is suspected, restart vaultmtg-bff.service after
           verifying no active transactions: sudo systemctl restart vaultmtg-bff
        Runbook: vault-mtg-docs/engineering/runbooks/on-call.md
      Namespace: AWS/RDS
      MetricName: DatabaseConnections
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref RdsInstanceIdentifier
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: !Ref RdsDatabaseConnectionsEvaluationPeriods
      Threshold: !Ref RdsDatabaseConnectionsThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
      Tags:
        - Key: Project
          Value: vaultmtg
        - Key: Environment
          Value: !Ref Environment

Outputs:
  AlertTopicArn:
    Description: |
      ARN of the shared SNS operational-alerts topic. Other stacks (e.g. the
      S-06 security alarms) import this to publish to the same topic.
    Value: !Ref AlertTopic
    Export:
      Name: !Sub "vaultmtg-${Environment}-AlertTopicArn"

  DiskFillAlarmArn:
    Description: ARN of the staging disk-fill CloudWatch alarm.
    Value: !GetAtt DiskFillAlarm.Arn
    Export:
      Name: !Sub "vaultmtg-${Environment}-DiskFillAlarmArn"

  BffStagingRestartAlarmArn:
    Description: ARN of the bff-staging restart-loop CloudWatch alarm.
    Value: !GetAtt BffStagingRestartAlarm.Arn
    Export:
      Name: !Sub "vaultmtg-${Environment}-BffStagingRestartAlarmArn"

  Bff5xxAlarmArn:
    Description: ARN of the BFF HTTP 5xx rate CloudWatch alarm.
    Value: !GetAtt Bff5xxAlarm.Arn
    Export:
      Name: !Sub "vaultmtg-${Environment}-Bff5xxAlarmArn"

  EC2CpuAlarmArn:
    Description: ARN of the EC2 CPU utilisation CloudWatch alarm.
    Value: !GetAtt EC2CpuAlarm.Arn
    Export:
      Name: !Sub "vaultmtg-${Environment}-EC2CpuAlarmArn"

  EC2MemAlarmArn:
    Description: ARN of the EC2 memory utilisation CloudWatch alarm.
    Value: !GetAtt EC2MemAlarm.Arn
    Export:
      Name: !Sub "vaultmtg-${Environment}-EC2MemAlarmArn"

  RdsReadLatencyAlarmArn:
    Description: ARN of the RDS read latency CloudWatch alarm.
