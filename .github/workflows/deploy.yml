name: Deploy CloudFormation Stack

on:
  workflow_dispatch:
    inputs:
      stack:
        description: Stack to deploy
        required: true
        type: choice
        options:
          - deploy-artifacts
          - ec2-sg
          - rds
          - ec2
          - vpc
          - dns
          - sync-lambda
      dry_run:
        description: Dry run — validate and show changeset only, do not deploy
        required: false
        type: boolean
        default: false

concurrency:
  group: cloudformation-deploy
  cancel-in-progress: false  # never cancel an in-flight deploy

jobs:
  deploy:
    name: Deploy ${{ inputs.stack }} (${{ inputs.dry_run && 'dry-run' || 'deploy' }})
    runs-on: ubuntu-latest
    environment: production   # requires reviewer approval if configured in repo settings

    env:
      AWS_REGION: us-east-1
      STACK_NAME: mtga-companion-${{ inputs.stack }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate template
        run: |
          aws cloudformation validate-template \
            --template-body file://cloudformation/${{ inputs.stack }}.yml
          echo "✓ Template valid"

      - name: Load parameters
        id: params
        run: |
          PARAMS_FILE="cloudformation/parameters/${{ inputs.stack }}.json"
          if [ -f "$PARAMS_FILE" ]; then
            echo "params_flag=--parameter-overrides file://$PARAMS_FILE" >> $GITHUB_OUTPUT
          else
            echo "params_flag=" >> $GITHUB_OUTPUT
          fi

      - name: Create changeset
        id: changeset
        run: |
          CHANGESET_NAME="deploy-$(date +%Y%m%d%H%M%S)"
          echo "changeset_name=$CHANGESET_NAME" >> $GITHUB_OUTPUT

          # Determine CREATE vs UPDATE by checking if the stack already exists and is stable.
          # Save as a step output so the execute step uses the right waiter.
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          if echo "$STACK_STATUS" | grep -qE 'COMPLETE|ROLLBACK'; then
            CHANGE_TYPE="UPDATE"
          else
            CHANGE_TYPE="CREATE"
          fi
          echo "change_type=$CHANGE_TYPE" >> $GITHUB_OUTPUT
          echo "Changeset type: $CHANGE_TYPE (stack status: $STACK_STATUS)"

          PARAMS_FILE="cloudformation/parameters/${{ inputs.stack }}.json"
          PARAMS_ARG=""
          [ -f "$PARAMS_FILE" ] && PARAMS_ARG="--parameters file://$PARAMS_FILE"

          aws cloudformation create-change-set \
            --stack-name "${{ env.STACK_NAME }}" \
            --template-body file://cloudformation/${{ inputs.stack }}.yml \
            --change-set-name "$CHANGESET_NAME" \
            --change-set-type "$CHANGE_TYPE" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            $PARAMS_ARG

          # Wait for changeset to finish computing (FAILED is terminal — e.g. no changes)
          aws cloudformation wait change-set-create-complete \
            --stack-name "${{ env.STACK_NAME }}" \
            --change-set-name "$CHANGESET_NAME" || true

      - name: Show changeset
        run: |
          aws cloudformation describe-change-set \
            --stack-name "${{ env.STACK_NAME }}" \
            --change-set-name "${{ steps.changeset.outputs.changeset_name }}" \
            --query 'Changes[].{Action:ResourceChange.Action,Resource:ResourceChange.LogicalResourceId,Type:ResourceChange.ResourceType,Replace:ResourceChange.Replacement}' \
            --output table

      - name: Execute changeset
        if: ${{ !inputs.dry_run }}
        run: |
          aws cloudformation execute-change-set \
            --stack-name "${{ env.STACK_NAME }}" \
            --change-set-name "${{ steps.changeset.outputs.changeset_name }}"

          echo "Waiting for stack to stabilise (type: ${{ steps.changeset.outputs.change_type }})..."
          if [ "${{ steps.changeset.outputs.change_type }}" = "CREATE" ]; then
            aws cloudformation wait stack-create-complete \
              --stack-name "${{ env.STACK_NAME }}"
          else
            aws cloudformation wait stack-update-complete \
              --stack-name "${{ env.STACK_NAME }}"
          fi

      - name: Show stack outputs
        if: ${{ !inputs.dry_run }}
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --query 'Stacks[0].Outputs' \
            --output table

      - name: Delete changeset (dry run cleanup)
        if: ${{ inputs.dry_run }}
        run: |
          aws cloudformation delete-change-set \
            --stack-name "${{ env.STACK_NAME }}" \
            --change-set-name "${{ steps.changeset.outputs.changeset_name }}" || true
          echo "Dry run complete — no changes deployed."
