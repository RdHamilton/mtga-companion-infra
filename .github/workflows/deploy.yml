name: Deploy CloudFormation Stack

on:
  workflow_dispatch:
    inputs:
      stack:
        description: Stack to deploy
        required: true
        type: choice
        options:
          - deploy-artifacts
          - ec2-sg
          - ec2-sg-staging
          - rds
          - rds-vaultmtg
          - ec2
          - ec2-staging
          - dns-staging
          - vpc
          - rhamiltoneng-dns
          - sync-lambda
          - cloudwatch-alarms
          - cloudwatch-alarms-staging
          - cloudwatch-dashboards
          - logs
          - logs-staging
          - logs-import
          - cdn
          - iam-gha-roles
          - iam-break-glass
          - cloudtrail
          - security-alarms
          - staging-deploy-role
          - vaultmtg-security-services
          - rhamiltoneng-cdn
      dry_run:
        description: Dry run — validate and show changeset only, do not deploy
        required: false
        type: boolean
        default: false
      confirm_replacements:
        description: Set to true to allow resource replacements (USE WITH CAUTION)
        required: false
        type: boolean
        default: false

concurrency:
  group: cloudformation-deploy
  cancel-in-progress: false  # never cancel an in-flight deploy

jobs:
  deploy:
    name: Deploy ${{ inputs.stack }} (${{ inputs.dry_run && 'dry-run' || 'deploy' }})
    runs-on: ubuntu-latest
    environment: production   # requires reviewer approval if configured in repo settings
    permissions:
      id-token: write   # required for OIDC role assumption
      contents: read

    env:
      AWS_REGION: us-east-1

    steps:
      - name: Resolve stack name
        run: |
          # Some stacks use a different name in CloudFormation than the pattern mtga-companion-<input>.
          # Map known exceptions; everything else follows the default naming convention.
          # TEMPLATE_NAME defaults to inputs.stack but can be overridden when the template filename
          # differs from the stack input (e.g. cloudwatch-alarms-staging uses cloudwatch-alarms.yml).
          case "${{ inputs.stack }}" in
            cdn)                        STACK_NAME="vaultmtg-app-cdn" ;                   TEMPLATE_NAME="${{ inputs.stack }}" ;;
            rds-vaultmtg)               STACK_NAME="vaultmtg-rds" ;                       TEMPLATE_NAME="${{ inputs.stack }}" ;;
            rhamiltoneng-dns)           STACK_NAME="rhamiltoneng-dns" ;                   TEMPLATE_NAME="${{ inputs.stack }}" ;;
            iam-gha-roles)              STACK_NAME="mtga-companion-iam-gha-roles" ;       TEMPLATE_NAME="${{ inputs.stack }}" ;;
            iam-break-glass)            STACK_NAME="vaultmtg-iam-break-glass" ;           TEMPLATE_NAME="${{ inputs.stack }}" ;;
            cloudwatch-alarms-staging)  STACK_NAME="mtga-companion-cloudwatch-alarms-staging" ; TEMPLATE_NAME="cloudwatch-alarms" ;;
            cloudtrail)                 STACK_NAME="vaultmtg-cloudtrail" ;                TEMPLATE_NAME="${{ inputs.stack }}" ;;
            security-alarms)            STACK_NAME="vaultmtg-security-alarms" ;          TEMPLATE_NAME="${{ inputs.stack }}" ;;
            vaultmtg-security-services) STACK_NAME="vaultmtg-security-services" ;        TEMPLATE_NAME="${{ inputs.stack }}" ;;
            cloudwatch-dashboards)      STACK_NAME="vaultmtg-cloudwatch-dashboards" ;     TEMPLATE_NAME="${{ inputs.stack }}" ;;
            staging-deploy-role)        STACK_NAME="mtga-companion-staging-deploy-role" ; TEMPLATE_NAME="${{ inputs.stack }}" ;;
            logs-import)                STACK_NAME="mtga-companion-logs" ;                TEMPLATE_NAME="logs" ;;
            logs-staging)               STACK_NAME="mtga-companion-logs-staging" ;        TEMPLATE_NAME="logs" ;;
            rhamiltoneng-cdn)           STACK_NAME="rhamiltoneng-cdn" ;                   TEMPLATE_NAME="${{ inputs.stack }}" ;;
            ec2-sg-staging)             STACK_NAME="mtga-companion-ec2-sg-staging" ;      TEMPLATE_NAME="ec2-sg" ;;
            ec2-staging)                STACK_NAME="mtga-companion-ec2-staging" ;         TEMPLATE_NAME="ec2" ;;
            dns-staging)                STACK_NAME="mtga-companion-dns-staging" ;         TEMPLATE_NAME="dns-staging" ;;
            *)                          STACK_NAME="mtga-companion-${{ inputs.stack }}" ; TEMPLATE_NAME="${{ inputs.stack }}" ;;
          esac
          echo "STACK_NAME=$STACK_NAME" >> $GITHUB_ENV
          echo "TEMPLATE_NAME=$TEMPLATE_NAME" >> $GITHUB_ENV
          echo "Resolved stack name: $STACK_NAME (template: $TEMPLATE_NAME)"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 — SHA pinned (ticket #2385 AC3)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@796449b3e38e3c256861227399e58b780e0e5538  # v6 — SHA pinned (ticket #2385 AC3)
        with:
          role-to-assume: ${{ secrets.AWS_CFN_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Simulate IAM permissions
        # Pre-flight check: run aws iam simulate-principal-policy against the
        # assumed deploy role for every action the templates in this repo
        # invoke at runtime. Catches missing permissions at CI time rather
        # than at CloudFormation runtime (cfn-lint and changeset dry-runs
        # cannot detect runtime IAM authorization failures).
        #
        # Skipped on dry_run since real deploys are the only place we need
        # the gate; dry runs never execute the changeset.
        #
        # Skipped for iam-gha-roles: this stack IS the source of the deploy
        # role's permissions. Simulating before updating creates a chicken-and-egg
        # deadlock — the stack cannot grant itself new permissions. iam-gha-roles
        # changes are reviewed via PR; post-deploy the simulation gate on every
        # other stack re-validates that the role was updated correctly.
        #
        # Resource ARN scoping (root cause of false-negative failures):
        # The deploy role's inline policy scopes many actions to specific ARN
        # prefixes (e.g. cloudformation:* only on stack/mtga-companion-*/*,
        # iam:* only on role/vaultmtg-*, logs:* only on /vaultmtg/*).
        # Simulating these actions against Resource:"*" yields implicitDeny
        # even though the role is correctly authorised for its actual targets —
        # IAM evaluates the inline policy resource match and finds no Allow.
        # Fix: pass per-service resource ARNs derived from the stack name.
        # Actions that are genuinely not resource-scopable (Config, GuardDuty,
        # AccessAnalyzer, Route53, S3, etc.) remain on Resource:"*" because
        # the inline policy also grants them on "*".
        #
        # When new services/actions are added to any template in this repo,
        # extend the appropriate per-service simulation block below.
        if: inputs.dry_run != 'true' && inputs.stack != 'iam-gha-roles'
        run: |
          ACCOUNT_ID="901347789205"
          DEPLOY_ROLE_ARN=$(aws sts get-caller-identity --query Arn --output text | sed 's|:sts:|:iam:|' | sed 's|assumed-role/\([^/]*\)/.*|role/\1|')
          if ! echo "$DEPLOY_ROLE_ARN" | grep -qE '^arn:aws:iam::[0-9]+:role/'; then
            echo "::error::Failed to derive deploy role ARN from STS identity: $DEPLOY_ROLE_ARN"
            exit 1
          fi
          echo "Simulating permissions for: $DEPLOY_ROLE_ARN"
          echo "Stack: $STACK_NAME"

          # Derive per-service resource ARNs from the resolved stack name.
          # CloudFormation: inline policy grants cloudformation:* on stack ARN prefixes.
          CFN_STACK_ARN="arn:aws:cloudformation:${AWS_REGION}:${ACCOUNT_ID}:stack/${STACK_NAME}/*"
          # IAM: inline policy grants iam: actions on vaultmtg-*, mtga-companion-*, gha-* role prefixes.
          # Use the stack name as the role name prefix (staging-deploy-role creates vaultmtg-* roles).
          IAM_ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/vaultmtg-*"
          # CloudWatch Logs: inline policy grants logs: actions on /vaultmtg/* log groups.
          LOGS_ARN="arn:aws:logs:${AWS_REGION}:${ACCOUNT_ID}:log-group:/vaultmtg/*"

          OVERALL_DENIED=""

          # --- CloudFormation actions (resource-scoped to stack ARN) ---
          DENIED=$(aws iam simulate-principal-policy \
            --policy-source-arn "$DEPLOY_ROLE_ARN" \
            --action-names \
              cloudformation:CreateChangeSet cloudformation:DeleteChangeSet \
              cloudformation:DescribeChangeSet cloudformation:ExecuteChangeSet \
              cloudformation:DescribeStackEvents \
              cloudformation:GetTemplate \
              cloudformation:CreateStack cloudformation:UpdateStack \
              cloudformation:DeleteStack \
            --resource-arns "$CFN_STACK_ARN" \
            --query 'EvaluationResults[?EvalDecision!=`allowed`].EvalActionName' \
            --output text)
          [ -n "$DENIED" ] && OVERALL_DENIED="$OVERALL_DENIED $DENIED"

          # --- CloudFormation global actions (not resource-scopable — policy grants on "*") ---
          # DescribeStackDriftDetectionStatus added per PR #180: invoked by the
          # drift-detect.yml workflow and by change-set operations that internally
          # poll drift status. The action has no resource-level support per the
          # IAM Service Authorization Reference, so the inline policy grants on "*".
          DENIED=$(aws iam simulate-principal-policy \
            --policy-source-arn "$DEPLOY_ROLE_ARN" \
            --action-names \
              cloudformation:DescribeStacks cloudformation:ValidateTemplate \
              cloudformation:DescribeStackDriftDetectionStatus \
            --resource-arns "*" \
            --query 'EvaluationResults[?EvalDecision!=`allowed`].EvalActionName' \
            --output text)
          [ -n "$DENIED" ] && OVERALL_DENIED="$OVERALL_DENIED $DENIED"

          # --- IAM actions (resource-scoped to role ARN prefix) ---
          DENIED=$(aws iam simulate-principal-policy \
            --policy-source-arn "$DEPLOY_ROLE_ARN" \
            --action-names \
              iam:CreateRole iam:DeleteRole iam:GetRole iam:PassRole \
              iam:AttachRolePolicy iam:DetachRolePolicy \
              iam:PutRolePolicy iam:DeleteRolePolicy \
              iam:TagRole iam:UntagRole \
            --resource-arns "$IAM_ROLE_ARN" \
            --query 'EvaluationResults[?EvalDecision!=`allowed`].EvalActionName' \
            --output text)
          [ -n "$DENIED" ] && OVERALL_DENIED="$OVERALL_DENIED $DENIED"

          # --- CloudWatch Logs actions (resource-scoped to /vaultmtg/* log groups) ---
          # Metric-filter actions (PutMetricFilter / DeleteMetricFilter /
          # DescribeMetricFilters) are resource-scopable to log-group ARN per the
          # IAM Service Authorization Reference, and the inline policy
          # (CloudWatchLogs Sid in iam-gha-roles.yml) grants them on /vaultmtg/*.
          # Invoked by:
          #   - security-alarms.yml (RootAccountUsageMetricFilter, IAMCredentialWritesMetricFilter)
          #   - cloudwatch-alarms.yml + cloudwatch-alarms-staging (Bff5xxMetricFilter)
          # TagResource / UntagResource are invoked by CFN whenever AWS::Logs::LogGroup
          # has Tags (cloudtrail.yml, logs.yml). Added per PR #170 fallout: deploy-time
          # failures only became visible at CFN runtime because the sim omitted them.
          DENIED=$(aws iam simulate-principal-policy \
            --policy-source-arn "$DEPLOY_ROLE_ARN" \
            --action-names \
              logs:CreateLogGroup logs:DeleteLogGroup logs:PutRetentionPolicy \
              logs:TagResource logs:UntagResource \
              logs:PutMetricFilter logs:DeleteMetricFilter logs:DescribeMetricFilters \
            --resource-arns "$LOGS_ARN" \
            --query 'EvaluationResults[?EvalDecision!=`allowed`].EvalActionName' \
            --output text)
          [ -n "$DENIED" ] && OVERALL_DENIED="$OVERALL_DENIED $DENIED"

          # --- CloudWatch Logs global actions (not resource-scopable) ---
          # logs:DescribeLogGroups has an EMPTY Resource types column in the IAM
          # Service Authorization Reference — it cannot be scoped to a log-group ARN.
          # Required by CFN to resolve `!GetAtt <LogGroup>.Arn` on AWS::Logs::LogGroup
          # resources (cloudtrail.yml CloudTrailLogsRole, logs.yml). Inline policy
          # (CloudWatchLogsGlobal Sid in iam-gha-roles.yml) grants on Resource:"*".
          # Re-enabled now that iam-gha-roles has been redeployed with that Sid
          # (was previously commented-out pending the redeploy chicken-and-egg).
          # The iam-gha-roles stack itself is still excluded from this whole sim
          # block by the if: guard above, so the original deadlock concern is moot.
          #
          # logs:ListTagsForResource is intentionally NOT simulated here: the inline
          # cfn-stack-deploy policy does not grant it on "*" and no CFN deploy has
          # surfaced a failure for it. If a future template introduces a need for it,
          # grant it in the iam-gha-roles CloudWatchLogsGlobal Sid first, then add it
          # here. Simulating ungranted actions yields permanent false-positive failure.
          DENIED=$(aws iam simulate-principal-policy \
            --policy-source-arn "$DEPLOY_ROLE_ARN" \
            --action-names \
              logs:DescribeLogGroups \
            --resource-arns "*" \
            --query 'EvaluationResults[?EvalDecision!=`allowed`].EvalActionName' \
            --output text)
          [ -n "$DENIED" ] && OVERALL_DENIED="$OVERALL_DENIED $DENIED"

          # --- Secrets Manager rotation lifecycle (policy grants on "*") ---
          # RotateSecret + CancelRotateSecret invoked by CFN for
          # AWS::SecretsManager::RotationSchedule (rds.yml DBSecretRotationSchedule):
          #   - RotateSecret on Create/Update
          #   - CancelRotateSecret on Delete
          # Inline policy SecretsManagerLifecycle Sid in iam-gha-roles.yml grants both
          # on Resource:"*" (added in PR #174). Caught at deploy time previously;
          # adding here lifts the failure surface back to CI.
          DENIED=$(aws iam simulate-principal-policy \
            --policy-source-arn "$DEPLOY_ROLE_ARN" \
            --action-names \
              secretsmanager:RotateSecret secretsmanager:CancelRotateSecret \
            --resource-arns "*" \
            --query 'EvaluationResults[?EvalDecision!=`allowed`].EvalActionName' \
            --output text)
          [ -n "$DENIED" ] && OVERALL_DENIED="$OVERALL_DENIED $DENIED"

          # --- S3 actions (policy grants on "*") ---
          DENIED=$(aws iam simulate-principal-policy \
            --policy-source-arn "$DEPLOY_ROLE_ARN" \
            --action-names \
              s3:PutBucketPolicy s3:GetBucketPolicy \
              s3:GetBucketAcl s3:GetEncryptionConfiguration \
            --resource-arns "*" \
            --query 'EvaluationResults[?EvalDecision!=`allowed`].EvalActionName' \
            --output text)
          [ -n "$DENIED" ] && OVERALL_DENIED="$OVERALL_DENIED $DENIED"

          # --- Config (not resource-scopable) ---
          DENIED=$(aws iam simulate-principal-policy \
            --policy-source-arn "$DEPLOY_ROLE_ARN" \
            --action-names \
              config:PutConfigurationRecorder config:StartConfigurationRecorder \
              config:StopConfigurationRecorder config:DeleteConfigurationRecorder \
              config:DescribeConfigurationRecorders \
              config:PutDeliveryChannel config:DeleteDeliveryChannel \
              config:DescribeDeliveryChannels \
              config:PutConformancePack config:DeleteConformancePack \
              config:DescribeConformancePacks config:DescribeConformancePackStatus \
            --resource-arns "*" \
            --query 'EvaluationResults[?EvalDecision!=`allowed`].EvalActionName' \
            --output text)
          [ -n "$DENIED" ] && OVERALL_DENIED="$OVERALL_DENIED $DENIED"

          # --- GuardDuty (not resource-scopable) ---
          DENIED=$(aws iam simulate-principal-policy \
            --policy-source-arn "$DEPLOY_ROLE_ARN" \
            --action-names \
              guardduty:CreateDetector guardduty:DeleteDetector \
              guardduty:GetDetector guardduty:UpdateDetector guardduty:ListDetectors \
              guardduty:TagResource guardduty:UntagResource \
            --resource-arns "*" \
            --query 'EvaluationResults[?EvalDecision!=`allowed`].EvalActionName' \
            --output text)
          [ -n "$DENIED" ] && OVERALL_DENIED="$OVERALL_DENIED $DENIED"

          # --- Access Analyzer (not resource-scopable) ---
          DENIED=$(aws iam simulate-principal-policy \
            --policy-source-arn "$DEPLOY_ROLE_ARN" \
            --action-names \
              access-analyzer:CreateAnalyzer access-analyzer:DeleteAnalyzer \
              access-analyzer:GetAnalyzer access-analyzer:ListAnalyzers \
              access-analyzer:UpdateAnalyzer access-analyzer:TagResource \
              access-analyzer:UntagResource access-analyzer:ListTagsForResource \
              access-analyzer:ListArchiveRules access-analyzer:CreateArchiveRule \
              access-analyzer:DeleteArchiveRule access-analyzer:UpdateArchiveRule \
              access-analyzer:GetArchiveRule access-analyzer:ListFindings \
              access-analyzer:GetFinding access-analyzer:ListAnalyzedResources \
            --resource-arns "*" \
            --query 'EvaluationResults[?EvalDecision!=`allowed`].EvalActionName' \
            --output text)
          [ -n "$DENIED" ] && OVERALL_DENIED="$OVERALL_DENIED $DENIED"

          # --- Route53 (not resource-scopable) ---
          DENIED=$(aws iam simulate-principal-policy \
            --policy-source-arn "$DEPLOY_ROLE_ARN" \
            --action-names \
              route53:ChangeResourceRecordSets route53:GetChange \
              route53:ListResourceRecordSets route53:GetHostedZone \
            --resource-arns "*" \
            --query 'EvaluationResults[?EvalDecision!=`allowed`].EvalActionName' \
            --output text)
          [ -n "$DENIED" ] && OVERALL_DENIED="$OVERALL_DENIED $DENIED"

          # Trim leading whitespace from accumulated denials
          OVERALL_DENIED=$(echo "$OVERALL_DENIED" | xargs)

          if [ -n "$OVERALL_DENIED" ]; then
            echo "::error::IAM simulation FAILED. Deploy role is missing permissions for:"
            echo "$OVERALL_DENIED" | tr ' \t' '\n' | grep -v '^$' | while read action; do
              echo "  - $action"
            done
            echo "Fix the deploy role IAM policy before proceeding."
            exit 1
          fi
          echo "IAM simulation PASSED — deploy role has all required permissions."

      - name: Validate template
        run: |
          TEMPLATE_FILE="cloudformation/${{ env.TEMPLATE_NAME }}.yml"
          TEMPLATE_SIZE=$(wc -c < "$TEMPLATE_FILE")
          CFN_INLINE_LIMIT=51200

          if [ "$TEMPLATE_SIZE" -le "$CFN_INLINE_LIMIT" ]; then
            aws cloudformation validate-template \
              --template-body "file://$TEMPLATE_FILE"
          else
            # Template exceeds the 51200-byte inline limit — upload to S3 and validate via URL.
            BUCKET="mtga-companion-deploy-artifacts-production"
            S3_KEY="cfn-validate/${{ env.TEMPLATE_NAME }}-$(date +%Y%m%d%H%M%S).yml"
            aws s3 cp "$TEMPLATE_FILE" "s3://$BUCKET/$S3_KEY"
            aws cloudformation validate-template \
              --template-url "https://$BUCKET.s3.us-east-1.amazonaws.com/$S3_KEY"
            aws s3 rm "s3://$BUCKET/$S3_KEY" || true
          fi
          echo "✓ Template valid"

      - name: Upload bootstrap script (ec2 / ec2-staging stacks only)
        id: upload_bootstrap
        # Uploads the appropriate bootstrap script (and, for production, the
        # BFF CloudWatch metric installer scripts it invokes) to the artifacts
        # bucket before the ec2 or ec2-staging stack is created/updated. The
        # UserData stub fetches s3://<bucket>/bootstrap/ec2-bootstrap.sh at
        # instance launch; the bootstrap script then fetches the installers
        # under s3://<bucket>/bootstrap/installers/ during its own setup.
        # Production: scripts/deploy/ec2-bootstrap.sh        -> s3://mtga-companion-deploy-artifacts-production/bootstrap/
        # Staging:    scripts/deploy/ec2-bootstrap-staging.sh -> s3://mtga-companion-deploy-artifacts-staging/bootstrap/
        # Installers (production only -- staging installers tracked separately):
        #   scripts/install-restart-metric-production.sh \
        #   scripts/install-bff-latency-metric.sh \
        #     -> s3://mtga-companion-deploy-artifacts-production/bootstrap/installers/
        # IAM: gha-infra-cfn-deploy has s3:PutObject on both bucket paths
        # (iam-gha-roles.yml S3BootstrapWrite Sid). The /bootstrap/installers/
        # sub-prefix is covered by the existing /bootstrap/* wildcard.
        if: ${{ (inputs.stack == 'ec2' || inputs.stack == 'ec2-staging') && !inputs.dry_run }}
        run: |
          if [ "${{ inputs.stack }}" = "ec2-staging" ]; then
            BOOTSTRAP_BUCKET="mtga-companion-deploy-artifacts-staging"
            BOOTSTRAP_SRC="scripts/deploy/ec2-bootstrap-staging.sh"
          else
            BOOTSTRAP_BUCKET="mtga-companion-deploy-artifacts-production"
            BOOTSTRAP_SRC="scripts/deploy/ec2-bootstrap.sh"
          fi
          aws s3 cp "${BOOTSTRAP_SRC}" \
            s3://${BOOTSTRAP_BUCKET}/bootstrap/ec2-bootstrap.sh \
            --region us-east-1
          echo "Bootstrap script uploaded to s3://${BOOTSTRAP_BUCKET}/bootstrap/ec2-bootstrap.sh"

          # Bug 3 fix (vault-mtg-tickets#3): compute the SHA-256 of the bootstrap
          # script and expose it as a step output. The changeset-creation step
          # below injects this value as the BootstrapSha CloudFormation parameter.
          # Without this, UserData is content-stable across bootstrap changes
          # (the UserData stub only references s3://.../bootstrap/ec2-bootstrap.sh
          # by path) and CFN sees zero drift on AWS::EC2::Instance — the new
          # bootstrap is uploaded to S3 but the live instance is never replaced.
          BOOTSTRAP_SHA="$(sha256sum "${BOOTSTRAP_SRC}" | awk '{print $1}')"
          echo "bootstrap_sha=${BOOTSTRAP_SHA}" >> "$GITHUB_OUTPUT"
          echo "Bootstrap SHA-256: ${BOOTSTRAP_SHA}"

          # Production bootstrap also fetches metric installers from S3 -- upload them
          # alongside. Staging bootstrap does not currently invoke them (the existing
          # scripts/install-restart-metric.sh references a stale staging unit name and
          # needs an update before it can be folded into staging bootstrap).
          if [ "${{ inputs.stack }}" = "ec2" ]; then
            aws s3 cp scripts/install-restart-metric-production.sh \
              s3://${BOOTSTRAP_BUCKET}/bootstrap/installers/install-restart-metric-production.sh \
              --region us-east-1
            aws s3 cp scripts/install-bff-latency-metric.sh \
              s3://${BOOTSTRAP_BUCKET}/bootstrap/installers/install-bff-latency-metric.sh \
              --region us-east-1
            echo "Installer scripts uploaded to s3://${BOOTSTRAP_BUCKET}/bootstrap/installers/"
          fi

      - name: Load parameters
        id: params
        run: |
          PARAMS_FILE="cloudformation/parameters/${{ inputs.stack }}.json"
          if [ -f "$PARAMS_FILE" ]; then
            echo "params_flag=--parameter-overrides file://$PARAMS_FILE" >> $GITHUB_OUTPUT
          else
            echo "params_flag=" >> $GITHUB_OUTPUT
          fi

      - name: Upload template to S3
        # Always upload the CloudFormation template to S3 before changeset creation.
        # Using --template-url instead of --template-body bypasses the 51200-byte
        # inline API limit that caused the iam-gha-roles deploy failure (#2499).
        # Path: bootstrap/cfn-templates/<sha>/<template>.yml — placed under the
        # bootstrap/* prefix so the existing S3BootstrapWrite Sid in the live IAM
        # policy covers this without requiring a separate cfn-templates/* grant.
        # Concurrent deploys on different SHAs never collide.
        id: upload_template
        run: |
          TEMPLATE_FILE="cloudformation/${{ env.TEMPLATE_NAME }}.yml"
          TEMPLATE_SIZE=$(stat -c %s "$TEMPLATE_FILE" 2>/dev/null || stat -f %z "$TEMPLATE_FILE")
          CFN_INLINE_LIMIT=51200

          if [ "$TEMPLATE_SIZE" -gt "$CFN_INLINE_LIMIT" ]; then
            echo "::notice::Template is ${TEMPLATE_SIZE} bytes (limit ${CFN_INLINE_LIMIT}) -- S3 upload required."
          else
            echo "Template is ${TEMPLATE_SIZE} bytes (under ${CFN_INLINE_LIMIT} limit) -- uploading to S3 for uniform changeset path."
          fi

          BUCKET="mtga-companion-deploy-artifacts-production"
          S3_KEY="bootstrap/cfn-templates/${{ github.sha }}/${{ env.TEMPLATE_NAME }}.yml"
          aws s3 cp "$TEMPLATE_FILE" "s3://$BUCKET/$S3_KEY"
          TEMPLATE_URL="https://$BUCKET.s3.us-east-1.amazonaws.com/$S3_KEY"
          echo "template_url=$TEMPLATE_URL" >> "$GITHUB_OUTPUT"
          echo "Uploaded: s3://$BUCKET/$S3_KEY"
          echo "URL: $TEMPLATE_URL"

      - name: Create changeset
        id: changeset
        run: |
          CHANGESET_NAME="deploy-$(date +%Y%m%d%H%M%S)"
          echo "changeset_name=$CHANGESET_NAME" >> $GITHUB_OUTPUT

          # IMPORT changesets: first-time adoption of pre-existing AWS resources.
          #
          # logs-import:
          #   All five log groups already exist in CloudWatch; CREATE would be blocked
          #   by the AWS::EarlyValidation::ResourceExistenceCheck hook. IMPORT adopts
          #   them into CFN management without recreating them. Subsequent updates use
          #   the normal UPDATE path (select "logs" once the stack exists).
          if [ "${{ inputs.stack }}" = "logs-import" ]; then
            CHANGE_TYPE="IMPORT"
            echo "change_type=$CHANGE_TYPE" >> $GITHUB_OUTPUT
            echo "Changeset type: $CHANGE_TYPE (resource import)"

            # Per-stack parameters file and resources-to-import file.
            case "${{ inputs.stack }}" in
              logs-import)
                PARAMS_FILE="cloudformation/parameters/logs.json"
                IMPORT_FILE="cloudformation/parameters/logs-import.json"
                ;;
            esac

            PARAMS_ARG=""
            [ -f "$PARAMS_FILE" ] && PARAMS_ARG="--parameters file://$PARAMS_FILE"

            aws cloudformation create-change-set \
              --stack-name "${{ env.STACK_NAME }}" \
              --template-url "${{ steps.upload_template.outputs.template_url }}" \
              --change-set-name "$CHANGESET_NAME" \
              --change-set-type IMPORT \
              --resources-to-import "file://$IMPORT_FILE" \
              --capabilities CAPABILITY_IAM \
              $PARAMS_ARG

            aws cloudformation wait change-set-create-complete \
              --stack-name "${{ env.STACK_NAME }}" \
              --change-set-name "$CHANGESET_NAME" || true
          else
            # Determine CREATE vs UPDATE by checking if the stack already exists and is stable.
            # Save as a step output so the execute step uses the right waiter.
            STACK_STATUS=$(aws cloudformation describe-stacks \
              --stack-name "${{ env.STACK_NAME }}" \
              --query 'Stacks[0].StackStatus' \
              --output text 2>/dev/null || echo "DOES_NOT_EXIST")

            # IMPORTANT: exact-string equality, not grep -qF. The previous `grep -qF 'ROLLBACK_COMPLETE'`
            # also matched UPDATE_ROLLBACK_COMPLETE (substring match), which would trigger a delete-and-recreate
            # on a healthy stack that had a failed UPDATE — destroying live resources. See vault-mtg#TBD for
            # the 2026-05-23 incident that prompted this fix.
            if [ "$STACK_STATUS" = "ROLLBACK_COMPLETE" ]; then
              # Stack is in ROLLBACK_COMPLETE — only triggered when an initial CREATE failed,
              # so the stack has no live resources to preserve. Safe to delete and recreate.
              aws cloudformation delete-stack \
                --stack-name "${{ env.STACK_NAME }}" \
                --region us-east-1
              aws cloudformation wait stack-delete-complete \
                --stack-name "${{ env.STACK_NAME }}" \
                --region us-east-1
              CHANGE_TYPE="CREATE"
            else
              case "$STACK_STATUS" in
                CREATE_COMPLETE|UPDATE_COMPLETE|IMPORT_COMPLETE|UPDATE_ROLLBACK_COMPLETE|IMPORT_ROLLBACK_COMPLETE)
                  CHANGE_TYPE="UPDATE" ;;
                *)
                  CHANGE_TYPE="CREATE" ;;
              esac
            fi
            echo "change_type=$CHANGE_TYPE" >> $GITHUB_OUTPUT
            echo "Changeset type: $CHANGE_TYPE (stack status: $STACK_STATUS)"

            PARAMS_FILE="cloudformation/parameters/${{ inputs.stack }}.json"
            PARAMS_ARG=""

            # Bug 3 fix (vault-mtg-tickets#3): inject BootstrapSha into the
            # ec2 / ec2-staging stack parameters so any content change to
            # scripts/deploy/ec2-bootstrap.sh forces a UserData byte change.
            # The SHA was computed and uploaded in the "Upload bootstrap script"
            # step above. We materialise a merged parameters JSON in $RUNNER_TEMP
            # rather than mutating the source file in the workspace.
            if [ "${{ inputs.stack }}" = "ec2" ] || [ "${{ inputs.stack }}" = "ec2-staging" ]; then
              MERGED_PARAMS="${RUNNER_TEMP}/${{ inputs.stack }}-merged-params.json"
              if [ -f "$PARAMS_FILE" ]; then
                # Append BootstrapSha (overriding any pre-existing entry).
                jq --arg sha "${{ steps.upload_bootstrap.outputs.bootstrap_sha }}" \
                   '[.[] | select(.ParameterKey != "BootstrapSha")] + [{ParameterKey:"BootstrapSha", ParameterValue:$sha}]' \
                   "$PARAMS_FILE" > "$MERGED_PARAMS"
              else
                jq -n --arg sha "${{ steps.upload_bootstrap.outputs.bootstrap_sha }}" \
                   '[{ParameterKey:"BootstrapSha", ParameterValue:$sha}]' \
                   > "$MERGED_PARAMS"
              fi
              PARAMS_ARG="--parameters file://$MERGED_PARAMS"
              echo "Injected BootstrapSha=${{ steps.upload_bootstrap.outputs.bootstrap_sha }} into changeset parameters"
            else
              [ -f "$PARAMS_FILE" ] && PARAMS_ARG="--parameters file://$PARAMS_FILE"
            fi

            aws cloudformation create-change-set \
              --stack-name "${{ env.STACK_NAME }}" \
              --template-url "${{ steps.upload_template.outputs.template_url }}" \
              --change-set-name "$CHANGESET_NAME" \
              --change-set-type "$CHANGE_TYPE" \
              --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
              $PARAMS_ARG

            # Wait for changeset to finish computing (FAILED is terminal -- e.g. no changes)
            aws cloudformation wait change-set-create-complete \
              --stack-name "${{ env.STACK_NAME }}" \
              --change-set-name "$CHANGESET_NAME" || true
          fi

      - name: Detect empty changeset
        # Issue #2460: when triggered from the auto-deploy-on-merge workflow,
        # a push may touch a CloudFormation template with no resource-level
        # effect (comment edit, whitespace, parameter reordering). The
        # resulting changeset has status FAILED with reason
        # "The submitted information didn't contain changes" (or "No updates
        # are to be performed.") and cannot be executed.
        #
        # Treat that case as a successful no-op: delete the empty changeset
        # and short-circuit the rest of the job so no-op merges don't break
        # auto-deploy. Any other changeset failure is still fatal.
        id: empty_check
        run: |
          STATUS=$(aws cloudformation describe-change-set \
            --stack-name "${{ env.STACK_NAME }}" \
            --change-set-name "${{ steps.changeset.outputs.changeset_name }}" \
            --query 'Status' --output text)
          REASON=$(aws cloudformation describe-change-set \
            --stack-name "${{ env.STACK_NAME }}" \
            --change-set-name "${{ steps.changeset.outputs.changeset_name }}" \
            --query 'StatusReason' --output text)
          echo "Changeset status: $STATUS"
          echo "Changeset reason: $REASON"

          # No-change detection — match both wordings AWS uses for empty changesets.
          if [ "$STATUS" = "FAILED" ] && echo "$REASON" | grep -qE "didn't contain changes|No updates are to be performed"; then
            echo "Empty changeset detected (no resource changes). Cleaning up and exiting cleanly."
            aws cloudformation delete-change-set \
              --stack-name "${{ env.STACK_NAME }}" \
              --change-set-name "${{ steps.changeset.outputs.changeset_name }}" || true
            echo "empty=true" >> "$GITHUB_OUTPUT"
          elif [ "$STATUS" = "FAILED" ]; then
            echo "::error::Changeset creation FAILED for a non-empty-changeset reason: $REASON"
            exit 1
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Show changeset
        if: steps.empty_check.outputs.empty != 'true'
        run: |
          aws cloudformation describe-change-set \
            --stack-name "${{ env.STACK_NAME }}" \
            --change-set-name "${{ steps.changeset.outputs.changeset_name }}" \
            --query 'Changes[].{Action:ResourceChange.Action,Resource:ResourceChange.LogicalResourceId,Type:ResourceChange.ResourceType,Replace:ResourceChange.Replacement}' \
            --output table

      - name: Check changeset for replacements
        # R-19 guard (issue #2345): block execution when the changeset would replace
        # any resource. Replacement of a stateful resource (RDS DBInstance, EC2 Instance,
        # EBS Volume, etc.) causes data loss and/or downtime; to proceed intentionally,
        # re-run the workflow with confirm_replacements=true.
        #
        # Skipped on dry_run because dry_run never executes the changeset anyway.
        # Skipped on empty changeset (issue #2460) — no changes means no replacements.
        id: replacement_check
        if: ${{ !inputs.dry_run && steps.empty_check.outputs.empty != 'true' }}
        run: |
          CHANGES=$(aws cloudformation describe-change-set \
            --stack-name "${{ env.STACK_NAME }}" \
            --change-set-name "${{ steps.changeset.outputs.changeset_name }}" \
            --query 'Changes[?ResourceChange.Replacement==`True`].{Type:ResourceChange.ResourceType,Id:ResourceChange.LogicalResourceId}' \
            --output json)

          if [ "$(echo "$CHANGES" | jq 'length')" -gt 0 ]; then
            echo "REPLACEMENT_DETECTED=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Changeset contains resource replacements:"
            echo "$CHANGES" | jq -r '.[] | "  - \(.Type): \(.Id)"'
            if [ "${{ inputs.confirm_replacements }}" != "true" ]; then
              echo "::error::Resource replacements detected. Re-run with confirm_replacements=true to proceed."
              exit 1
            else
              echo "::warning::confirm_replacements=true — proceeding with replacement."
            fi
          else
            echo "REPLACEMENT_DETECTED=false" >> "$GITHUB_OUTPUT"
            echo "No resource replacements detected in changeset."
          fi

      - name: Cleanup orphaned changeset on guard failure
        if: failure()
        run: |
          aws cloudformation delete-change-set \
            --stack-name "${{ env.STACK_NAME }}" \
            --change-set-name "${{ steps.changeset.outputs.changeset_name }}" \
            --region us-east-1 \
            || true  # best-effort; don't fail the workflow if already gone

      - name: Execute changeset
        # Skipped on empty changeset (issue #2460) — nothing to execute.
        if: ${{ !inputs.dry_run && steps.empty_check.outputs.empty != 'true' }}
        run: |
          aws cloudformation execute-change-set \
            --stack-name "${{ env.STACK_NAME }}" \
            --change-set-name "${{ steps.changeset.outputs.changeset_name }}"

          echo "Waiting for stack to stabilise (type: ${{ steps.changeset.outputs.change_type }})..."
          if [ "${{ steps.changeset.outputs.change_type }}" = "CREATE" ]; then
            aws cloudformation wait stack-create-complete \
              --stack-name "${{ env.STACK_NAME }}"
          elif [ "${{ steps.changeset.outputs.change_type }}" = "IMPORT" ]; then
            aws cloudformation wait stack-import-complete \
              --stack-name "${{ env.STACK_NAME }}"
          else
            aws cloudformation wait stack-update-complete \
              --stack-name "${{ env.STACK_NAME }}"
          fi

      - name: Apply log group retention policies (logs-import only)
        # CloudFormation IMPORT adopts existing resources but does not reconcile
        # non-identifier properties (such as RetentionInDays) in the same operation.
        # This step forces the retention policy onto each imported log group so that
        # the live state matches the template immediately after import.
        # Idempotent: safe to re-run; no-op if retention is already correct.
        # Skipped on empty changeset (issue #2460) — no import occurred.
        if: ${{ inputs.stack == 'logs-import' && !inputs.dry_run && steps.empty_check.outputs.empty != 'true' }}
        run: |
          RETENTION_DAYS=30
          for LG in \
            "/vaultmtg/production/bff" \
            "/vaultmtg/production/nginx" \
            "/aws/lambda/vault-mtg-sync" \
            "/aws/lambda/mtga-sync" \
            "/aws/lambda/mtga-companion-production-cfn-vpc-config"; do
            aws logs put-retention-policy \
              --log-group-name "$LG" \
              --retention-in-days $RETENTION_DAYS
            echo "Set ${RETENTION_DAYS}-day retention on $LG"
          done
          echo "Verifying retention policies..."
          aws logs describe-log-groups \
            --query 'logGroups[].[logGroupName,retentionInDays]' \
            --output table

      - name: Show stack outputs
        if: ${{ !inputs.dry_run }}
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --query 'Stacks[0].Outputs' \
            --output table

      - name: Delete changeset (dry run cleanup)
        if: ${{ inputs.dry_run }}
        run: |
          aws cloudformation delete-change-set \
            --stack-name "${{ env.STACK_NAME }}" \
            --change-set-name "${{ steps.changeset.outputs.changeset_name }}" || true
          echo "Dry run complete — no changes deployed."
