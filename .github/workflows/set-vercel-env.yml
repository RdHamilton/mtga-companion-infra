name: Set Vercel Environment Variables

on:
  workflow_dispatch:
    inputs:
      bff_url_override:
        description: >
          Override BFF URL (e.g. https://api.mtga-companion.com/api/v1).
          Leave empty to auto-detect from EC2 public IP via tag lookup.
        required: false
        type: string
        default: ""
      dry_run:
        description: Dry run -- print env var values without calling Vercel CLI
        required: false
        type: boolean
        default: false

# Only one run at a time to avoid race conditions on Vercel env state
concurrency:
  group: vercel-env-sync
  cancel-in-progress: false

jobs:
  set-vercel-env:
    name: Set VITE_BFF_URL in Vercel (${{ inputs.dry_run && 'dry-run' || 'apply' }})
    runs-on: ubuntu-latest
    environment: production

    env:
      AWS_REGION: us-east-1
      VERCEL_CLI_VERSION: "39.3.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Resolve BFF URL: prefer explicit override, else query EC2 public IP via tag
      - name: Resolve BFF URL
        id: bff
        env:
          BFF_URL_OVERRIDE: ${{ inputs.bff_url_override }}
        run: |
          if [ -n "$BFF_URL_OVERRIDE" ]; then
            BFF_URL="$BFF_URL_OVERRIDE"
            echo "Using override: $BFF_URL"
          else
            INSTANCE_ID=$(aws ec2 describe-instances \
              --filters "Name=tag:Project,Values=mtga-companion" \
                        "Name=instance-state-name,Values=running" \
              --query 'Reservations[0].Instances[0].InstanceId' \
              --output text)

            if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
              echo "ERROR: Could not find running EC2 instance with tag Project=mtga-companion" >&2
              exit 1
            fi

            EC2_IP=$(aws ec2 describe-instances \
              --instance-ids "$INSTANCE_ID" \
              --query 'Reservations[0].Instances[0].PublicIpAddress' \
              --output text)

            if [ -z "$EC2_IP" ] || [ "$EC2_IP" = "None" ]; then
              echo "ERROR: Instance $INSTANCE_ID has no public IP" >&2
              exit 1
            fi

            BFF_URL="http://${EC2_IP}/api/v1"
            echo "Auto-resolved from instance $INSTANCE_ID: $BFF_URL"
          fi
          echo "bff_url=$BFF_URL" >> "$GITHUB_OUTPUT"
          echo "VITE_BFF_URL will be set to: $BFF_URL"

      - name: Install Vercel CLI
        run: npm install --global "vercel@$VERCEL_CLI_VERSION"

      # Vercel env add does not support upsert natively -- remove then re-add.
      # This is idempotent: if the env var does not exist, `remove` exits 0.
      - name: Set VITE_BFF_URL (Production)
        if: ${{ !inputs.dry_run }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          BFF_URL: ${{ steps.bff.outputs.bff_url }}
        run: |
          # Remove existing value so we can set the new one (non-fatal if absent)
          echo "" | vercel env rm VITE_BFF_URL production --yes --token "$VERCEL_TOKEN" 2>/dev/null || true

          # Add new value
          printf '%s' "$BFF_URL" | vercel env add VITE_BFF_URL production --token "$VERCEL_TOKEN"

          echo "Set VITE_BFF_URL=$BFF_URL for Production"

      - name: Set VITE_BFF_URL (Preview)
        if: ${{ !inputs.dry_run }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          BFF_URL: ${{ steps.bff.outputs.bff_url }}
        run: |
          # Remove existing value so we can set the new one (non-fatal if absent)
          echo "" | vercel env rm VITE_BFF_URL preview --yes --token "$VERCEL_TOKEN" 2>/dev/null || true

          # Add new value
          printf '%s' "$BFF_URL" | vercel env add VITE_BFF_URL preview --token "$VERCEL_TOKEN"

          echo "Set VITE_BFF_URL=$BFF_URL for Preview"

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        env:
          BFF_URL: ${{ steps.bff.outputs.bff_url }}
        run: |
          echo "=== DRY RUN -- No changes made ==="
          echo "VITE_BFF_URL would be set to: $BFF_URL"
          echo "Environments: Production, Preview"
          echo ""
          echo "Run again with dry_run=false to apply."

      - name: Verify env vars (list)
        if: ${{ !inputs.dry_run }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel env ls production --token "$VERCEL_TOKEN" | grep -q VITE_BFF_URL \
            && echo "VITE_BFF_URL confirmed in production" \
            || echo "WARNING: VITE_BFF_URL not found in production"
          vercel env ls preview --token "$VERCEL_TOKEN" | grep -q VITE_BFF_URL \
            && echo "VITE_BFF_URL confirmed in preview" \
            || echo "WARNING: VITE_BFF_URL not found in preview"
