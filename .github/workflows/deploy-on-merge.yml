name: Auto-Deploy CFN Stacks on Merge to Main

# Triggered automatically when CloudFormation templates change on main.
#
# Purpose (issue #2460, standing order PC-12): IaC is not Done until deployed.
# Merged-but-undeployed templates accumulate silent drift between main and live
# AWS. This bit the v0.3.1.1 wave twice (R-13 surfaced merged-but-undeployed
# stacks; ec2.yml accumulated UserData changes across 3 PRs and crossed the
# 16,384-byte limit).
#
# Approach: detect which templates changed in the push, map each file to its
# CloudFormation stack input(s), then re-use the existing deploy.yml workflow
# (workflow_dispatch) one stack at a time. We do NOT duplicate deploy logic —
# this workflow only triggers the existing deployer. That keeps a single source
# of truth for stack name resolution, IAM simulation, changeset replacement
# guards, and the production-environment approval gate.
#
# Idempotence: deploy.yml's changeset path tolerates "no changes" (the
# create-change-set wait is followed by `|| true`, and execute proceeds with
# nothing to apply). No-op merges therefore complete without failing.
#
# Production gate preserved: deploy.yml declares `environment: production`,
# which gates each dispatched run on the existing human-approver list. This
# workflow does NOT bypass that gate — it just initiates the run.
#
# Skipped templates:
#   - vaultmtg-security-services-import.yml: one-time IMPORT (adopt existing
#     resources). Re-deploying via this path would attempt CREATE/UPDATE and
#     fail.
#   - logs-import (no separate template; uses logs.yml with IMPORT changeset
#     type): same reason. The base `logs` stack is auto-deployed when logs.yml
#     changes.

on:
  push:
    branches:
      - main
    paths:
      - 'cloudformation/**.yml'

concurrency:
  # Serialize concurrent runs of THIS workflow only. Two merges to main that
  # both touch cloudformation/* queue here one at a time — we never want
  # parallel dispatch loops fighting over the same template set.
  #
  # Cross-workflow serialization changed 2026-05-27 in this commit: deploy.yml
  # now uses a per-stack group (`cloudformation-deploy-${{ inputs.stack }}`),
  # so a manual `gh workflow run deploy.yml -f stack=X` no longer shares a group
  # with this orchestrator workflow. The actual CFN-changeset race is per-stack
  # (managed by deploy.yml's per-stack group), not per-workflow. This wrapper
  # only needs to serialize against itself.
  group: cloudformation-deploy-on-merge
  cancel-in-progress: false

permissions:
  actions: write    # required to dispatch deploy.yml via gh workflow run
  contents: read

jobs:
  preflight-drift-check:
    name: Pre-flight drift check for affected stacks
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC role assumption (configure-aws-credentials)
      contents: read
    # Timeout: drift detection per stack is 5-30s observed; 5 stacks in the
    # worst realistic merge + 5s poll cap + AWS credential headroom = well
    # under 10 min. Set 15 min to match detect-drift.yml per-stack budget.
    timeout-minutes: 15

    env:
      AWS_REGION: us-east-1
      # Space-separated list of deploy.yml stack inputs whose drift should be
      # WARNED about but NOT block the deploy. Empty by default — add entries
      # here only after a conscious decision to tolerate known-benign drift.
      # Example: ALLOW_DRIFT_STACKS: "rhamiltoneng-dns vaultmtg-security-services"
      ALLOW_DRIFT_STACKS: ""

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 — SHA pinned (ticket #2385 AC3)
        with:
          fetch-depth: 2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@796449b3e38e3c256861227399e58b780e0e5538  # v6 — SHA pinned (ticket #2385 AC3)
        with:
          role-to-assume: ${{ secrets.AWS_CFN_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Detect drift on affected stacks
        # Resolves which stacks the push would deploy (same STACK_MAP as the
        # dispatch job), then runs aws cloudformation detect-stack-drift on
        # each resolved AWS stack name. Stacks that do not yet exist are
        # skipped. If any non-allow-listed stack is DRIFTED, the job fails
        # and the dispatch job is blocked (via `needs:`), preventing a
        # #58-class UPDATE_ROLLBACK_COMPLETE from the auto-deploy path.
        #
        # IAM: DetectStackDrift and DescribeStackResourceDrifts are already
        # granted by the CloudFormationStackOperations Sid (cloudformation:*
        # on stack/mtga-companion-*/*, stack/vaultmtg-*/*, etc.).
        # DescribeStackDriftDetectionStatus is granted by CloudFormationGlobal
        # on Resource:"*". No IAM change required for this step.
        run: |
          set -euo pipefail

          # ----------------------------------------------------------------
          # Template → deploy.yml stack input mapping (mirrors dispatch job).
          # ----------------------------------------------------------------
          declare -A STACK_MAP=(
            [cdn.yml]="cdn"
            [cloudtrail.yml]="cloudtrail"
            [cloudwatch-alarms.yml]="cloudwatch-alarms cloudwatch-alarms-staging"
            [cloudwatch-dashboards.yml]="cloudwatch-dashboards"
            [deploy-artifacts.yml]="deploy-artifacts"
            [ec2-sg.yml]="ec2-sg ec2-sg-staging"
            [ec2.yml]="ec2"
            [iam-break-glass.yml]="iam-break-glass"
            [iam-gha-roles.yml]="iam-gha-roles"
            [logs.yml]="logs"
            [rds-vaultmtg.yml]="rds-vaultmtg"
            [rds-vaultmtg-staging.yml]="rds-vaultmtg-staging"
            [rhamiltoneng-dns.yml]="rhamiltoneng-dns"
            [security-alarms.yml]="security-alarms"
            [staging-deploy-role.yml]="staging-deploy-role"
            [sync-lambda.yml]="sync-lambda sync-lambda-staging"
            [nat-egress.yml]="nat-egress"
            [dns-staging.yml]="dns-staging"
            [daemon-release-ssm-role.yml]="daemon-release-ssm-role"
            [vaultmtg-security-services.yml]="vaultmtg-security-services"
            [vpc.yml]="vpc"
          )

          IGNORE_TEMPLATES=(
            vaultmtg-security-services-import.yml
          )

          # ----------------------------------------------------------------
          # Deploy-input → AWS CloudFormation stack name mapping.
          # Keep in sync with deploy.yml "Resolve stack name" step.
          # ----------------------------------------------------------------
          declare -A AWS_STACK_NAME=(
            [cdn]="vaultmtg-app-cdn"
            [cloudtrail]="vaultmtg-cloudtrail"
            [cloudwatch-alarms]="mtga-companion-cloudwatch-alarms"
            [cloudwatch-alarms-staging]="mtga-companion-cloudwatch-alarms-staging"
            [cloudwatch-dashboards]="vaultmtg-cloudwatch-dashboards"
            [deploy-artifacts]="mtga-companion-deploy-artifacts"
            [dns-staging]="mtga-companion-dns-staging"
            [ec2]="mtga-companion-ec2"
            [ec2-sg]="mtga-companion-ec2-sg"
            [ec2-sg-staging]="mtga-companion-ec2-sg-staging"
            [iam-break-glass]="vaultmtg-iam-break-glass"
            [iam-gha-roles]="mtga-companion-iam-gha-roles"
            [logs]="mtga-companion-logs"
            [nat-egress]="vaultmtg-nat-egress"
            [rds-vaultmtg]="vaultmtg-rds"
            [rds-vaultmtg-staging]="vaultmtg-rds-staging"
            [rhamiltoneng-dns]="rhamiltoneng-dns"
            [security-alarms]="vaultmtg-security-alarms"
            [staging-deploy-role]="mtga-companion-staging-deploy-role"
            [sync-lambda]="mtga-companion-sync-lambda"
            [sync-lambda-staging]="vaultmtg-sync-lambda-staging"
            [daemon-release-ssm-role]="vaultmtg-daemon-release-ssm-role"
            [vaultmtg-security-services]="vaultmtg-security-services"
            [vpc]="mtga-companion-vpc"
          )

          # ----------------------------------------------------------------
          # Resolve which deploy inputs are affected by this push.
          # ----------------------------------------------------------------
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'cloudformation/*.yml' | xargs -r -n1 basename)

          if [ -z "$CHANGED" ]; then
            echo "No CloudFormation templates changed. Nothing to drift-check."
            exit 0
          fi

          declare -A AFFECTED_INPUTS=()

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            skip=0
            for ig in "${IGNORE_TEMPLATES[@]}"; do
              [ "$file" = "$ig" ] && skip=1 && break
            done
            [ "$skip" -eq 1 ] && continue

            if [ -z "${STACK_MAP[$file]:-}" ]; then
              # Unknown template — the dispatch job will error on this too;
              # skip here so we don't mask that error with a drift-check abort.
              echo "::warning::No STACK_MAP entry for $file — skipping drift check."
              continue
            fi

            for input in ${STACK_MAP[$file]}; do
              AFFECTED_INPUTS[$input]=1
            done
          done <<< "$CHANGED"

          if [ ${#AFFECTED_INPUTS[@]} -eq 0 ]; then
            echo "No deployable stacks resolved. Nothing to drift-check."
            exit 0
          fi

          echo "Stacks to drift-check:"
          for input in "${!AFFECTED_INPUTS[@]}"; do
            echo "  - $input -> ${AWS_STACK_NAME[$input]:-mtga-companion-$input}"
          done

          # ----------------------------------------------------------------
          # Drift-check loop — one stack at a time (no matrix needed here;
          # the set is small and we want a single blocking step output).
          # ----------------------------------------------------------------
          DRIFTED_STACKS=()
          POLL_MAX=36   # 36 * 5s = 3 min cap per stack

          for input in "${!AFFECTED_INPUTS[@]}"; do
            STACK="${AWS_STACK_NAME[$input]:-mtga-companion-$input}"
            echo "=========================================="
            echo "Checking drift: $STACK (input: $input)"
            echo "=========================================="

            STACK_STATUS=$(aws cloudformation describe-stacks \
              --stack-name "$STACK" \
              --query 'Stacks[0].StackStatus' \
              --output text 2>/dev/null || echo "DOES_NOT_EXIST")

            if [ "$STACK_STATUS" = "DOES_NOT_EXIST" ]; then
              echo "  SKIP — stack not yet deployed."
              continue
            fi
            echo "  Stack status: $STACK_STATUS"

            DETECTION_ID=$(aws cloudformation detect-stack-drift \
              --stack-name "$STACK" \
              --query 'StackDriftDetectionId' \
              --output text 2>/dev/null || echo "")

            if [ -z "$DETECTION_ID" ]; then
              echo "  WARN — could not start drift detection for $STACK. Skipping."
              continue
            fi
            echo "  Detection ID: $DETECTION_ID"

            DETECTION_STATUS="DETECTION_IN_PROGRESS"
            DRIFT_STATUS="UNKNOWN"
            CONSECUTIVE_ERRORS=0
            ERR_FILE="$(mktemp)"

            for _poll in $(seq 1 $POLL_MAX); do
              RESULT=$(aws cloudformation describe-stack-drift-detection-status \
                --stack-drift-detection-id "$DETECTION_ID" \
                --query '[DetectionStatus,StackDriftStatus]' \
                --output text 2>"$ERR_FILE" || echo "ERROR ERROR")
              DETECTION_STATUS=$(echo "$RESULT" | awk '{print $1}')
              DRIFT_STATUS=$(echo "$RESULT" | awk '{print $2}')

              if [ "$DETECTION_STATUS" = "DETECTION_COMPLETE" ] || \
                 [ "$DETECTION_STATUS" = "DETECTION_FAILED" ]; then
                break
              fi

              if [ "$DETECTION_STATUS" = "ERROR" ]; then
                CONSECUTIVE_ERRORS=$((CONSECUTIVE_ERRORS + 1))
                if [ "$CONSECUTIVE_ERRORS" -ge 3 ]; then
                  echo "  Aborting poll after 3 consecutive errors:"
                  while IFS= read -r line; do echo "    $line"; done < "$ERR_FILE"
                  break
                fi
              else
                CONSECUTIVE_ERRORS=0
              fi
              sleep 5
            done
            rm -f "$ERR_FILE"

            echo "  Detection status: $DETECTION_STATUS"
            echo "  Drift status:     $DRIFT_STATUS"

            if [ "$DRIFT_STATUS" = "DRIFTED" ]; then
              # Pull drifted-resource detail as JSON so we can inspect
              # PropertyDifferences paths and ResourceType before deciding
              # whether to block. We include UNKNOWN here so CloudWatch Alarm
              # resources (which CFN always marks UNKNOWN) are visible.
              #
              # FAIL-CLOSED: capture the CLI exit code before any jq work.
              # If the API call fails on an already-DRIFTED stack we must NOT
              # synthesise an empty payload (that would make REAL_DRIFT_COUNT=0
              # and let the deploy proceed — fail-open). Block immediately.
              DRIFT_JSON=$(aws cloudformation describe-stack-resource-drifts \
                --stack-name "$STACK" \
                --stack-resource-drift-status-filters MODIFIED DELETED NOT_CHECKED UNKNOWN \
                --output json 2>/tmp/drift_err_"$STACK".txt)
              DRIFT_API_RC=$?
              if [ "$DRIFT_API_RC" -ne 0 ]; then
                echo "::error::Stack $STACK is DRIFTED but describe-stack-resource-drifts failed (exit $DRIFT_API_RC) — cannot assess benign patterns. Blocking deploy (fail-closed)."
                cat /tmp/drift_err_"$STACK".txt || true
                rm -f /tmp/drift_err_"$STACK".txt
                DRIFTED_STACKS+=("$STACK")
                continue
              fi
              rm -f /tmp/drift_err_"$STACK".txt

              # ----------------------------------------------------------------
              # Benign-drift filter (ticket #156).
              #
              # CFN has three known false-positive patterns that can never be
              # resolved by a template deploy:
              #
              # 1. AWS::CloudWatch::Alarm with StackResourceDriftStatus=UNKNOWN
              #    CFN's drift checker cannot inspect alarm tags via
              #    describe-alarms, so it marks every tagged alarm UNKNOWN.
              #    This is a CFN limitation, not real configuration drift.
              #
              # 2. AWS::SQS::Queue MODIFIED where the ONLY PropertyDifferences
              #    path is "/Tags".  CFN reads SQS tags via GetQueueAttributes,
              #    which never returns tags; the actual tags are present per
              #    ListQueueTags.  The "/Tags" diff is always a false positive.
              #
              # 3. AWS::SNS::Topic MODIFIED where the ONLY PropertyDifferences
              #    path is "/Tags".  CFN's drift checker reads SNS topic
              #    properties but does not consistently return system-managed
              #    aws:cloudformation:* tags in ActualProperties, causing a
              #    spurious /Tags mismatch.  Confirmed benign: actual tags are
              #    present via sns:ListTagsForResource.  (ticket #209 follow-up)
              #
              # Any resource that does NOT match one of these three patterns is
              # considered real drift and still blocks the auto-deploy.
              # ----------------------------------------------------------------

              # Count resources that are genuine (non-benign) drift.
              REAL_DRIFT_COUNT=$(echo "$DRIFT_JSON" | jq '
                [.StackResourceDrifts[] |
                  select(
                    # Keep it (real drift) unless it matches a benign pattern.
                    # Benign pattern 1: CloudWatch::Alarm with UNKNOWN status
                    (
                      .ResourceType == "AWS::CloudWatch::Alarm" and
                      .StackResourceDriftStatus == "UNKNOWN"
                    ) or
                    # Benign pattern 2: SQS::Queue MODIFIED with only /Tags diff
                    (
                      .ResourceType == "AWS::SQS::Queue" and
                      .StackResourceDriftStatus == "MODIFIED" and
                      (.PropertyDifferences | length) > 0 and
                      ([.PropertyDifferences[].PropertyPath] | all(. == "/Tags"))
                    ) or
                    # Benign pattern 3: SNS::Topic MODIFIED with only /Tags diff
                    (
                      .ResourceType == "AWS::SNS::Topic" and
                      .StackResourceDriftStatus == "MODIFIED" and
                      (.PropertyDifferences | length) > 0 and
                      ([.PropertyDifferences[].PropertyPath] | all(. == "/Tags"))
                    )
                    | not   # invert: select resources that are NOT benign
                  )
                ] | length
              ' 2>/dev/null || echo "1")

              # Also collect a human-readable summary of all drifted resources
              # (benign + real) for the log.
              DRIFT_SUMMARY=$(echo "$DRIFT_JSON" | jq -r '
                .StackResourceDrifts[] |
                  "\(.LogicalResourceId)  \(.ResourceType)  \(.StackResourceDriftStatus)"
              ' 2>/dev/null || echo "(could not parse drift detail)")

              # Count benign resources for the log message.
              BENIGN_COUNT=$(echo "$DRIFT_JSON" | jq '
                [.StackResourceDrifts[] |
                  select(
                    (
                      .ResourceType == "AWS::CloudWatch::Alarm" and
                      .StackResourceDriftStatus == "UNKNOWN"
                    ) or
                    (
                      .ResourceType == "AWS::SQS::Queue" and
                      .StackResourceDriftStatus == "MODIFIED" and
                      (.PropertyDifferences | length) > 0 and
                      ([.PropertyDifferences[].PropertyPath] | all(. == "/Tags"))
                    ) or
                    (
                      .ResourceType == "AWS::SNS::Topic" and
                      .StackResourceDriftStatus == "MODIFIED" and
                      (.PropertyDifferences | length) > 0 and
                      ([.PropertyDifferences[].PropertyPath] | all(. == "/Tags"))
                    )
                  )
                ] | length
              ' 2>/dev/null || echo "0")

              echo "  Drifted resources (all):"
              while IFS= read -r line; do echo "    $line"; done <<< "$DRIFT_SUMMARY"
              echo "  Benign (filtered) resources: $BENIGN_COUNT"
              echo "  Real drift resources:        $REAL_DRIFT_COUNT"

              # Check allow-list before blocking (covers any remaining cases
              # where an operator has explicitly accepted known-benign drift on
              # a specific stack — kept for backward compatibility).
              allowed=0
              for allowed_input in $ALLOW_DRIFT_STACKS; do
                [ "$input" = "$allowed_input" ] && allowed=1 && break
              done

              if [ "$allowed" -eq 1 ]; then
                echo "::warning::Stack $STACK is DRIFTED but is on ALLOW_DRIFT_STACKS — proceeding with deploy."
              elif [ "$REAL_DRIFT_COUNT" -eq 0 ]; then
                echo "::warning::Stack $STACK reported DRIFTED but all $BENIGN_COUNT resource(s) match known-benign CFN false-positive patterns (ticket #156) — proceeding with deploy."
              else
                echo "::error::Stack $STACK has $REAL_DRIFT_COUNT real drifted resource(s). Auto-deploy blocked to prevent #58-class UPDATE_ROLLBACK_COMPLETE."
                echo "  Resolution options:"
                echo "    1. Run 'Deploy CloudFormation Stack' (deploy.yml) manually after investigating the drift."
                echo "    2. Re-run detect-drift.yml to confirm current drift state."
                echo "    3. If the drift is genuinely benign, add it to the filter in the preflight-drift-check step."
                DRIFTED_STACKS+=("$STACK")
              fi
            else
              echo "  IN_SYNC (or detection inconclusive) — OK to deploy."
            fi
          done

          if [ ${#DRIFTED_STACKS[@]} -gt 0 ]; then
            echo ""
            echo "::error::Pre-flight drift check FAILED. Blocked stacks: ${DRIFTED_STACKS[*]}"
            echo "Resolve the drift before the auto-deploy chain resumes."
            exit 1
          fi

          echo ""
          echo "Pre-flight drift check PASSED — all affected stacks are IN_SYNC."

  detect-and-dispatch:
    name: Detect changed templates and dispatch deploy.yml per stack
    needs: preflight-drift-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 — SHA pinned (ticket #2385 AC3)
        with:
          # Need HEAD~1 to diff against the previous commit.
          fetch-depth: 2

      - name: Detect changed CloudFormation templates
        id: detect
        run: |
          # List basenames of changed cloudformation/*.yml files since the
          # previous commit. Restricted to templates at the top level —
          # cloudformation/parameters/ changes do not (yet) trigger deploys.
          # If parameters drift becomes a problem, add a separate mapping.
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'cloudformation/*.yml' | xargs -r -n1 basename)
          echo "Changed templates:"
          echo "$CHANGED"
          # Save for the next step as a newline-delimited list.
          {
            echo 'changed<<EOF'
            echo "$CHANGED"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Map templates to stack inputs and dispatch
        if: steps.detect.outputs.changed != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Map each template filename to one or more deploy.yml `stack` inputs.
          # Multi-value entries (space-separated) handle the cloudwatch-alarms
          # case where one template backs both the prod and staging stacks.
          #
          # Templates NOT mapped here are intentionally excluded:
          #   - vaultmtg-security-services-import.yml (one-time IMPORT)
          # Anything else missing from this map fails the workflow loudly so
          # we add a new template and forget to wire it up.
          declare -A STACK_MAP=(
            [cdn.yml]="cdn"
            [cloudtrail.yml]="cloudtrail"
            [cloudwatch-alarms.yml]="cloudwatch-alarms cloudwatch-alarms-staging"
            [cloudwatch-dashboards.yml]="cloudwatch-dashboards"
            [deploy-artifacts.yml]="deploy-artifacts"
            [ec2-sg.yml]="ec2-sg ec2-sg-staging"
            [ec2.yml]="ec2"
            [iam-break-glass.yml]="iam-break-glass"
            [iam-gha-roles.yml]="iam-gha-roles"
            [logs.yml]="logs"
            [rds-vaultmtg.yml]="rds-vaultmtg"
            [rds-vaultmtg-staging.yml]="rds-vaultmtg-staging"
            [rhamiltoneng-dns.yml]="rhamiltoneng-dns"
            [security-alarms.yml]="security-alarms"
            [staging-deploy-role.yml]="staging-deploy-role"
            # sync-lambda.yml backs BOTH the production and staging sync Lambda
            # stacks via separate parameter files (parameters/sync-lambda.json,
            # parameters/sync-lambda-staging.json). Both stack inputs are
            # dispatched on any change to the shared template so the prod and
            # staging Lambda functions stay in lockstep on template-level changes.
            [sync-lambda.yml]="sync-lambda sync-lambda-staging"
            [nat-egress.yml]="nat-egress"
            # dns-staging.yml backs the Route53 record for staging-api.vaultmtg.app.
            # Wiring gap caught in the 2026-05-27 pre-Wave-N audit.
            [dns-staging.yml]="dns-staging"
            [daemon-release-ssm-role.yml]="daemon-release-ssm-role"
            [vaultmtg-security-services.yml]="vaultmtg-security-services"
            [vpc.yml]="vpc"
          )

          # Templates we deliberately ignore on path triggers — log them but
          # do not dispatch. If you genuinely need a re-import, run deploy.yml
          # manually with the *-import stack input.
          IGNORE_TEMPLATES=(
            vaultmtg-security-services-import.yml
          )

          # Collect unique stacks to dispatch (a single push can change multiple
          # templates; dedupe so we never fire two parallel deploys for one stack).
          declare -A DISPATCH_SET=()

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            # Skip ignored templates
            skip=0
            for ig in "${IGNORE_TEMPLATES[@]}"; do
              if [ "$file" = "$ig" ]; then
                echo "Skipping import-only template: $file"
                skip=1
                break
              fi
            done
            [ "$skip" -eq 1 ] && continue

            if [ -z "${STACK_MAP[$file]:-}" ]; then
              echo "::error::No stack mapping defined for cloudformation/$file. Add it to STACK_MAP in deploy-on-merge.yml."
              exit 1
            fi
            for stack in ${STACK_MAP[$file]}; do
              DISPATCH_SET[$stack]=1
            done
          done <<< '${{ steps.detect.outputs.changed }}'

          if [ ${#DISPATCH_SET[@]} -eq 0 ]; then
            echo "No deployable templates changed (all ignored). Nothing to do."
            exit 0
          fi

          echo "Stacks to deploy:"
          for stack in "${!DISPATCH_SET[@]}"; do
            echo "  - $stack"
          done

          # Dispatch deploy.yml once per stack. The deploy.yml workflow handles:
          #   - production environment approval gate
          #   - IAM simulation
          #   - changeset creation + replacement guard
          #   - bootstrap script upload for the ec2 stack
          #   - empty-changeset tolerance (existing wait + `|| true` semantics)
          # We pass dry_run=false and confirm_replacements=false: any deploy
          # that would replace a stateful resource will fail loudly and force
          # a human to re-run deploy.yml manually with confirm_replacements=true.
          for stack in "${!DISPATCH_SET[@]}"; do
            echo "Dispatching deploy.yml for stack=$stack..."
            gh workflow run deploy.yml \
              --ref main \
              -f stack="$stack" \
              -f dry_run=false \
              -f confirm_replacements=false
          done

          echo "All deploys dispatched. See the 'Deploy CloudFormation Stack' workflow for run status."
