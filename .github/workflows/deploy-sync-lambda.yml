name: Deploy Sync Lambda

on:
  repository_dispatch:
    types: [sync-lambda-deploy]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run - build only, do not deploy to Lambda
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-sync-lambda
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy sync Lambda (${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && 'dry-run' || 'deploy' }})
    runs-on: ubuntu-latest
    environment: production

    env:
      AWS_REGION: us-east-1
      LAMBDA_FUNCTION_NAME: mtga-sync
      GONOSUMDB: github.com/RdHamilton/MTGA-Companion
      GOPRIVATE: github.com/RdHamilton/MTGA-Companion

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: RdHamilton/MTGA-Companion
          token: ${{ secrets.GH_PAT }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/sync/go.mod
          cache-dependency-path: services/sync/go.sum

      - name: Download dependencies
        working-directory: services/sync
        env:
          GONOSUMDB: ${{ env.GONOSUMDB }}
          GOPRIVATE: ${{ env.GOPRIVATE }}
        run: go mod download

      - name: Build Lambda binary
        working-directory: services/sync
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: "0"
          GONOSUMDB: ${{ env.GONOSUMDB }}
          GOPRIVATE: ${{ env.GOPRIVATE }}
        run: |
          go build -tags lambda.norpc -trimpath -o bootstrap ./cmd/lambda/
          echo "Built bootstrap binary: $(ls -lh bootstrap)"

      - name: Package Lambda zip
        working-directory: services/sync
        run: |
          zip -j sync-lambda.zip bootstrap
          echo "Zip: $(ls -lh sync-lambda.zip)"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Lambda
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        working-directory: services/sync
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://sync-lambda.zip \
            --architectures arm64 \
            --region ${{ env.AWS_REGION }}

          echo "Waiting for Lambda update to complete..."
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --region ${{ env.AWS_REGION }}

          aws lambda get-function-configuration \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --query '{Runtime:Runtime,Arch:Architectures,State:State,LastModified:LastModified}' \
            --output table

      - name: Dry run summary
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          echo "DRY RUN - would deploy sync Lambda binary to ${{ env.LAMBDA_FUNCTION_NAME }}"
          ls -lh services/sync/sync-lambda.zip
