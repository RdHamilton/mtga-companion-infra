name: Deploy Sync Lambda

on:
  repository_dispatch:
    types: [sync-lambda-deploy]
  workflow_dispatch:
    inputs:
      app_repo_ref:
        description: "App repo ref to build from (tag, branch, or SHA). Default: v0.3.0 (pinned stable release). Advance this to the new release tag before deploying."
        required: false
        type: string
        default: "v0.3.0"
      dry_run:
        description: Dry run - build only, do not deploy to Lambda
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-sync-lambda
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy sync Lambda @ ${{ github.event_name == 'workflow_dispatch' && inputs.app_repo_ref || 'v0.3.0' }} (${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && 'dry-run' || 'deploy' }})
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: us-east-1
      LAMBDA_FUNCTION_NAME: vault-mtg-sync
      GONOSUMDB: github.com/RdHamilton/vault-mtg
      GOPRIVATE: github.com/RdHamilton/vault-mtg

    steps:
      - name: Checkout app repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 — SHA pinned (ticket #2385 AC3)
        with:
          repository: RdHamilton/vault-mtg
          token: ${{ secrets.GH_PAT }}
          # Pin to a known-good tagged release so Lambda builds are reproducible
          # and a directory-layout change in the app repo cannot silently break
          # this workflow.  For repository_dispatch events (automated release
          # trigger), this defaults to v0.3.0.  Advance this default (and the
          # workflow_dispatch default above) to the new release tag each time a
          # release is cut.  Never leave this pointing at a mutable ref (branch
          # or SHA-less tag alias) in production.
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.app_repo_ref || 'v0.3.0' }}

      - name: Verify sync Lambda source exists
        # Fail fast — do not silently build a stale or empty binary if the
        # expected source directory has moved in the app repo.
        run: |
          if [ ! -d "services/sync/cmd/lambda" ]; then
            echo "ERROR: services/sync/cmd/lambda not found in app repo at ref '${{ github.event_name == 'workflow_dispatch' && inputs.app_repo_ref || 'v0.3.0' }}'."
            echo "The sync Lambda source has moved or the ref is invalid. Update the pinned ref or the build path."
            exit 1
          fi
          echo "Verified: services/sync/cmd/lambda exists."

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6 — SHA pinned (ticket #2385 AC3)
        with:
          go-version-file: services/sync/go.mod
          cache-dependency-path: services/sync/go.sum

      - name: Download dependencies
        working-directory: services/sync
        env:
          GONOSUMDB: ${{ env.GONOSUMDB }}
          GOPRIVATE: ${{ env.GOPRIVATE }}
        run: go mod download

      - name: Build Lambda binary
        working-directory: services/sync
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: "0"
          GONOSUMDB: ${{ env.GONOSUMDB }}
          GOPRIVATE: ${{ env.GOPRIVATE }}
        run: |
          go build -tags lambda.norpc -trimpath -o bootstrap ./cmd/lambda/
          echo "Built bootstrap binary: $(ls -lh bootstrap)"

      - name: Validate binary architecture
        # Guard against a silent cross-compilation failure shipping an x86-64
        # binary to an arm64 Lambda (exit status 126 — "cannot execute binary
        # file").  The `file` command reports the ELF machine type; fail the
        # workflow if it is not aarch64 so the bad binary never reaches AWS.
        working-directory: services/sync
        run: |
          BINARY_INFO="$(file bootstrap)"
          echo "Binary info: ${BINARY_INFO}"
          if ! echo "${BINARY_INFO}" | grep -q "aarch64"; then
            echo "ERROR: bootstrap binary is not aarch64. Got: ${BINARY_INFO}"
            echo "Expected GOARCH=arm64 (aarch64) — cross-compilation may have silently fallen back to the host architecture."
            exit 1
          fi
          echo "Architecture validated: bootstrap is aarch64 (arm64) as required."

      - name: Package Lambda zip
        working-directory: services/sync
        run: |
          zip -j sync-lambda.zip bootstrap
          echo "Zip: $(ls -lh sync-lambda.zip)"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@796449b3e38e3c256861227399e58b780e0e5538  # v6 — SHA pinned (ticket #2385 AC3)
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Lambda
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        working-directory: services/sync
        run: |
          if aws lambda get-function --function-name ${{ env.LAMBDA_FUNCTION_NAME }} --region ${{ env.AWS_REGION }} > /dev/null 2>&1; then
            echo "Function exists — updating code..."
            aws lambda update-function-code \
              --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
              --zip-file fileb://sync-lambda.zip \
              --architectures arm64 \
              --region ${{ env.AWS_REGION }}

            echo "Waiting for Lambda update to complete..."
            aws lambda wait function-updated \
              --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
              --region ${{ env.AWS_REGION }}
          else
            echo "Function does not exist — creating..."
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/vault-mtg-production-sync-lambda-role"
            echo "Resolved execution role ARN: ${ROLE_ARN}"
            aws lambda create-function \
              --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
              --runtime provided.al2023 \
              --architectures arm64 \
              --handler bootstrap \
              --role "${ROLE_ARN}" \
              --zip-file fileb://sync-lambda.zip \
              --timeout 300 \
              --memory-size 256 \
              --description "VaultMTG daily card ratings sync" \
              --region ${{ env.AWS_REGION }}

            echo "Waiting for Lambda to become active..."
            aws lambda wait function-active \
              --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
              --region ${{ env.AWS_REGION }}
          fi

      - name: Enforce Lambda configuration (defense-in-depth)
        # Re-apply Timeout and MemorySize on every deploy so a CloudFormation
        # drift event or out-of-band change cannot silently revert these values.
        # The 3-second AWS default timeout causes every sync run to fail (runs
        # take >10s); this step ensures the correct values are always in place.
        #
        # Per ADR-035, this step intentionally does NOT touch Environment.Variables --
        # that contract is owned by cloudformation/sync-lambda.yml (the CFN custom
        # resource LambdaVpcConfigCustomResource is the single source-of-record).
        # Do not add --environment here without superseding ADR-035.
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        run: |
          echo "Applying Timeout=300 and MemorySize=256 to ${{ env.LAMBDA_FUNCTION_NAME }}..."
          aws lambda update-function-configuration \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --timeout 300 \
            --memory-size 256 \
            --region ${{ env.AWS_REGION }}

          echo "Waiting for configuration update to complete..."
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --region ${{ env.AWS_REGION }}

          aws lambda get-function-configuration \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --query '{Runtime:Runtime,Arch:Architectures,Timeout:Timeout,MemorySize:MemorySize,State:State,LastModified:LastModified}' \
            --output table

      - name: Post-deploy smoke invocation
        # Verify the freshly-deployed Lambda function is reachable and in Active state
        # by performing a DryRun invocation.
        #
        # WHY DryRun and not RequestResponse:
        #   The sync Lambda performs a full external sync (17Lands API calls + RDS writes)
        #   on every RequestResponse invocation -- typical run time is 60-300s. A
        #   synchronous RequestResponse invocation would block the workflow well beyond
        #   the 30s smoke budget and trigger a redundant production sync on every deploy.
        #   DryRun validates (a) the caller has lambda:InvokeFunction permission, (b) the
        #   function exists, and (c) the function is in Active state (not Pending/Failed
        #   after the code or config update). StatusCode 204 confirms all three.
        #   A full RequestResponse correctness smoke (against a test event + staging
        #   function) is tracked as a follow-on ticket: RdHamilton/vault-mtg-tickets#38.
        #
        # SKIP: dry_run -- no binary was deployed; nothing to smoke.
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        run: |
          set -euo pipefail

          FN="${{ env.LAMBDA_FUNCTION_NAME }}"
          echo "Post-deploy smoke: DryRun invocation on ${FN}..."

          INVOKE_OUT=$(aws lambda invoke \
            --function-name "${FN}" \
            --invocation-type DryRun \
            --region ${{ env.AWS_REGION }} \
            /dev/null \
            --output json 2>&1) || {
            echo "ERROR: aws lambda invoke failed (non-zero exit)."
            echo "${INVOKE_OUT}"
            exit 1
          }

          echo "Invoke response: ${INVOKE_OUT}"

          STATUS_CODE=$(echo "${INVOKE_OUT}" | jq -r '.StatusCode // empty')
          FUNCTION_ERROR=$(echo "${INVOKE_OUT}" | jq -r '.FunctionError // empty')

          if [ -z "${STATUS_CODE}" ]; then
            echo "ERROR: Could not parse StatusCode from invoke response."
            exit 1
          fi

          if [ -n "${FUNCTION_ERROR}" ]; then
            echo "ERROR: Lambda invoke returned FunctionError: ${FUNCTION_ERROR}"
            exit 1
          fi

          if [ "${STATUS_CODE}" != "204" ]; then
            echo "ERROR: Expected StatusCode 204 from DryRun invocation, got ${STATUS_CODE}."
            exit 1
          fi

          echo "Post-deploy smoke PASS: DryRun StatusCode=${STATUS_CODE}, no FunctionError."

      - name: Dry run summary
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          echo "DRY RUN - would deploy sync Lambda binary to ${{ env.LAMBDA_FUNCTION_NAME }}"
          echo "DRY RUN - would enforce Timeout=300 and MemorySize=256 on ${{ env.LAMBDA_FUNCTION_NAME }}"
          ls -lh services/sync/sync-lambda.zip
