name: CFN Changeset Gate

# Fires on EVERY PR to main so the required status check
# "Changeset gate -- replacement check" always posts a result.
# When no cloudformation/** files changed the job exits green immediately.
# When cloudformation/** files did change, the full dry-run gate runs.
#
# This is the CI / pre-merge layer (P-10).  The complementary runtime guard
# inside deploy.yml (R-19) is a separate, later item.
#
# ALLOW_REPLACEMENT override:
#   Set the repository variable ALLOW_REPLACEMENT=true (Settings -> Variables)
#   before merging a PR that intentionally replaces a stateful resource.
#   The build will print a prominent audit notice and proceed.
#   Reset ALLOW_REPLACEMENT to false (or delete the variable) immediately after
#   the PR merges.  Every use is logged in the GitHub Actions run summary.
#
# Post-deploy ratification note:
#   When a drift fix was already applied live before the PR merges (Path A),
#   create-change-set returns "The submitted information didn't contain changes."
#   This is a SUCCESS signal — the template matches the live stack.  The gate
#   correctly passes on this message (see check_stack → grep for "didn't contain
#   changes|no changes|no updates are to be performed").
#
# Path-filter note: a paths: filter was intentionally removed (2026-05-19).
# A paths-filtered workflow never posts a check on non-matching PRs, which
# would block every non-CFN PR once this job is a required status check.

on:
  pull_request:
    branches: [main]

concurrency:
  group: cfn-changeset-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true  # cancel stale gate runs when new commits are pushed

jobs:
  changeset-gate:
    name: Changeset gate — replacement check
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC role assumption
      contents: read
      pull-requests: write  # required to post PR comments

    env:
      AWS_REGION: us-east-1
      # Stateful resource types that must never be silently replaced.
      # Pipe-separated for use in grep -E patterns.
      STATEFUL_TYPES: "AWS::EC2::Instance|AWS::RDS::DBInstance|AWS::EC2::EIP"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 — SHA pinned (ticket #2385 AC3)
        with:
          fetch-depth: 0   # needed for git diff against base branch

      # Run before AWS credentials so non-CFN PRs never need OIDC.
      - name: Detect CloudFormation changes (early exit for non-CFN PRs)
        id: cfn_check
        run: |
          CHANGED=$(git diff --name-only --diff-filter=AM \
            "origin/${{ github.base_ref }}...HEAD" \
            -- 'cloudformation/*.yml' | grep -v 'cloudformation/parameters/' || true)
          if [ -z "$CHANGED" ]; then
            echo "has_cfn_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_cfn_changes=true" >> "$GITHUB_OUTPUT"
          fi

      # Posts a green check on non-CFN PRs and exits immediately.
      # This is required so the job always posts a result regardless of
      # which files changed — a paths-filtered workflow never posts a check
      # on non-matching PRs, which would block every non-CFN PR once this
      # job is marked a required status check.
      - name: Pass (no CloudFormation changes)
        if: steps.cfn_check.outputs.has_cfn_changes == 'false'
        run: |
          echo "No CloudFormation templates changed in this PR."
          echo "Changeset gate: PASS (no CFN files touched — nothing to inspect)."

      # S-05: Reject any trust policy sub-condition using :* (too broad).
      # A :* sub allows ANY branch, tag, PR, or fork to assume the role.
      # All OIDC sub conditions must be pinned to specific refs (refs/heads/main,
      # refs/tags/<pattern>, pull_request, etc.).
      # Runs before AWS credentials so it never needs OIDC and always fires on
      # CFN-touching PRs without any role assumption.
      - name: Check OIDC trust policy - reject wildcard sub conditions
        if: steps.cfn_check.outputs.has_cfn_changes == 'true'
        run: |
          set -euo pipefail

          CHANGED=$(git diff --name-only --diff-filter=AM \
            "origin/${{ github.base_ref }}...HEAD" \
            -- 'cloudformation/*.yml' | grep -v 'cloudformation/parameters/' || true)

          VIOLATIONS=""
          for TEMPLATE_FILE in $CHANGED; do
            # Look for lines where a github sub condition ends in :* (the wildcard form).
            # Pattern: token.actions.githubusercontent.com:sub: ...:<repo>:*
            # StringLike with :* matches any ref -- this is the overly-broad pattern we ban.
            # -A 20 widens the window so sub lists longer than 5 entries are still
            # fully scanned. The secondary filter is anchored to `repo:...:*` (an
            # OIDC sub-ref wildcard) so unrelated IAM action wildcards within the
            # window (e.g. `Action: cloudformation:*`) are not false positives.
            HITS=$(grep -n 'token.actions.githubusercontent.com:sub' "$TEMPLATE_FILE" \
              -A 20 | grep -E 'repo:.*:\*\s*$' || true)
            if [ -n "$HITS" ]; then
              VIOLATIONS="${VIOLATIONS}\n  $TEMPLATE_FILE:\n$HITS"
            fi
          done

          if [ -n "$VIOLATIONS" ]; then
            echo ""
            echo "=========================================="
            echo "S-05 VIOLATION: Wildcard OIDC sub condition detected."
            echo ""
            echo "One or more trust policies use ':*' as the sub condition, which"
            echo "allows ANY branch, tag, PR, or fork to assume the role."
            echo ""
            echo "Required: pin sub conditions to specific refs, e.g.:"
            echo "  repo:<org>/<repo>:ref:refs/heads/main"
            echo "  repo:<org>/<repo>:ref:refs/tags/app/v*"
            echo "  repo:<org>/<repo>:pull_request"
            echo ""
            echo "Violations found:"
            printf '%b\n' "$VIOLATIONS"
            echo "=========================================="
            exit 1
          fi

          echo "S-05 check PASSED -- no wildcard OIDC sub conditions found in changed templates."

      - name: Configure AWS credentials
        if: steps.cfn_check.outputs.has_cfn_changes == 'true'
        uses: aws-actions/configure-aws-credentials@796449b3e38e3c256861227399e58b780e0e5538  # v6 — SHA pinned (ticket #2385 AC3)
        with:
          role-to-assume: ${{ secrets.AWS_CFN_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Detect changed CloudFormation templates
        id: detect
        if: steps.cfn_check.outputs.has_cfn_changes == 'true'
        run: |
          # Diff against the PR base.  List only cloudformation/*.yml files
          # that were added or modified (A/M); deleted templates have no stack
          # to inspect.
          CHANGED=$(git diff --name-only --diff-filter=AM \
            "origin/${{ github.base_ref }}...HEAD" \
            -- 'cloudformation/*.yml' | grep -v 'cloudformation/parameters/' || true)

          if [ -z "$CHANGED" ]; then
            echo "No CloudFormation templates changed — gate skipped."
            echo "changed_templates=" >> "$GITHUB_OUTPUT"
          else
            echo "Changed templates:"
            echo "$CHANGED"
            # Newlines -> space-separated for the matrix step
            CHANGED_ONELINE=$(echo "$CHANGED" | tr '\n' ' ' | sed 's/ $//')
            echo "changed_templates=$CHANGED_ONELINE" >> "$GITHUB_OUTPUT"
          fi

      - name: Run changeset gate for each changed template
        if: steps.cfn_check.outputs.has_cfn_changes == 'true' && steps.detect.outputs.changed_templates != ''
        id: gate
        env:
          ALLOW_REPLACEMENT: ${{ vars.ALLOW_REPLACEMENT }}
          CHANGED_TEMPLATES: ${{ steps.detect.outputs.changed_templates }}
        run: |
          set -euo pipefail

          TEMPLATES="$CHANGED_TEMPLATES"
          GATE_FAILED=false
          VIOLATIONS=""

          # Track every changeset we create in a workspace file so the
          # follow-on "Cleanup gate changesets" step (if: always()) can
          # delete them even when this step exits early due to a failure
          # in check_stack, an aws CLI error, or set -euo pipefail.
          # Format: one "STACK|CHANGESET" pair per line.
          CHANGESET_TRACK_FILE="$RUNNER_TEMP/gate-changesets.txt"
          : > "$CHANGESET_TRACK_FILE"
          echo "changeset_track_file=$CHANGESET_TRACK_FILE" >> "$GITHUB_OUTPUT"

          # ---------------------------------------------------------------------------
          # Helper: resolve stack name from template filename.
          # Mirrors the "Resolve stack name" step in deploy.yml exactly so this gate
          # evaluates the same stack that would actually be deployed.
          # ---------------------------------------------------------------------------
          resolve_stack_name() {
            local TEMPLATE_FILE="$1"
            local BASENAME
            BASENAME=$(basename "$TEMPLATE_FILE" .yml)

            case "$BASENAME" in
              cdn)                          echo "vaultmtg-app-cdn" ;;
              iam-gha-roles)                echo "mtga-companion-iam-gha-roles" ;;
              cloudtrail)                   echo "vaultmtg-cloudtrail" ;;
              nat-egress)                   echo "vaultmtg-nat-egress" ;;
              vaultmtg-security-services)   echo "vaultmtg-security-services" ;;
              # vaultmtg-security-services-import.yml is a one-shot IMPORT stub that
              # adopts the orphan ConfigSnapshotBucket into the same stack. Gate it
              # against the same stack name as the full template.
              vaultmtg-security-services-import) echo "vaultmtg-security-services" ;;
              # cloudwatch-alarms.yml backs both cloudwatch-alarms and
              # cloudwatch-alarms-staging stacks.  We gate both.
              cloudwatch-alarms)            echo "cloudwatch-alarms" ;;  # handled specially below
              *)                            echo "mtga-companion-${BASENAME}" ;;
            esac
          }

          # ---------------------------------------------------------------------------
          # Helper: check one stack + template pair.
          # Returns 0 if clean, 1 if a replacement violation was found.
          # ---------------------------------------------------------------------------
          check_stack() {
            local STACK_NAME="$1"
            local TEMPLATE_FILE="$2"
            local CHANGESET_NAME="gate-pr${{ github.event.pull_request.number }}-$(date +%s%N | cut -c1-16)"

            echo ""
            echo "=========================================="
            echo "  Stack:    $STACK_NAME"
            echo "  Template: $TEMPLATE_FILE"
            echo "  Changeset: $CHANGESET_NAME"
            echo "=========================================="

            # Determine CREATE vs UPDATE
            STACK_STATUS=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --query 'Stacks[0].StackStatus' \
              --output text 2>/dev/null || echo "DOES_NOT_EXIST")

            # Tightened from grep -qE substring match to an explicit allowlist (vault-mtg#TBD).
            # The old pattern matched any status containing "COMPLETE" or "ROLLBACK", which is fragile.
            case "$STACK_STATUS" in
              CREATE_COMPLETE|UPDATE_COMPLETE|IMPORT_COMPLETE|UPDATE_ROLLBACK_COMPLETE|IMPORT_ROLLBACK_COMPLETE)
                CHANGE_TYPE="UPDATE"
                ;;
              *)
                CHANGE_TYPE="CREATE"
                echo "  Stack does not exist yet or is in an unstable state (status: $STACK_STATUS) -- CREATE changeset."
                echo "  CREATE changesets have no Replacement field; gate passes automatically."
                return 0
                ;;
            esac

            echo "  Stack status: $STACK_STATUS -- running $CHANGE_TYPE changeset."

            # Resolve parameters file (use stack-input name for parameters dir)
            local STACK_INPUT
            STACK_INPUT=$(basename "$TEMPLATE_FILE" .yml)
            PARAMS_ARG=""
            if [ -f "cloudformation/parameters/${STACK_INPUT}.json" ]; then
              PARAMS_ARG="--parameters file://cloudformation/parameters/${STACK_INPUT}.json"
            fi

            # Upload template to S3 so --template-url is used instead of --template-body.
            # Mirrors the deploy.yml path exactly — both now use the same S3-upload mechanism
            # so templates exceeding the 51200-byte --template-body inline limit (#2499) are
            # caught at the pre-merge gate rather than only at deploy time.
            # IAM: gha-infra-cfn-deploy has s3:PutObject on bootstrap/* (S3BootstrapWrite Sid);
            #   templates are placed under bootstrap/cfn-templates/ to use that existing grant.
            local GATE_BUCKET="mtga-companion-deploy-artifacts-production"
            local GATE_S3_KEY="bootstrap/cfn-templates/gate-pr${{ github.event.pull_request.number }}/${CHANGESET_NAME}/${STACK_INPUT}.yml"
            aws s3 cp "$TEMPLATE_FILE" "s3://${GATE_BUCKET}/${GATE_S3_KEY}" > /dev/null
            local TEMPLATE_URL="https://${GATE_BUCKET}.s3.us-east-1.amazonaws.com/${GATE_S3_KEY}"
            echo "  Template uploaded: s3://${GATE_BUCKET}/${GATE_S3_KEY}"

            # Create the changeset
            aws cloudformation create-change-set \
              --stack-name "$STACK_NAME" \
              --template-url "$TEMPLATE_URL" \
              --change-set-name "$CHANGESET_NAME" \
              --change-set-type "$CHANGE_TYPE" \
              --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
              $PARAMS_ARG \
              --description "P-10 pre-merge gate: PR #${{ github.event.pull_request.number }}" \
              > /dev/null

            # Clean up the uploaded template object (best-effort; orphan is harmless)
            aws s3 rm "s3://${GATE_BUCKET}/${GATE_S3_KEY}" 2>/dev/null || true

            # Track for cleanup regardless of outcome. Append to the workspace
            # file so the if: always() cleanup step picks it up even if this
            # step exits early due to set -euo pipefail.
            echo "${STACK_NAME}|${CHANGESET_NAME}" >> "$CHANGESET_TRACK_FILE"

            # Wait for changeset computation (FAILED is normal when there are no changes)
            aws cloudformation wait change-set-create-complete \
              --stack-name "$STACK_NAME" \
              --change-set-name "$CHANGESET_NAME" 2>/dev/null || true

            # Fetch the changeset status
            CS_STATUS=$(aws cloudformation describe-change-set \
              --stack-name "$STACK_NAME" \
              --change-set-name "$CHANGESET_NAME" \
              --query 'Status' \
              --output text)

            if [ "$CS_STATUS" = "FAILED" ]; then
              CS_REASON=$(aws cloudformation describe-change-set \
                --stack-name "$STACK_NAME" \
                --change-set-name "$CHANGESET_NAME" \
                --query 'StatusReason' \
                --output text)
              echo "  Changeset FAILED: $CS_REASON"
              # AWS returns either "The submitted information didn't contain changes."
              # or "No updates are to be performed." — both are no-op outcomes.
              # A post-deploy ratification PR (drift already applied live) will
              # produce the first message; treat both as SUCCESS, not as a gate error.
              if echo "$CS_REASON" | grep -qiE "didn.t contain changes|no changes|no updates are to be performed"; then
                echo "  No changes detected (changeset intentionally empty) — gate passes (no-op update)."
                return 0
              fi
              echo "  Changeset failed for an unexpected reason — treating as gate error."
              return 1
            fi

            # Print the changeset summary for the run log
            echo ""
            echo "  Changeset summary:"
            aws cloudformation describe-change-set \
              --stack-name "$STACK_NAME" \
              --change-set-name "$CHANGESET_NAME" \
              --query 'Changes[].{Action:ResourceChange.Action,Resource:ResourceChange.LogicalResourceId,Type:ResourceChange.ResourceType,Replace:ResourceChange.Replacement}' \
              --output table

            # Extract replacements on stateful types
            REPLACEMENTS=$(aws cloudformation describe-change-set \
              --stack-name "$STACK_NAME" \
              --change-set-name "$CHANGESET_NAME" \
              --query 'Changes[?ResourceChange.Replacement==`True`].{Resource:ResourceChange.LogicalResourceId,Type:ResourceChange.ResourceType}' \
              --output json)

            # Filter to stateful types only
            STATEFUL_HITS=$(echo "$REPLACEMENTS" | python3 -c "
          import sys, json, re
          items = json.load(sys.stdin)
          pattern = r'${STATEFUL_TYPES}'
          hits = [i for i in items if re.match(pattern, i.get('Type',''))]
          if hits:
              for h in hits:
                  print(f\"  REPLACEMENT: {h['Resource']} ({h['Type']})\")
          " 2>/dev/null || true)

            if [ -n "$STATEFUL_HITS" ]; then
              echo ""
              echo "  !! STATEFUL RESOURCE REPLACEMENT DETECTED !!"
              echo "$STATEFUL_HITS"
              return 1
            else
              echo ""
              echo "  No stateful resource replacements detected — gate passes."
              return 0
            fi
          }

          # ---------------------------------------------------------------------------
          # Iterate over every changed template
          # ---------------------------------------------------------------------------
          for TEMPLATE_FILE in $TEMPLATES; do
            BASENAME=$(basename "$TEMPLATE_FILE" .yml)
            STACK_NAME=$(resolve_stack_name "$TEMPLATE_FILE")

            # cloudwatch-alarms.yml backs two stacks — check both
            if [ "$BASENAME" = "cloudwatch-alarms" ]; then
              for STACK in "mtga-companion-cloudwatch-alarms" "mtga-companion-cloudwatch-alarms-staging"; do
                if ! check_stack "$STACK" "$TEMPLATE_FILE"; then
                  GATE_FAILED=true
                  VIOLATIONS="${VIOLATIONS}\n- Stack \`${STACK}\`: stateful resource replacement detected"
                fi
              done
            else
              if ! check_stack "$STACK_NAME" "$TEMPLATE_FILE"; then
                GATE_FAILED=true
                VIOLATIONS="${VIOLATIONS}\n- Stack \`${STACK_NAME}\`: stateful resource replacement detected"
              fi
            fi
          done

          # ---------------------------------------------------------------------------
          # NOTE: Changeset cleanup is performed in a separate step below with
          # if: always() so that orphans are deleted even when this step exits
          # early due to a failed aws CLI call, a python parse failure, or any
          # other set -euo pipefail trigger (ticket #2385 AC2).
          # ---------------------------------------------------------------------------

          # ---------------------------------------------------------------------------
          # Gate decision
          # ---------------------------------------------------------------------------
          echo ""
          echo "=========================================="
          if [ "$GATE_FAILED" = "false" ]; then
            echo "GATE: PASS — no stateful resource replacements detected."
            echo "gate_result=pass" >> $GITHUB_OUTPUT
          else
            echo "GATE: VIOLATIONS FOUND"
            printf '%b\n' "$VIOLATIONS"
            echo ""
            if [ "${ALLOW_REPLACEMENT:-false}" = "true" ]; then
              echo "=========================================="
              echo "AUDIT NOTICE: ALLOW_REPLACEMENT=true is set."
              echo "  This override is intentional and has been logged."
              echo "  PR: #${{ github.event.pull_request.number }}"
              echo "  Actor: ${{ github.actor }}"
              echo "  Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "  Violations bypassed:"
              printf '%b\n' "$VIOLATIONS"
              echo "=========================================="
              echo "  Gate BYPASSED by ALLOW_REPLACEMENT=true."
              echo "  Reset the variable after this PR merges."
              echo "gate_result=bypassed" >> $GITHUB_OUTPUT
            else
              echo "=========================================="
              echo "GATE: FAIL"
              echo ""
              echo "To intentionally replace a stateful resource:"
              echo "  1. Set repository variable ALLOW_REPLACEMENT=true"
              echo "     (Settings -> Secrets and variables -> Variables)"
              echo "  2. Re-run this workflow (push a new commit or re-trigger CI)."
              echo "  3. Reset ALLOW_REPLACEMENT to false immediately after merge."
              echo "gate_result=fail" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi
          echo "=========================================="

      # ---------------------------------------------------------------------------
      # Cleanup gate changesets (ticket #2385 AC2).
      #
      # Runs with if: always() so orphan changesets are deleted on every outcome:
      #   - gate PASS / FAIL / BYPASS
      #   - any earlier step exiting via set -euo pipefail (aws CLI error,
      #     python parse failure, missing parameters file, etc.)
      #   - workflow cancellation
      #
      # Reads the track file written by the gate step. Each line is
      # "STACK|CHANGESET". Missing track file means the gate step exited before
      # creating any changesets — nothing to do.
      # ---------------------------------------------------------------------------
      - name: Cleanup gate changesets
        if: always() && steps.cfn_check.outputs.has_cfn_changes == 'true'
        env:
          CHANGESET_TRACK_FILE: ${{ steps.gate.outputs.changeset_track_file }}
        run: |
          set +e  # best-effort cleanup; never fail the workflow here

          if [ -z "${CHANGESET_TRACK_FILE:-}" ] || [ ! -f "$CHANGESET_TRACK_FILE" ]; then
            echo "No changeset track file found — gate step exited before creating any changesets. Nothing to clean."
            exit 0
          fi

          echo "Cleaning up gate changesets recorded in $CHANGESET_TRACK_FILE..."
          CLEANED=0
          while IFS='|' read -r CLEAN_STACK CLEAN_CS; do
            if [ -z "$CLEAN_STACK" ] || [ -z "$CLEAN_CS" ]; then
              continue
            fi
            aws cloudformation delete-change-set \
              --stack-name "$CLEAN_STACK" \
              --change-set-name "$CLEAN_CS" 2>/dev/null
            echo "  Deleted: $CLEAN_STACK / $CLEAN_CS"
            CLEANED=$((CLEANED + 1))
          done < "$CHANGESET_TRACK_FILE"
          echo "Cleanup complete — ${CLEANED} changeset(s) removed."

  # ---------------------------------------------------------------------------
  # S-10: Validate IAM policies in changed CloudFormation templates
  #
  # Extracts every PolicyDocument from added/modified cloudformation/*.yml
  # templates and runs `aws accessanalyzer validate-policy` on each. This
  # surfaces over-broad grants, redundant statements, and other AWS best-
  # practice violations BEFORE the policy reaches the live account.
  #
  # Hard-fail gate (RULE-INFRA-01 resolved — #2491): pre-existing violations
  # were cleaned up; this job now blocks merge on any findings.
  # ---------------------------------------------------------------------------
  validate-iam-policies:
    name: Validate IAM policies (S-10)
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC role assumption
      contents: read

    env:
      AWS_REGION: us-east-1

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 — SHA pinned (ticket #2385 AC3)
        with:
          fetch-depth: 0

      - name: Detect CloudFormation changes
        id: cfn_check
        run: |
          CHANGED=$(git diff --name-only --diff-filter=AM \
            "origin/${{ github.base_ref }}...HEAD" \
            -- 'cloudformation/*.yml' | grep -v 'cloudformation/parameters/' || true)
          if [ -z "$CHANGED" ]; then
            echo "has_cfn_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_cfn_changes=true" >> "$GITHUB_OUTPUT"
            echo "changed_templates<<EOF" >> "$GITHUB_OUTPUT"
            echo "$CHANGED" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Pass (no CloudFormation changes)
        if: steps.cfn_check.outputs.has_cfn_changes == 'false'
        run: echo "No CloudFormation templates changed -- IAM policy validation skipped."

      - name: Install yq (YAML extraction)
        if: steps.cfn_check.outputs.has_cfn_changes == 'true'
        env:
          # Pin yq to a specific release + verify SHA-256 to close the
          # supply-chain risk of pulling /releases/latest/ at install time
          # (vault-mtg#2490, S-07 finding from PR #110 review).
          # Bump both values together when upgrading yq.
          # SHA-256 source: https://github.com/mikefarah/yq/releases/download/v4.53.2/checksums
          # (column 19 per checksums_hashes_order — SHA-256 is the 18th hash, +1 for the filename column).
          YQ_VERSION: v4.53.2
          YQ_SHA256: d56bf5c6819e8e696340c312bd70f849dc1678a7cda9c2ad63eebd906371d56b
        run: |
          set -euo pipefail
          TMP_YQ="$(mktemp)"
          wget -qO "$TMP_YQ" "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          echo "${YQ_SHA256}  ${TMP_YQ}" | sha256sum -c -
          sudo install -m 0755 "$TMP_YQ" /usr/local/bin/yq
          rm -f "$TMP_YQ"
          yq --version

      - name: Configure AWS credentials
        if: steps.cfn_check.outputs.has_cfn_changes == 'true'
        uses: aws-actions/configure-aws-credentials@796449b3e38e3c256861227399e58b780e0e5538  # v6 — SHA pinned (ticket #2385 AC3)
        with:
          role-to-assume: ${{ secrets.AWS_CFN_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run accessanalyzer validate-policy on every PolicyDocument
        if: steps.cfn_check.outputs.has_cfn_changes == 'true'
        env:
          CHANGED_TEMPLATES_RAW: ${{ steps.cfn_check.outputs.changed_templates }}
        run: |
          set -euo pipefail

          # Iterate over every changed template
          CHANGED_TEMPLATES=$(echo "$CHANGED_TEMPLATES_RAW" | tr '\n' ' ')
          TOTAL_FINDINGS=0
          OVERALL_OK=true

          for TEMPLATE_FILE in $CHANGED_TEMPLATES; do
            [ -z "$TEMPLATE_FILE" ] && continue
            echo ""
            echo "=========================================="
            echo "  Template: $TEMPLATE_FILE"
            echo "=========================================="

            # Extract every Resources.*.Properties.PolicyDocument plus every
            # AssumeRolePolicyDocument, BucketPolicy PolicyDocument, KeyPolicy,
            # and inline IAM::Policy / IAM::ManagedPolicy PolicyDocument.
            # yq emits each match as a separate JSON document.
            POLICIES_JSON=$(yq -o=json eval-all '
              .Resources | to_entries[] |
                select(.value.Properties.PolicyDocument or
                       .value.Properties.AssumeRolePolicyDocument or
                       .value.Properties.KeyPolicy) |
                {
                  "logicalId": .key,
                  "type": .value.Type,
                  "policies": [
                    .value.Properties.PolicyDocument,
                    .value.Properties.AssumeRolePolicyDocument,
                    .value.Properties.KeyPolicy
                  ] | map(select(. != null))
                }
            ' "$TEMPLATE_FILE" 2>/dev/null || echo '')

            if [ -z "$POLICIES_JSON" ] || [ "$POLICIES_JSON" = "null" ]; then
              echo "  No IAM/resource policies in this template."
              continue
            fi

            # Walk each (logicalId, policy) pair and run validate-policy.
            # POLICIES_JSON is a stream of JSON objects (one per resource).
            #
            # Pass POLICIES_JSON via env var, NOT via `echo "$POLICIES_JSON" | python3 <<'PY'`.
            # That older pattern is broken: when both a pipe (|) and a heredoc (<<)
            # target python's stdin, the heredoc wins -- python receives the script
            # text on stdin, sys.stdin.read() returns empty, and the unread pipe
            # data triggers SIGPIPE on the echo writer (visible in the runner log
            # as `line 42: echo: write error: Broken pipe`). Under `set -euo pipefail`
            # that aborts the whole job before any validate-policy call runs.
            # See PR #168 S-10 run 26347408402 and ticket vault-mtg#TBD for evidence.
            POLICIES_JSON="$POLICIES_JSON" python3 <<'PY'
          import json, sys, subprocess, os

          stream = os.environ.get('POLICIES_JSON', '').strip()
          if not stream:
              sys.exit(0)

          # yq -o=json eval-all emits multiple top-level JSON objects separated by
          # newlines. Parse them one at a time using JSONDecoder.raw_decode.
          decoder = json.JSONDecoder()
          idx = 0
          resources = []
          while idx < len(stream):
              # Skip whitespace
              while idx < len(stream) and stream[idx] in ' \t\n\r':
                  idx += 1
              if idx >= len(stream):
                  break
              try:
                  obj, end = decoder.raw_decode(stream, idx)
                  resources.append(obj)
                  idx = end
              except json.JSONDecodeError:
                  break

          findings_total = 0
          for r in resources:
              logical_id = r.get('logicalId', '?')
              rtype = r.get('type', '?')
              for policy in r.get('policies', []):
                  if policy is None:
                      continue
                  # PolicyType: IDENTITY_POLICY for assume-role and managed/inline
                  # IAM policies; RESOURCE_POLICY for bucket policies, KMS key policies, etc.
                  if 'AssumeRolePolicyDocument' in policy or rtype in ('AWS::IAM::Role', 'AWS::IAM::Policy', 'AWS::IAM::ManagedPolicy'):
                      ptype = 'IDENTITY_POLICY'
                  else:
                      ptype = 'RESOURCE_POLICY'

                  # CloudFormation policies are dicts that may contain !Ref/!Sub
                  # intrinsics yq emits as scalar strings prefixed with '!'.
                  # validate-policy needs a syntactically-valid JSON IAM policy;
                  # we substitute placeholders for any non-resolvable values.
                  def normalize(node):
                      if isinstance(node, dict):
                          # CloudFormation function objects: replace with placeholder
                          if len(node) == 1 and list(node.keys())[0].startswith('Fn::'):
                              return 'arn:aws:iam::000000000000:role/placeholder'
                          if len(node) == 1 and list(node.keys())[0] == 'Ref':
                              return 'arn:aws:iam::000000000000:role/placeholder'
                          return {k: normalize(v) for k, v in node.items()}
                      if isinstance(node, list):
                          return [normalize(v) for v in node]
                      if isinstance(node, str) and node.startswith('!'):
                          return 'arn:aws:iam::000000000000:role/placeholder'
                      return node

                  normalized = normalize(policy)
                  policy_str = json.dumps(normalized)

                  print(f'\n  Validating {logical_id} ({rtype}) as {ptype}...')
                  try:
                      out = subprocess.run(
                          ['aws', 'accessanalyzer', 'validate-policy',
                           '--policy-type', ptype,
                           '--policy-document', policy_str,
                           '--region', os.environ.get('AWS_REGION', 'us-east-1'),
                           '--output', 'json'],
                          capture_output=True, text=True, timeout=60
                      )
                      if out.returncode != 0:
                          print(f'    validate-policy errored (skipping): {out.stderr[:200]}')
                          continue
                      result = json.loads(out.stdout)
                      findings = result.get('findings', [])
                      if not findings:
                          print(f'    OK: no findings.')
                          continue
                      print(f'    {len(findings)} finding(s):')
                      for f in findings:
                          ftype = f.get('findingType', '?')
                          issue = f.get('issueCode', '?')
                          detail = f.get('findingDetails', '')[:200]
                          print(f'      [{ftype}] {issue}: {detail}')
                      findings_total += len(findings)
                  except Exception as e:
                      print(f'    validate-policy exception (skipping): {e}')

          # Print summary and emit a counter the runner reads to decide pass/fail.
          print(f'\n  TEMPLATE TOTAL: {findings_total} finding(s).')
          with open(os.environ.get('GITHUB_ENV', '/dev/null'), 'a') as fh:
              try:
                  prior = int(os.environ.get('VALIDATE_FINDINGS_TOTAL', '0'))
              except ValueError:
                  prior = 0
              fh.write(f'VALIDATE_FINDINGS_TOTAL={prior + findings_total}\n')
          PY
          done

          echo ""
          echo "=========================================="
          echo "Validate-policy total findings: ${VALIDATE_FINDINGS_TOTAL:-0}"
          echo "=========================================="
          if [ "${VALIDATE_FINDINGS_TOTAL:-0}" -gt 0 ]; then
            echo ""
            echo "GATE: FAIL — IAM policy violations must be resolved before merge."
            exit 1
          fi
